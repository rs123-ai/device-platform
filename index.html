// ====== IndexedDB ======
function openIDB(){
  return new Promise(function(resolve,reject){
    var req=indexedDB.open('dm_files_v10',1)
    req.onupgradeneeded=function(e){e.target.result.createObjectStore('files',{keyPath:'fileId'})}
    req.onsuccess=function(e){resolve(e.target.result)}
    req.onerror=function(){reject(req.error)}
  })
}
function saveFileToIDB(fileId,data){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readwrite')
      tx.objectStore('files').put({fileId:fileId,data:data})
      tx.oncomplete=resolve;tx.onerror=reject
    })
  })
}
function getFileFromIDB(fileId){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readonly')
      var req=tx.objectStore('files').get(fileId)
      req.onsuccess=function(){resolve(req.result?req.result.data:null)}
      req.onerror=reject
    })
  })
}
function loadAllFromIDB(){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readonly')
      var req=tx.objectStore('files').getAll()
      req.onsuccess=function(){resolve(req.result||[])}
      req.onerror=reject
    })
  })
}
function deleteFromIDB(fileId){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readwrite')
      tx.objectStore('files').delete(fileId)
      tx.oncomplete=resolve;tx.onerror=reject
    })
  })
}

var logFilter='all'
function renderLog(){var h='<h2>工作日志</h2><div class="card"><h3>新增日志</h3><div class="fc"><div class="fx g12"><input type="date" id="ldate" value="'+new Date().toISOString().slice(0,10)+'" style="width:auto"><select id="ldev" style="width:auto"><option>PLC(S7-1200)</option><option>PLC(S7-1500)</option><option>PLC(三菱FX)</option><option>海康AGV</option><option>读码器</option><option>变频器</option><option>传感器</option><option>其他</option></select></div><input type="text" id="lprob" placeholder="故障现象（必填）"><textarea id="ldet" placeholder="排查过程" style="height:70px"></textarea><textarea id="lsol" placeholder="解决方案" style="height:60px"></textarea><div class="fx g12"><select id="lstat" style="width:auto"><option value="pending">待跟进</option><option value="resolved">已解决</option><option value="help">需协助</option></select><button class="btn" onclick="addLog()">记录日志</button></div></div></div><div class="fx g12 mb12"><input type="text" id="lsearch" placeholder="搜索日志..." oninput="showLogs()" style="max-width:200px"><button class="btn btn-sm btn-s" onclick="setLogF(\'all\')">全部</button><button class="btn btn-sm btn-s" onclick="setLogF(\'mine\')">我的</button><button class="btn btn-sm btn-s" onclick="setLogF(\'urgent\')">紧急</button><button class="btn btn-sm btn-s" onclick="exportCSV()">导出CSV</button><button class="btn btn-sm btn-s" onclick="downloadTemplate()">下载模板</button><label class="btn btn-sm btn-s" style="cursor:pointer">导入CSV<input type="file" accept=".csv" onchange="importCSV(this)" style="display:none"></label></div><div id="logList"></div>';G('mainContent').innerHTML=h;showLogs()}
function addLog(){var prob=G('lprob').value.trim();if(!prob){toast('请填写故障现象');return}var log={id:'L'+Date.now()+Math.random().toString(36).slice(2,6),date:G('ldate').value,dev:G('ldev').value,problem:prob,detail:G('ldet').value.trim(),solution:G('lsol').value.trim(),status:G('lstat').value,author:MY_NAME,uid:MY_UID,time:Date.now()};S.logs.unshift(log);saveS();showLogs();G('lprob').value='';G('ldet').value='';G('lsol').value='';if(mqttOn)mqttC.publish('dm/log',JSON.stringify({type:'add',log:log}),{qos:1});toast('日志已记录')}
function delLog(id){if(!confirm('确定删除？'))return;S.logs=S.logs.filter(function(l){return l.id!==id});saveS();showLogs();if(mqttOn)mqttC.publish('dm/log',JSON.stringify({type:'del',id:id}),{qos:1})}
function setLogF(f){logFilter=f;showLogs()}
function downloadTemplate(){
  var t='日期,设备名称,故障现象,排查过程,解决方案,状态,负责人\n';
  t+='2025-06-15,PLC(S7-1200),通讯模块报错,检查网络连接和IP配置,更换通讯模块并重新配置,resolved,张三\n';
  var b=new Blob(['\uFEFF'+t],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='工作日志导入模板.csv';a.click()
}
function importCSV(input){
  var f=input.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    var added=0;
    var lines=e.target.result.split(/\r?\n/);
    for(var i=1;i<lines.length;i++){
      var cols=lines[i].split(',');
      if(cols.length<3||!cols[2].trim())continue;
      var log={
        id:'IM'+Date.now()+'_'+i,
        date:cols[0].trim()||new Date().toISOString().slice(0,10),
        dev:cols[1].trim()||'其他',
        problem:cols[2].trim(),
        detail:(cols[3]||'').trim(),
        solution:(cols[4]||'').trim(),
        status:(cols[5]||'pending').trim()||'pending',
        author:(cols[6]||MY_NAME).trim()||MY_NAME,
        uid:MY_UID,
        time:Date.now()
      };
      S.logs.push(log);added++
    }
    if(added>0){saveS();showLogs();toast('已导入'+added+'条日志')}
    else{toast('未识别到有效数据')}
  };
  r.readAsText(f,'utf-8')
}
function exportCSV(){var csv='\uFEFF日期,设备类型,故障现象,排查过程,解决方案,状态,记录人\n';S.logs.forEach(function(l){csv+=l.date+','+l.dev+',"'+l.problem+'","'+(l.detail||'')+'","'+(l.solution||'')+'",'+l.status+','+l.author+'\n'});var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='日志_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}
function showLogs(){var logs=S.logs||[],q=(G('lsearch')?G('lsearch').value:'').toLowerCase();if(logFilter==='mine')logs=logs.filter(function(l){return l.uid===MY_UID});else if(logFilter==='urgent')logs=logs.filter(function(l){return l.status==='help'||l.status==='pending'});if(q)logs=logs.filter(function(l){return l.problem.toLowerCase().indexOf(q)>=0||l.dev.toLowerCase().indexOf(q)>=0||(l.detail||'').toLowerCase().indexOf(q)>=0});if(!logs.length){G('logList').innerHTML='<p class="tc ts">暂无日志</p>';return}G('logList').innerHTML=logs.slice(0,80).map(function(l){var sc=l.status==='resolved'?'tag-ok':l.status==='help'?'tag-err':'tag-warn',st={pending:'待跟进',resolved:'已解决',help:'需协助'}[l.status];return '<div class="log-row"><div class="lm"><span>'+l.date+'</span><span>'+l.dev+'</span><span class="tag '+sc+'">'+st+'</span><span>'+l.author+'</span><button class="btn btn-r btn-sm" style="margin-left:auto" onclick="delLog(\''+l.id+'\')">删除</button></div><div class="lp">'+l.problem+'</div>'+(l.detail?'<div class="ts">排查：'+l.detail+'</div>':'')+(l.solution?'<div class="ts mt4">方案：'+l.solution+'</div>':'')+'</div>'}).join('')}

function renderBackup(){G('mainContent').innerHTML='<h2>备份/导入</h2><div class="card"><h3>备份数据</h3><p class="ts mb8">学习进度、日志导出为JSON（文件数据存储于浏览器IndexedDB，备份不含文件本体）</p><button class="btn" onclick="exportB()">导出备份</button></div><div class="card"><h3>导入数据</h3><p class="ts mb8">从JSON恢复数据</p><input type="file" id="bimport" accept=".json" class="hide" onchange="importB(this.files)"><button class="btn btn-s" onclick="G(\'bimport\').click()">选择文件导入</button></div><div class="card"><h3>数据统计</h3><p class="ts">学习进度：'+S.doneDays.length+'/28 | 日志：'+(S.logs||[]).length+' | 手册：'+(S.manualFiles||[]).length+'（已就绪：'+Object.keys(dataCache).length+'）</p></div>'}
function exportB(){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:'application/json'}));a.download='运维备份_'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('备份已导出')}
function importB(files){if(!files||!files.length)return;var r=new FileReader();r.onload=function(e){try{S=JSON.parse(e.target.result);saveS();toast('导入成功！');switchTab(CURTAB)}catch(err){toast('文件格式错误')}};r.readAsText(files[0])}
// ====== 辅助 ======
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function updateSummary(){var t=0;for(var i=1;i<=4;i++)LDATA['w'+i].d.forEach(function(_,j){if(S.doneDays.indexOf('w'+i+'d'+(j+1))>=0)t++});G('totalProgress').textContent=Math.round(t/28*100)+'%';G('todayTasks').textContent=t+'/28';var d=0;LDATA['w'+S.curWeek].d.forEach(function(_,j){if(S.doneDays.indexOf('w'+S.curWeek+'d'+(j+1))>=0)d++});G('lastStudy').textContent=d>0?'已完成 '+d+'/7':'-'}
function d2ab(dataURI){var b64=dataURI.split(',')[1],raw=atob(b64),arr=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr.buffer}

// ====== MQTT ======
var BROKERS=[{n:'EMQX',u:'wss://broker.emqx.io:8084/mqtt'},{n:'HiveMQ',u:'wss://broker.hivemq.com:8884/mqtt'},{n:'Mosquitto',u:'wss://test.mosquitto.org:8081/mqtt'}]
var mqttC=null,mqttOn=false,mqttIdx=0,mqttTry=0,onlinePeers=[],peerMap={}
var CHUNK=150000

// ====== 操作手册 v11 ======
var recvBuf={}
var metaStore={}

function upsertMeta(entry){if(!entry||!entry.fileId)return;metaStore[entry.fileId]=entry}

// 添加文件到本地存储（元数据 + IDB + 内存缓存）
function addLocalFile(fileId,name,size,type,from,time,dataUrl){
  // 1. 内存缓存
  dataCache[fileId]=dataUrl
  // 2. IndexedDB
  saveFileToIDB(fileId,dataUrl).catch(function(e){console.error('IDB save failed:',e)})
  // 3. 元数据到 S.manualFiles（不含 data）
  var found=false
  for(var i=0;i<(S.manualFiles||[]).length;i++){
    if(S.manualFiles[i].fileId===fileId){found=true;break}
  }
  if(!found)S.manualFiles.push({fileId:fileId,name:name,size:size,type:type,from:from,time:time})
  saveS()
}

// 响应文件请求
function respFileReq(fileId){
  var d=dataCache[fileId];if(!d)return
  var b64=d.split(',')[1],total=Math.ceil(b64.length/CHUNK)
  if(!mqttOn)return
  // 找到元数据
  var meta=null
  for(var i=0;i<(S.manualFiles||[]).length;i++){if(S.manualFiles[i].fileId===fileId){meta=S.manualFiles[i];break}}
  if(!meta)return
  mqttC.publish('dm/manual',JSON.stringify({type:'meta',fileId:fileId,name:meta.name,size:meta.size,ftype:meta.type,from:meta.from,time:meta.time,totalChunks:total}),{qos:1})
  sendChunks(fileId,b64,total)
}

// 发送分块（每100ms发3块）
function sendChunks(fileId,b64,total){
  var idx=0
  function sendBatch(){
    var sent=0
    while(sent<3&&idx<total){
      var start=idx*CHUNK,end=Math.min(start+CHUNK,b64.length),chunk=b64.substring(start,end)
      mqttC.publish('dm/manual_chunk',JSON.stringify({fileId:fileId,chunkIndex:idx,data:chunk,total:total}),{qos:1})
      idx++;sent++
    }
    if(idx<total)setTimeout(sendBatch,100)
    else mqttC.publish('dm/manual',JSON.stringify({type:'done',fileId:fileId}),{qos:1})
  }
  sendBatch()
}

function handleManualMeta(msg){
  if(!msg.fileId||!msg.name)return
  upsertMeta({fileId:msg.fileId,name:msg.name,size:msg.size,type:msg.ftype,from:msg.from,time:msg.time,totalChunks:msg.totalChunks})
  if(CURTAB==='manual')renderManual()
}

function requestFile(fileId){
  if(!mqttOn){toast('未连接到同步服务');return}
  if(recvBuf[fileId]){toast('已在接收中');return}
  var meta=metaStore[fileId];if(!meta||!meta.totalChunks){toast('文件信息不可用');return}
  recvBuf[fileId]={totalChunks:meta.totalChunks,chunks:new Map(),meta:meta,received:0,retryCount:0,retryTimer:null}
  mqttC.publish('dm/manual',JSON.stringify({type:'req_file',fileId:fileId,from:MY_NAME}),{qos:1})
  renderManual()
  toast('已请求下载: '+meta.name)
}

function requestSelected(){
  var cbs=document.querySelectorAll('.file-cb:checked'),cnt=0
  cbs.forEach(function(cb){requestFile(cb.value);cnt++})
  if(!cnt)toast('请先勾选要下载的文件')
}

function handleManualChunk(msg){
  var buf=recvBuf[msg.fileId];if(!buf)return
  if(!buf.chunks.has(msg.chunkIndex)){
    buf.chunks.set(msg.chunkIndex,msg.data);buf.received++
    if(CURTAB==='manual')renderManual()
    if(buf.received>=buf.totalChunks){
      clearTimeout(buf.retryTimer)
      assembleChunks(msg.fileId,buf)
    }
  }
}

function handleManualDone(msg){
  var buf=recvBuf[msg.fileId];if(!buf)return
  if(buf.received>=buf.totalChunks)return
  function doRetry(){
    var b=recvBuf[msg.fileId];if(!b)return
    if(b.received>=b.totalChunks){assembleChunks(msg.fileId,b);return}
    b.retryCount++
    if(b.retryCount>10){toast('接收超时: '+b.meta.name);delete recvBuf[msg.fileId];renderManual();return}
    var missing=[]
    for(var i=0;i<b.totalChunks;i++){if(!b.chunks.has(i))missing.push(i)}
    if(mqttOn)mqttC.publish('dm/manual',JSON.stringify({type:'req_chunks',fileId:msg.fileId,missing:missing,total:b.totalChunks,missing_cnt:missing.length}),{qos:1})
    b.retryTimer=setTimeout(doRetry,3000)
  }
  setTimeout(doRetry,1000)
}

function handleManualReqChunks(msg){
  var b64=null
  for(var i=0;i<(S.manualFiles||[]).length;i++){
    if(S.manualFiles[i].fileId===msg.fileId){
      b64=(dataCache[msg.fileId]||'').split(',')[1];break
    }
  }
  if(!b64)return
  var mi=0
  function sendNextMiss(){
    if(mi>=msg.missing.length)return
    var idx=msg.missing[mi],start=idx*CHUNK,end=Math.min(start+CHUNK,b64.length)
    if(mqttOn)mqttC.publish('dm/manual_chunk',JSON.stringify({fileId:msg.fileId,chunkIndex:idx,data:b64.substring(start,end),total:msg.total||0}),{qos:1})
    mi++;setTimeout(sendNextMiss,50)
  }
  sendNextMiss()
}

function assembleChunks(fileId,buf){
  var sorted=[];buf.chunks.forEach(function(data,idx){sorted.push({idx:idx,data:data})});sorted.sort(function(a,b){return a.idx-b.idx})
  var full=sorted.map(function(c){return c.data}).join('')
  var mime=buf.meta.type||'application/octet-stream',dataUrl='data:'+mime+';base64,'+full
  addLocalFile(fileId,buf.meta.name,buf.meta.size,buf.meta.type,buf.meta.from,buf.meta.time,dataUrl)
  delete recvBuf[fileId]
  delete metaStore[fileId]
  toast('下载完成: '+buf.meta.name)
  if(CURTAB==='manual')renderManual()
}

function renderManual(){
  var h='<h2>操作手册 <span class="ts">(v11 文件共享 | 刷新不丢文件)</span></h2>'
  h+='<div class="card"><h3>上传操作文档</h3>'
  h+='<div class="upload-area" onclick="G(\'fupload\').click()"><div style="font-size:2rem;margin-bottom:8px">&#128193;</div>点击上传文档（PDF/Word）<br><span class="ts">上传后自动持久化到浏览器存储，刷新/重启浏览器不丢失</span></div>'
  h+='<input type="file" id="fupload" accept=".pdf,.doc,.docx" multiple class="hide" onchange="uploadFiles(this.files)"></div>'

  // 本地已就绪（dataCache 中有数据）
  var readyFiles=S.manualFiles.filter(function(f){return hasFileData(f.fileId)})
  if(readyFiles.length){
    h+='<div class="card"><h3>本机已存档</h3><div class="file-explorer">'
    readyFiles.forEach(function(f){
      var icon='&#128196;';if(f.name.toLowerCase().endsWith('.pdf'))icon='&#128218;';else if(f.name.toLowerCase().endsWith('.doc')||f.name.toLowerCase().endsWith('.docx'))icon='&#128221;';else if(f.name.toLowerCase().endsWith('.xls')||f.name.toLowerCase().endsWith('.xlsx')||f.name.toLowerCase().endsWith('.csv'))icon='&#128202;'
      h+='<div class="file-item"><span class="file-icon">'+icon+'</span><div class="file-info"><div class="file-name ready" onclick="openManual(\''+f.fileId+'\')">'+f.name+'</div><div class="file-meta">'+fmtSize(f.size)+'</div></div><div class="file-actions"><span class="tag tag-ok">已存档</span><button class="btn btn-r btn-sm" onclick="delManual(\''+f.fileId+'\')">删除</button></div></div>'
    })
    h+='</div></div>'
  }

  // 可接收文件
  var metaKeys=Object.keys(metaStore)
  if(metaKeys.length){
    h+='<div class="card"><h3>共享文档库</h3><p class="ts">由任意电脑上传的文档均可在此下载到本机</p>'
    h+='<div class="batch-actions"><button class="btn btn-sm" onclick="requestSelected()">下载勾选</button><button class="btn btn-sm btn-s" onclick="selectAllMeta(true)">全选</button><button class="btn btn-sm btn-s" onclick="selectAllMeta(false)">取消</button></div><div class="file-explorer">'
    metaKeys.forEach(function(k){
      var m=metaStore[k],buf=recvBuf[k]
      if(!m||!m.name)return
      var pct=buf&&buf.totalChunks?Math.round(buf.received/buf.totalChunks*100):0
      var retryInfo=buf&&buf.retryCount>0?' 重试'+buf.retryCount:''
      h+='<div class="file-item"><input type="checkbox" class="file-cb" value="'+k+'" '+(buf?'checked disabled':'')+' style="width:auto;flex-shrink:0"><span class="file-icon">'+(function(){var n=m.name.toLowerCase();if(n.endsWith('.pdf'))return '&#128218;';if(n.endsWith('.doc')||n.endsWith('.docx'))return '&#128221;';if(n.endsWith('.xls')||n.endsWith('.xlsx')||n.endsWith('.csv'))return '&#128202;';return '&#128196;'})()+'</span><div class="file-info"><div class="file-name">'+m.name+'</div><div class="file-meta">'+fmtSize(m.size)+' | 来自：'+m.from+'</div></div><div class="file-actions">'
      if(buf)h+='<span class="tag tag-warn" style="display:flex;align-items:center;gap:4px">'+pct+'%'+retryInfo+'<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div></span>'
      else h+='<button class="btn btn-sm" onclick="requestFile(\''+k+'\')">下载到</button>'
      h+='</div></div>'
    })
    h+='</div></div>'
  }

  h+='<div class="card"><h3>常见故障知识库</h3><input type="text" id="fs" placeholder="搜索故障..." oninput="searchF()" class="mb12"><div id="fResults"></div></div>'
  G('mainContent').innerHTML=h;searchF()
}

function selectAllMeta(v){document.querySelectorAll('.file-cb:not([disabled])').forEach(function(cb){cb.checked=v})}

function uploadFiles(files){
  for(var i=0;i<files.length;i++){(function(file){
    var reader=new FileReader()
    reader.onload=function(e){
      var dataUrl=e.target.result,fileId='f'+Date.now()+'_'+Math.random().toString(36).slice(2,8)
      addLocalFile(fileId,file.name,file.size,file.type,MY_NAME,Date.now(),dataUrl)
      renderManual()
      var b64=dataUrl.split(',')[1],total=Math.ceil(b64.length/CHUNK)
      if(mqttOn){
        mqttC.publish('dm/manual',JSON.stringify({type:'meta',fileId:fileId,name:file.name,size:file.size,ftype:file.type,from:MY_NAME,time:Date.now(),totalChunks:total}),{qos:1})
        upsertMeta({fileId:fileId,name:file.name,size:file.size,type:file.type,from:MY_NAME,time:Date.now(),totalChunks:total})
      }
      toast(file.name+' 已保存'+(mqttOn?'并广播':'（等待连接）'))
    }
    reader.readAsDataURL(file)
  })(files[i])}
}

function openManual(fileId){
  var d=dataCache[fileId]
  if(d){
    doOpen(fileId,d);return
  }
  // 内存没有，尝试从 IDB 加载
  getFileFromIDB(fileId).then(function(d2){
    if(d2){dataCache[fileId]=d2;doOpen(fileId,d2)}
    else toast('文件数据不存在，请重新接收')
  })
}
function doOpen(fileId,dataUrl){
  for(var i=0;i<S.manualFiles.length;i++){
    if(S.manualFiles[i].fileId===fileId){
      var f=S.manualFiles[i]
      if(f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf')){
        window.open(URL.createObjectURL(new Blob([d2ab(dataUrl)],{type:'application/pdf'})),'_blank')
      }else{
        mammoth.convertToHtml({arrayBuffer:d2ab(dataUrl)}).then(function(r){
          var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+f.name+'</title><style>body{font-family:"Microsoft YaHei",sans-serif;max-width:900px;margin:40px auto;padding:20px;line-height:1.8;color:#333}h1,h2,h3{color:#1a2736;margin:16px 0 8px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ddd;padding:8px}</style></head><body>'+(r.value||'<p>无可读文本</p>')+'</body></html>'
          window.open(URL.createObjectURL(new Blob([html],{type:'text/html;charset=utf-8'})),'_blank')
        }).catch(function(){var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d2ab(dataUrl)],{type:f.type}));a.download=f.name;a.click()})
      }
      return
    }
  }
  toast('文件元数据丢失')
}

function delManual(fileId){
  if(!confirm('确定删除？将从本地永久移除'))return
  S.manualFiles=S.manualFiles.filter(function(f){return f.fileId!==fileId})
  delete dataCache[fileId]
  delete recvBuf[fileId];delete metaStore[fileId]
  deleteFromIDB(fileId)
  saveS();renderManual()
  if(mqttOn)mqttC.publish('dm/manual',JSON.stringify({type:'del',fileId:fileId}),{qos:1})
}

function searchF(){
  var q=(G('fs')?G('fs').value:'').toLowerCase(),list=FAULTS
  if(q)list=FAULTS.filter(function(f){return f.t.toLowerCase().indexOf(q)>=0||f.c.toLowerCase().indexOf(q)>=0||f.s.toLowerCase().indexOf(q)>=0})
  var h=list.length?list.map(function(f){return '<div class="log-row"><div class="lm"><span class="tag tag-warn">'+f.c+'</span></div><div class="lp">'+f.t+'</div><div class="ts">'+f.s+'</div></div>'}).join(''):'<p class="tc ts">无匹配结果</p>'
  if(G('fResults'))G('fResults').innerHTML=h
}

// ====== MQTT 连接 ======
function mqttConnect(){
  if(typeof mqtt==='undefined'){setTimeout(mqttConnect,500);return}
  if(mqttTry>=12){setTimeout(function(){mqttTry=0;mqttConnect()},15000);return}
  var br=BROKERS[mqttIdx%3]
  try{if(mqttC){try{mqttC.end(true)}catch(e){}}mqttC=mqtt.connect(br.u,{clientId:'dmpX_'+MY_UID.slice(-8),clean:true,connectTimeout:6000,reconnectPeriod:1500,keepalive:30})}catch(e){mqttTry++;setTimeout(mqttConnect,1000);return}
  mqttC.on('connect',function(){
    mqttOn=true;mqttTry=0;onlinePeers=[MY_NAME];peerMap={}
    mqttC.subscribe(['dm/log','dm/manual','dm/manual_chunk','dm/hello','dm/peer','dm/sync'],{qos:1})
    mqttC.publish('dm/hello',JSON.stringify({name:MY_NAME,uid:MY_UID,time:Date.now()}),{qos:1})
    setInterval(function(){if(mqttOn)mqttC.publish('dm/peer',JSON.stringify({name:MY_NAME,uid:MY_UID,time:Date.now()}),{qos:1})},20000)
    updateCollab()
    setTimeout(function(){broadcastLocalMetas()},3000)
  })
  mqttC.on('message',function(topic,payload){
    try{var msg=JSON.parse(payload.toString());if(!msg||msg.uid===MY_UID)return}catch(e){return}
    if(topic==='dm/hello'||topic==='dm/peer'){
      if(msg.name&&onlinePeers.indexOf(msg.name)<0)onlinePeers.push(msg.name)
      if(msg.uid)peerMap[msg.uid]={name:msg.name,time:Date.now()}
      if(msg.reqSync)setTimeout(function(){broadcastLocalMetas()},500)
      updateCollab()
    }else if(topic==='dm/log'){
      if(msg.type==='add'&&msg.log){var idx=-1;for(var i=0;i<S.logs.length;i++){if(S.logs[i].id===msg.log.id){idx=i;break}}if(idx>=0){if((msg.log.time||0)>(S.logs[idx].time||0))S.logs[idx]=msg.log}else S.logs.push(msg.log);saveS();if(CURTAB==='log')showLogs()}
      else if(msg.type==='del'&&msg.id){S.logs=S.logs.filter(function(l){return l.id!==msg.id});saveS();if(CURTAB==='log')showLogs()}
    }else if(topic==='dm/manual'){
      if(msg.type==='meta')handleManualMeta(msg)
      else if(msg.type==='done')handleManualDone(msg)
      else if(msg.type==='del'&&msg.fileId){S.manualFiles=S.manualFiles.filter(function(f){return f.fileId!==msg.fileId});delete recvBuf[msg.fileId];delete metaStore[msg.fileId];delete dataCache[msg.fileId];deleteFromIDB(msg.fileId);saveS();if(CURTAB==='manual')renderManual()}
      else if(msg.type==='req_chunks')handleManualReqChunks(msg)
      else if(msg.type==='req_file'&&msg.fileId)respFileReq(msg.fileId)
    }else if(topic==='dm/manual_chunk'){
      if(msg.fileId&&msg.chunkIndex!==undefined&&msg.data)handleManualChunk(msg)
    }else if(topic==='dm/sync'){
      if(msg.logs){var m2={};S.logs.forEach(function(l){m2[l.id]=l});msg.logs.forEach(function(l){var ex=m2[l.id];if(!ex||(l.time||0)>(ex.time||0))m2[l.id]=l});S.logs=Object.values(m2);saveS();if(CURTAB==='log')showLogs()}
    }
  })
  mqttC.on('close',function(){mqttOn=false;updateCollab()})
  mqttC.on('error',function(){mqttTry++;setTimeout(mqttConnect,1000)})
}

function broadcastLocalMetas(){
  if(!mqttOn)return
  S.manualFiles.forEach(function(f){
    var d=dataCache[f.fileId]
    if(d){
      var total=Math.ceil(d.split(',')[1].length/CHUNK)
      mqttC.publish('dm/manual',JSON.stringify({type:'meta',fileId:f.fileId,name:f.name,size:f.size,ftype:f.type,from:MY_NAME,time:f.time,totalChunks:total}),{qos:1})
    }
  })
}

function switchBroker(){mqttIdx++;mqttTry=0;recvBuf={};metaStore={};mqttConnect()}
function updateCollab(){
  var dot=G('dot'),count=G('onlineCount'),status=G('netStatus')
  if(!dot||!count||!status)return
  dot.style.background=mqttOn?'var(--ok)':'var(--err)'
  count.textContent=onlinePeers.length
  status.textContent=mqttOn?BROKERS[mqttIdx%3].n:'未连接'
}

// ====== 启动 ======
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'

// 启动时从 IndexedDB 恢复所有文件数据到 dataCache
function restoreDataCache(){
  return loadAllFromIDB().then(function(items){
    items.forEach(function(item){dataCache[item.fileId]=item.data})
    console.log('Restored '+items.length+' files from IndexedDB')
  }).catch(function(e){console.error('IndexedDB restore failed:',e)})
}

restoreDataCache().then(function(){
  switchTab('today');updateSummary();mqttConnect()
})
setTimeout(function(){if(!mqttOn)mqttConnect()},3000)
setTimeout(function(){if(!mqttOn)mqttConnect()},8000)
</script>
