<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>设备运维学习平台 v13</title>
<style>
:root{--bg:#0f1923;--bg2:#1a2736;--bg3:#213244;--bg4:#2a3d54;--text:#d0dce8;--text2:#8ba4be;--accent:#4fc3f7;--ok:#2ecc71;--warn:#f39c12;--err:#e74c3c;--border:#3a4d66;--radius:8px;--radius-sm:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{display:flex;height:100vh;overflow:hidden}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.main-body{flex:1;padding:16px;overflow-y:auto}
.collab-bar{padding:8px 16px;border-top:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;gap:10px;font-size:.8rem;flex-shrink:0;flex-wrap:wrap}
.side-header{padding:14px;border-bottom:1px solid var(--border);background:var(--bg3)}
.side-nav{flex:1;padding:8px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{text-align:left;background:transparent;color:var(--text);border:none;padding:10px 14px;cursor:pointer;font-size:.88rem;border-radius:0;transition:all .15s}
.nav-item:hover{background:var(--bg3);color:var(--accent)}
.nav-item.cur{background:var(--accent);color:var(--bg)}
.btn{background:var(--accent);color:var(--bg);border:none;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;font-size:.88rem;transition:all .15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:4px 10px;font-size:.78rem}.btn-s{background:var(--bg3);color:var(--text)}.btn-r{background:var(--err);color:#fff}
.card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.card h3{margin-bottom:6px;color:var(--accent);font-size:.98rem}
.fx{display:flex;gap:8px;align-items:center}.fxw{flex-wrap:wrap}.fc{display:flex;flex-direction:column;gap:8px}.f1{flex:1}
.g12{gap:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mt8{margin-top:8px}.mt12{margin-top:12px}
.ts{font-size:.8rem;color:var(--text2)}.tc{text-align:center}.hide{display:none!important}
input,select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:var(--radius-sm);font-size:.88rem;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:500}
.tag-ok{background:rgba(46,204,113,.2);color:var(--ok)}.tag-warn{background:rgba(243,156,18,.2);color:var(--warn)}.tag-err{background:rgba(231,76,60,.2);color:var(--err)}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:30px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-area:hover{border-color:var(--accent);background:var(--bg2)}.upload-area input[type=file]{display:none}
.file-explorer{background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden}
.file-item{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #eef1f5;transition:background .15s}
.file-item:hover{background:#f0f5ff}
.file-item:last-child{border-bottom:none}
.file-icon{font-size:1.3rem;margin-right:10px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-weight:500;color:#1a2736;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-name.ready{cursor:pointer;color:var(--accent)}
.file-name.ready:hover{text-decoration:underline}
.file-meta{font-size:0.78rem;color:#999;margin-top:2px}
.file-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.file-item .prog-bar{flex-shrink:0;width:60px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.file-item .prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.log-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}

.log-row .lp{font-weight:500;margin-bottom:4px;font-size:.92rem}
.pq{margin-bottom:16px}.pq .qt{margin-bottom:6px;font-weight:500}.po{display:flex;flex-direction:column;gap:5px}
.popt{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;transition:all .15s;font-size:.88rem}

.sum-cards{display:flex;gap:10px;flex-wrap:wrap}.sum-cards .card{min-width:90px;flex:1;text-align:center}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.batch-actions{display:flex;gap:8px;align-items:center;padding:8px 0}
.lesson-content{line-height:1.9;font-size:.95rem;color:var(--text)}
.lesson-content h3{color:var(--accent);margin:20px 0 8px;font-size:1.05rem}

.prac-feedback{font-size:.82rem;padding:8px 12px;margin-top:6px;border-radius:var(--radius-sm)}
.prac-feedback.ok{background:rgba(46,204,113,.1);color:var(--ok);border:1px solid rgba(46,204,113,.3)}
.prac-feedback.er{background:rgba(231,76,60,.1);color:var(--err);border:1px solid rgba(231,76,60,.3)}
</style>
</head>

// ====== IndexedDB ======
function openIDB(){
  return new Promise(function(resolve,reject){
    var req=indexedDB.open('dm_files_v10',1)
    req.onupgradeneeded=function(e){e.target.result.createObjectStore('files',{keyPath:'fileId'})}
    req.onsuccess=function(e){resolve(e.target.result)}
    req.onerror=function(){reject(req.error)}
  })
}
function saveFileToIDB(fileId,data){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readwrite')
      tx.objectStore('files').put({fileId:fileId,data:data})
      tx.oncomplete=resolve;tx.onerror=reject
    })
  })
}
function getFileFromIDB(fileId){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readonly')
      var req=tx.objectStore('files').get(fileId)
      req.onsuccess=function(){resolve(req.result?req.result.data:null)}
      req.onerror=reject
    })
  })
}
function loadAllFromIDB(){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readonly')
      var req=tx.objectStore('files').getAll()
      req.onsuccess=function(){resolve(req.result||[])}
      req.onerror=reject
    })
  })
}
function deleteFromIDB(fileId){
  return openIDB().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('files','readwrite')
      tx.objectStore('files').delete(fileId)
      tx.oncomplete=resolve;tx.onerror=reject
    })
  })
}

var PDATA={choice:[{q:'RS485总线需要终端电阻吗？',opt:['需要','不需要'],a:'需要',explanation:'RS485总线两端必须各接120Ω终端电阻以消除信号反射，不接会导致通信时断时续。'},{q:'Modbus RTU校验方式？',opt:['CRC16','奇校验','偶校验','无校验'],a:'CRC16',explanation:'Modbus RTU使用CRC16（循环冗余校验），2字节位于报文末尾，用于检测传输错误。'},{q:'S7-1200编程软件？',opt:['TIA Portal','STEP 7','GX Works','Codesys'],a:'TIA Portal',explanation:'S7-1200/1500系列使用TIA Portal（博途）；STEP 7用于S7-300/400；GX Works是三菱的编程软件。'},{q:'AGV导航精度最高的是？',opt:['激光SLAM','磁条导航','二维码导航','惯性导航'],a:'激光SLAM',explanation:'激光SLAM导航精度可达±5mm且无需地面标识。二维码精度也高但需贴码维护。'},{q:'PLC输入模块最常见故障？',opt:['电源故障','接线松动','程序错误','通信中断'],a:'接线松动',explanation:'现场振动导致端子螺丝松动是最常见故障，表现为信号时有时无，需定期紧固端子。'},{q:'RS485 A/B线接反会怎样？',opt:['通信中断','烧毁设备','自动纠正','速率变慢'],a:'通信中断',explanation:'RS485差分信号依赖A、B线的极性，接反会导致接收端解出反相数据，通信完全中断。'},{q:'S7-1200模拟量输入原始值范围？',opt:['0~27648','0~32767','4~20','0~10000'],a:'0~27648',explanation:'S7-1200模拟量输入模块将4-20mA/0-10V信号转换为0~27648的数字值，0~27648对应量程。'},{q:'AGV锂电池最佳充电时机？',opt:['低于10%','低于5%','低于20%','用完再充'],a:'低于20%',explanation:'磷酸铁锂电池严禁深度放电，电量低于20%时应自动返回充电，低于5%可能永久损坏电池。'},{q:'PROFINET分配设备名称的协议？',opt:['DCP','DHCP','DNS','ARP'],a:'DCP',explanation:'PROFINET通过DCP(Discovery and Configuration Protocol)分配设备名称和IP地址，不是DHCP。'},{q:'变频器过流报警(OC)最常见原因？',opt:['加减速太快','电压过高','通讯中断','参数丢失'],a:'加减速太快',explanation:'加减速时间设置过短导致电流冲击超出变频器额定值，应适当延长加减速时间参数。'},{q:'安全PLC与普通PLC的关键区别？',opt:['冗余双通道','速度更快','支持以太网','价格更贵'],a:'冗余双通道',explanation:'安全PLC采用冗余双通道设计，两个CPU同时运算并交叉校验，任一故障立即安全停机。'},{q:'OPC UA相比Modbus的核心优势？',opt:['内置加密认证','速度更快','协议更简单','无需编程'],a:'内置加密认证',explanation:'OPC UA内置加密、证书认证和用户鉴权，解决了Modbus明文传输无安全防护的致命缺陷。'}],bool:[{q:'Modbus TCP默认使用端口502。',a:'true',explanation:'Modbus TCP标准端口为502，IANA已正式分配。可用telnet IP 502测试端口是否可达。'},{q:'三菱FX系列可用TIA Portal编程。',a:'false',explanation:'三菱FX系列PLC使用GX Works/GX Developer编程，TIA Portal是西门子的专用编程平台。'},{q:'AGV锂电池应完全放电后再充电。',a:'false',explanation:'锂电池严禁完全放空，深度放电会造成永久性损伤。应在电量低于20%前充电。'},{q:'RS232通信最远距离可达1200米。',a:'false',explanation:'RS232最大传输距离仅约15米，速率越高距离越短。1200米是RS485的最大距离。'},{q:'PLC扫描周期包含读输入、执行程序、写输出三步。',a:'true',explanation:'PLC每个扫描周期确实包含三个阶段：读取输入映像区→执行用户程序→刷新输出映像区。'},{q:'RS485终端电阻阻值是120Ω。',a:'true',explanation:'RS485标准规定终端匹配电阻为120Ω，等于双绞线特征阻抗，用于消除信号反射。'},{q:'4-20mA信号中0mA表示传感器正常但量程为零。',a:'false',explanation:'4mA才是零点（量程下限），0mA表示传感器断线或掉电，利用这一特性可检测线路故障。'},{q:'AGV安全激光的急停区域通常设置为5米。',a:'false',explanation:'安全激光急停区通常为1-1.5米，减速区为3-5米。急停区太大会导致AGV频繁误停。'},{q:'梯形图的常开触点在输入为0时导通。',a:'false',explanation:'常开触点(-| |-)在输入为1(ON)时闭合导通，输入为0(OFF)时断开。常闭触点(-|/|-)才是在输入0时导通。'},{q:'MODBUS TCP报文中包含CRC16校验。',a:'false',explanation:'Modbus TCP去掉了CRC16（TCP/IP层已有校验），改为MBAP报文头7字节+功能码+数据。'}],scene:[{q:'产线停止，PLC输入灯正常、输出灯不亮，原因？',hint:'检查PLC运行状态、程序逻辑、输出模块电源'},{q:'AGV在B区频繁报定位丢失，排查？',hint:'检查地面二维码/磁条有无脏污破损、导航传感器状态、站点坐标是否偏移'},{q:'Modbus通信时断时续，如何定位？',hint:'检查RS485接线和终端电阻、波特率一致性、屏蔽层接地、主从站地址冲突'},{q:'变频器带电机运行中突然报OC（过流），排查思路？',hint:'检查电机是否堵转/卡死、加减速时间是否过短、电机绕组绝缘是否正常'},{q:'新装S7-1200上电后CPU STOP灯常亮，如何处理？',hint:'连接TIA Portal查看诊断缓冲区，检查是否为首次上电需下载硬件配置，或程序中有OB调用错误、I/O访问错误'},{q:'一台潜伏式AGV到达目标站点后货叉无法顶升，排查？',hint:'检查货叉限位传感器是否卡住、顶升电机是否得电、机械结构是否卡滞、上位机是否下发了顶升指令'}]}

LESSONS["w1d1"]={title:"RS232协议基础与接线",content:'<h3>什么是 RS232？</h3><p>RS232 是工业自动化中最经典的串行通信标准，1960年由美国电子工业协会发布。虽然年纪大了，但至今仍在 PLC 调试、仪表通信、串口打印机等场景广泛使用。它采用<strong>单端信号</strong>传输，即用一根信号线相对于地线(GND)的电压高低来表示数据。</p><h3>电气特性</h3><p>RS232 使用负逻辑：<strong>-3V~-15V 表示逻辑"1"</strong>（MARK），<strong>+3V~+15V 表示逻辑"0"</strong>（SPACE）。注意！这和常见的 TTL 电平（0V=0，5V=1）是反的——这点经常引起接线错误。传输距离一般不超过 <strong>15米</strong>，速率最高约 115.2kbps。</p><h3>DB9 针脚定义（必须背下来）</h3><div class="highlight"><p>记住最核心的 3 个引脚：<br><strong>Pin 2 — RXD（接收数据）</strong>：本端接收对方发来的数据<br><strong>Pin 3 — TXD（发送数据）</strong>：本端向对方发送数据<br><strong>Pin 5 — GND（信号地）</strong>：双方共地参考</p></div><p>实测时最容易犯的错误就是把 2 和 3 接反了。如果通信不通，<strong>第一步就是交叉 TXD 和 RXD</strong>（即本端 2 接对端 3，本端 3 接对端 2）</p><h3>波特率与帧格式</h3><p>通信双方必须在这些参数上一致：<strong>波特率</strong>（常见：9600、19200、115200）、<strong>数据位</strong>（通常 8 位）、<strong>停止位</strong>（1 或 2）、<strong>奇偶校验</strong>（无/奇/偶）。比如 "9600,8,N,1" 表示 9600bps、8 数据位、无校验、1 停止位。</p>'};
LESSONS["w1d2"]={title:"RS485总线拓扑与终端电阻",content:'<h3>从 RS232 到 RS485：为什么需要总线？</h3><p>RS232 只能<strong>一对一</strong>通信，而工厂里往往一个主站要跟几十个从站通信。RS485 解决了这个问题——它支持 <strong>1 个主站 + 最多 32 个从站</strong>（使用中继器可扩展到 256 个），传输距离可达 <strong>1200 米</strong>。</p><h3>差分信号：抗干扰的秘密</h3><p>RS485 的秘密武器是<strong>差分信号</strong>。它用两根线 A（非反相）和 B（反相），接收端通过比较 A-B 的电压差来判断数据。因为两根线绞在一起，外部干扰同时加到两线上（共模干扰），差分接收器自动抵消。这就是为什么 RS485 用双绞线而不用平行线。</p><h3>终端电阻为什么是 120Ω？</h3><div class="highlight"><p>信号在长线传输时会在端点反射回来，造成波形畸变。终端电阻的作用是<strong>吸收信号能量，消除反射</strong>。阻值选 120Ω 是因为它等于双绞线的<strong>特征阻抗</strong>（阻抗匹配原理）。<br><strong>必须在总线的最远端和最末端各接一个 120Ω 电阻。</strong>注意：有的 RS485 设备自带终端电阻跳线，不要重复加。</p></div><h3>接线要点</h3><p>所有设备的 A 连 A、B 连 B（同名端相连），形成<strong>菊花链</strong>拓扑——一根总线从头串到尾，不要分叉（星形）。分叉会造成阻抗不连续，信号反射严重，通信时断时续。</p>'};
LESSONS["w1d3"]={title:"Modbus RTU报文解析",content:'<h3>Modbus：工业通信的"普通话"</h3><p>Modbus 是 1979 年 Modicon 公司发布的开放协议，因简单高效成为事实上的工业标准。Modbus RTU 运行在 RS485/RS232 物理层上，采用<strong>主从模式</strong>：主站发起请求，从站应答。一次只能有一个主站。</p><h3>报文结构（必须会看）</h3><div class="highlight"><p>Modbus RTU 报文格式：<br><strong>地址码（1字节）</strong> + <strong>功能码（1字节）</strong> + <strong>数据区（N字节）</strong> + <strong>CRC16校验（2字节）</strong></p></div><p>举例：<code>01 03 00 00 00 02 C4 0B</code><br>01=1号从站地址 | 03=读保持寄存器 | 00 00=起始地址0 | 00 02=读2个寄存器 | C4 0B=CRC16校验值</p><h3>三大核心功能码</h3><p><strong>03（读保持寄存器）</strong>：最常用，读取从站的参数、测量值等。比如读变频器的运行频率。<br><strong>06（写单个寄存器）</strong>：修改单个参数，比如写入变频器的目标频率。<br><strong>10（写多个寄存器）</strong>：批量修改多个参数，比如一次性设置 PID 的 P/I/D 三个值。</p><h3>CRC16 校验</h3><p>每个报文末尾的 2 字节 CRC 用于检测传输错误。从站收到后重新计算，不匹配则丢弃。用串口助手抓包时，可以勾选"自动计算 CRC"选项来验证。</p>'};
LESSONS["w1d4"]={title:"Modbus TCP协议",content:'<h3>从串口到以太网</h3><p>Modbus TCP 是把 Modbus 协议搬到 TCP/IP 网络上运行的版本，使用标准以太网接口（RJ45），不再受 RS485 距离和节点数限制。一个 Modbus TCP 网络上可以有无限多个设备（取决于 IP 地址）。</p><h3>报文差异</h3><div class="highlight"><p>与 RTU 最大的区别：<strong>去掉了 CRC16 校验</strong>（TCP/IP 层已有校验），新增了 <strong>MBAP 报文头（7字节）</strong>。MBAP 包含：事务标识符(2字节)+协议标识符(2字节,固定0000)+长度(2字节)+单元标识符(1字节)。即 MBAP头 + 功能码 + 数据 的结构。</p></div><h3>端口与连接</h3><p>Modbus TCP 默认使用 <strong>端口 502</strong>。一个主站可以同时连接多个从站（每个从站一个 TCP 连接）。实际调试时，可以用 <code>telnet 192.168.1.100 502</code> 测试端口是否可达，或者用 Wireshark 过滤 <code>tcp.port == 502</code> 抓包分析。</p>'};
LESSONS["w1d5"]={title:"串口通信排障实战",content:'<h3>排障"三步法"</h3><p>串口不通时，按从简单到复杂的顺序排查：<br><strong>第一步 — 查线序</strong>：用万用表蜂鸣档测通断。RS232 注意 TXD/RXD 是否交叉；RS485 检查 A/B 线是否接反。<br><strong>第二步 — 查参数</strong>：波特率、数据位、停止位、校验位，双方必须完全一致。可用串口助手发已知数据验证。<br><strong>第三步 — 查信号</strong>：用示波器看波形，确认电平幅度正常（RS232 的 ±5V~±15V，RS485 差分电压 >200mV）。</p><h3>环回测试 — 快速定位故障端</h3><div class="highlight"><p>RS232 环回：把 DB9 的 Pin2 和 Pin3 短接，然后用串口助手自发自收。如果能收到自己发的数据，说明<strong>本端串口硬件正常</strong>，问题在对端或线缆。<br>RS485 环回：因是半双工总线不能简单环回，改用<strong>替换法</strong>——换一台已知好的从站设备测试。</p></div>'};
LESSONS["w1d6"]={title:"网络通信排障实战",content:'<h3>OSI 模型思维：从底层往上层查</h3><p>工厂网络故障，按 OSI 七层从物理层开始逐层排查最有效：</p><p><strong>物理层</strong>：网口灯亮不亮？绿灯=链路建立，黄灯闪烁=有数据。不亮就换网线/换交换机端口。<br><strong>数据链路层</strong>：MAC 地址冲突？用 <code>arp -a</code> 查看 ARP 表。<br><strong>网络层</strong>：IP 是否配错？子网掩码对不对？用 <code>ping</code> 测通断，<code>ipconfig</code> 看 IP。<br><strong>传输层</strong>：端口通不通？用 <code>telnet IP 502</code> 测试 Modbus TCP 端口。</p><h3>常用排查命令</h3><div class="highlight"><p><code>ping 192.168.1.100</code> 测通断<br><code>tracert 192.168.1.100</code> 追踪路由<br><code>netstat -ano | findstr 502</code> 查端口占用<br><code>nslookup</code> 检查 DNS</p></div>'};
LESSONS["w1d7"]={title:"综合实战：产线通信故障全流程",content:'<h3>场景：产线突然停机，HMI 显示"PLC通信中断"</h3><p>这是一道经典的综合排查题。请按以下流程思考：</p><p><strong>Step 1 — 确认影响范围</strong>：是单台设备断连还是整个网段断了？如果只是这台 PLC，问题在 PLC 本身或它的网线；如果整个工位都断，问题在交换机或上层网络。</p><p><strong>Step 2 — 物理层检查</strong>：看 PLC 网口灯，看交换机对应端口灯。不亮→换网线；亮但闪烁异常→检查双工模式不匹配。</p><p><strong>Step 3 — 网络层检查</strong>：用笔记本直连 PLC，配同网段 IP，ping 测试。通了→原网线或交换机有问题；不通→PLC 网口或 IP 配置故障。</p><p><strong>Step 4 — 应用层检查</strong>：用 Modbus TCP 客户端工具（如 Modbus Poll）尝试连接，确认协议层是否响应。</p>'};
LESSONS["w2d1"]={title:"PLC硬件组成与工作原理",content:'<h3>PLC 是什么？</h3><p>PLC（可编程逻辑控制器）是工业自动化的大脑。它的本质是一台<strong>专为工业环境设计的计算机</strong>，耐振动、抗干扰、支持宽温工作。与普通电脑的区别在于：它有大量<strong>数字量/模拟量 I/O 接口</strong>直接连接传感器和执行器，编程语言也更适合逻辑控制。</p><h3>核心硬件组成</h3><p><strong>CPU 模块</strong>：执行用户程序，进行逻辑运算。包含微处理器、存储器（RAM+ROM）。<br><strong>电源模块</strong>：将 220V AC 转为 24V DC 供 PLC 内部使用。<br><strong>输入模块（DI/AI）</strong>：接收外部信号。DI 接按钮、限位开关等开关量；AI 接温度变送器、压力变送器等模拟量。<br><strong>输出模块（DO/AO）</strong>：控制外部设备。DO 驱动继电器、电磁阀；AO 输出 4-20mA 或 0-10V 控制变频器频率。</p><h3>S7-1200 实物结构</h3><div class="highlight"><p>西门子 S7-1200 是模块化 PLC：CPU 本体带部分 I/O，可扩展信号模块(SM)、通信模块(CM)。背板通过 U 型连接器串联，支持最多 8 个信号模块。编程口是 PROFINET 接口（RJ45），支持在线监控和下载程序。</p></div>'};
LESSONS["w2d2"]={title:"TIA Portal 快速入门",content:'<h3>TIA Portal（博途）是什么？</h3><p>TIA Portal（Totally Integrated Automation Portal）是西门子推出的全集成自动化工程平台，用于编程 S7-1200/1500/300/400 系列 PLC，同时集成 HMI、驱动、SCADA 组态。最新版本是 V18。</p><h3>创建第一个项目</h3><p>① 打开 TIA Portal → 创建新项目 → 命名（如"产线控制"）<br>② 添加设备 → 选择 PLC → 选择 CPU 型号（如 CPU 1214C DC/DC/DC）→ 确认<br>③ 进入项目视图 → 双击"Main [OB1]"打开程序块<br>④ 编写梯形图程序 → 编译 → 下载到 PLC</p><h3>下载与在线监控</h3><div class="highlight"><p>下载前务必确认：<strong>PLC 处于 STOP 模式</strong>才能下载硬件配置；程序下载可以在 RUN 模式下进行。下载时选择 PN/IE 接口，PG/PC 接口类型选 "PN/IE"，搜索到设备后下载。<br>在线监控时，梯形图中绿色实线表示通路（导通），蓝色虚线表示断路。</p></div>'};
LESSONS["w2d3"]={title:"梯形图编程基础",content:'<h3>为什么是梯形图？</h3><p>梯形图（LAD）的形态模拟了继电器控制电路的电气原理图，电工和电气工程师无需学习高级语言就能快速上手。两根竖线代表电源母线（左正右负），中间的横线是逻辑回路。</p><h3>三大基本元件</h3><p><strong>常开触点 —| |—</strong>：输入为 1 时闭合，类似继电器常开触点。对应地址如 I0.0。<br><strong>常闭触点 —|/|—</strong>：输入为 0 时闭合，输入为 1 时断开。对应地址如 I0.1。<br><strong>输出线圈 —( )—</strong>：前面逻辑为真时得电，驱动输出。对应地址如 Q0.0。</p><h3>自锁电路（最经典的 PLC 程序）</h3><div class="highlight"><p>启动按钮 I0.0（常开）与 输出 Q0.0 的常开触点并联 → 再串接停止按钮 I0.1（常闭）→ 驱动 Q0.0。<br>按一下启动→Q0.0 得电→Q0.0 常开闭合→手松开后电流仍能通过 Q0.0 自身触点维持导通（自锁）。<br>按停止→I0.1 常闭断开→Q0.0 失电→自锁解除。</p></div>'};
LESSONS["w2d4"]={title:"定时器与计数器",content:'<h3>定时器 TON（接通延时）</h3><p>TON 是最常用的定时器。当输入 IN 从 0 变 1 时开始计时，经过预设时间 PT 后，输出 Q 置 1。如果 IN 中途变 0，计时复位。典型应用：<strong>星三角启动延时</strong>——启动后延时 5 秒再切换到三角形运行。</p><h3>计数器 CTU（加计数器）</h3><p>CTU 每检测到 CU 输入一个上升沿（0→1），当前值 CV 加 1。当 CV ≥ 预设值 PV 时，输出 Q 置 1。R 输入用于复位清零。典型应用：<strong>产品计数</strong>——传送带上每过一个产品光电传感器触发一次，计数到设定值后触发包装动作。</p><h3>实战：传送带延时停机</h3><div class="highlight"><p>需求：按下停止按钮后，传送带不立即停，而是延时 3 秒再停（让最后一个产品走完）。<br>实现：停止按钮 I0.1 的上升沿触发 TON，PT=3s，TON.Q 串联到传送带输出 Q0.0 的常闭触点。按下停止→TON 计时 3 秒→3 秒后 Q0.0 断电。</p></div>'};
LESSONS["w2d5"]={title:"模拟量处理",content:'<h3>为什么要用模拟量？</h3><p>数字量只有 0 和 1 两种状态，无法表达温度、压力、液位、速度等连续变化的物理量。模拟量模块把这些连续信号转换为 PLC 能理解的数字值。</p><h3>4-20mA 电流信号</h3><p>工业上最常用的模拟量标准是 <strong>4-20mA 电流环</strong>。为什么不用 0-20mA？因为 <strong>4mA 作为零点可以检测断线</strong>：如果 PLC 读到 0mA，就知道是传感器掉线了（正常最低是 4mA）。4mA 对应量程下限，20mA 对应量程上限。</p><h3>S7-1200 模拟量处理</h3><div class="highlight"><p>模拟量输入值范围是 <strong>0~27648</strong>（对应 0~10V 或 4~20mA）。<br>使用 <strong>NORM_X（标准化）</strong> + <strong>SCALE_X（缩放）</strong> 两个指令将原始值转换为工程值。<br>例如：温度传感器 4-20mA → 0~27648 → NORM_X → SCALE_X → 0~200°C。</p></div>'};
LESSONS["w2d6"]={title:"PLC故障诊断方法",content:'<h3>三步诊断法</h3><p><strong>看灯</strong>：PLC 面板 LED 指示是第一步。RUN/STOP 灯绿色→正常运行；STOP 黄灯→停机（查诊断缓冲区）；ERROR 红灯→硬件或程序严重故障。<br><strong>看诊断缓冲区</strong>：TIA Portal 在线后双击"诊断"，查看系统记录的所有事件。每条记录包含时间、事件描述、可能的解决方案。这是西门子工程师的"第一工具"。<br><strong>监控程序</strong>：在线监控梯形图，看哪一步卡住了。如果某个常开触点不导通，就查这个输入的实际信号是否到位。</p><h3>常见故障速查</h3><div class="highlight"><p>① CPU 停机→诊断缓冲区查 OB 调用错误、I/O 访问错误<br>② 输出不动作→在线监控看线圈是否得电；得电则查外部继电器/接线<br>③ 输入不识别→量输入端子电压（24V=ON, 0V=OFF）；有电压则查输入模块配置<br>④ 模拟量跳变→查屏蔽接地，检查量程卡位置是否正确</p></div>'};
LESSONS["w2d7"]={title:"综合实战：PLC控制传送带系统",content:'<h3>项目目标</h3><p>设计一个传送带控制系统，满足以下需求：<br>① 按下启动按钮→传送带电机启动<br>② 光电传感器检测到产品→传送带停止，气缸推送产品<br>③ 推送完成→传送带自动恢复运行<br>④ 按下停止按钮→延时 3 秒后停机（让最后一个产品走完）<br>⑤ 急停按钮按下→立即全部停止</p><h3>I/O 分配与程序思路</h3><p>I0.0：启动 | I0.1：停止 | I0.2：急停 | I0.3：光电传感器 | I0.4：气缸前限位 | I0.5：气缸后限位<br>Q0.0：传送带电机 | Q0.1：气缸电磁阀</p><p>核心逻辑：Q0.0 自锁保持运行→I0.3 上升沿触发中间继电器 M1.0（产品到达）→M1.0 断开 Q0.0 并启动 Q0.1→Q0.1 推到位 I0.5=1→复位 M1.0 恢复 Q0.0 运行。停止按钮触发 TON 3s 后断开 Q0.0。</p>'};
LESSONS["w3d1"]={title:"AGV分类与工作原理",content:'<h3>AGV 是什么？</h3><p>AGV（Automated Guided Vehicle，自动导引车）是无人驾驶的搬运机器人，在工厂和仓库中按预设路线自动运输物料。它集成了<strong>导航定位、运动控制、安全防护、能源管理、调度通信</strong>五大系统。</p><h3>常见 AGV 类型</h3><p><strong>潜伏式 AGV</strong>：最低矮的一种，钻到货架下面顶升搬运。载重通常 500kg~2t，广泛用于电子、汽车零部件产线。<br><strong>叉车式 AGV</strong>：像无人叉车一样叉取托盘，载重可达 3t 以上，常用于仓库入库出库。<br><strong>牵引式 AGV</strong>：像火车头一样牵引多节料车，单次搬运量大，适合长距离产线配送。<br><strong>举升式 AGV</strong>：可升降平台对接不同高度的输送线，柔性高。</p><h3>海康 AGV 简介</h3><div class="highlight"><p>海康机器人是国内 AGV 龙头，产品线覆盖潜伏、叉车、移载等多种形态。采用二维码+惯导融合导航，定位精度 ±5mm。配套 RCS 调度系统实现多车协同、路径规划、交通管制等功能。</p></div>'};
LESSONS["w3d2"]={title:"AGV导航技术详解",content:'<h3>四大主流导航方式对比</h3><p><strong>磁条导航</strong>：地面贴磁条，AGV 底部磁传感器循迹。成本最低，但路径固定难改，磁条易磨损。精度 ±10mm。<br><strong>二维码导航</strong>：地面贴二维码阵列，AGV 扫码定位。精度高（±5mm），路径灵活可软件调整，但二维码需定期清洁。<br><strong>激光 SLAM 导航</strong>：AGV 顶部激光雷达扫描环境，构建地图并实时定位。无需地面标识，灵活性最高，精度 ±5mm~±15mm，成本也最高。<br><strong>惯导+地标修正</strong>：陀螺仪+里程计推算位置，中途用 RFID 或磁钉修正累积误差。介于磁条和 SLAM 之间。</p><h3>定位丢失的根因分析</h3><div class="highlight"><p>① 二维码脏污/破损/翘起 → 扫码失败 → 位置丢失<br>② 地面反光（水渍、油渍、金属板）→ 激光导航误判 → 位置漂移<br>③ 驱动轮打滑 → 里程计数据与实际不符 → 惯导累积误差<br>④ 地图更新不及时 → 参照物变化 → 定位失败</p></div>'};
LESSONS["w3d3"]={title:"AGV电池与充电系统",content:'<h3>电池类型</h3><p>目前主流 AGV 使用<strong>磷酸铁锂电池</strong>（LiFePO4），安全性和循环寿命优于三元锂电池。标称电压 48V/24V，容量从 30Ah 到 200Ah 不等。充满电通常可连续工作 6~8 小时。<br>锂电池<strong>严禁完全放空</strong>——深度放电会导致电池永久损坏。AGV 一般在电量低于 20% 时自动返回充电。</p><h3>充电方式</h3><p><strong>在线充电（机会充电）</strong>：AGV 在等待工位短暂充电 3~5 分钟，利用碎片时间补电。但频繁浅充浅放会影响电池寿命。<br><strong>离线充电（换电站）</strong>：AGV 电量低时自动驶往充电区，充满后再返回工作。一次充满约 1~2 小时。<br><strong>自动换电</strong>：最先进的方案，机械手自动更换电池组，AGV 几乎不停机。</p><h3>充电故障排查</h3><div class="highlight"><p>AGV 无法充电的常见原因：<br>① 充电电极接触不良 → 清洁电极表面氧化层<br>② 电池电压低于 BMS 保护阈值 → 需要外部激活<br>③ 充电桩通信模块故障 → 检查 CAN/RS485 通信<br>④ 电池温度过高 → BMS 自动锁止充电</p></div>'};
LESSONS["w3d4"]={title:"AGV传感器系统",content:'<h3>安全防护传感器</h3><p><strong>安全激光扫描仪</strong>（如 SICK S300）：AGV 最重要的安全设备。在车头前方 270° 范围内扫描，检测到障碍物时自动减速或急停。通常设置两级防护区域：<strong>减速区</strong>（3~5m，检测到→降速至 0.3m/s）和<strong>急停区</strong>（1~1.5m，检测到→立即停止）。<br><strong>安全触边</strong>：物理碰撞传感器，绕车身一周。碰撞时内部触点断开，AGV 急停。是最后一道机械防护。</p><h3>导航传感器</h3><p><strong>下视相机</strong>：朝下拍摄地面二维码，读取位置 ID 和坐标。海康 AGV 典型配置为双相机（前后各一）。<br><strong>惯性测量单元 IMU</strong>：含陀螺仪+加速度计，在二维码之间推算位置。缺点是误差会累积。<br><strong>激光雷达</strong>：用于 SLAM 导航，测量与周围物体的距离，生成点云地图。</p>'};
LESSONS["w3d5"]={title:"AGV调度系统(RCS)",content:'<h3>RCS 是什么？</h3><p>RCS（Robot Control System，机器人调度系统）是 AGV 车队的中央大脑。当有多个 AGV 同时运行时，RCS 负责<strong>任务分配、路径规划、交通管制、充电调度</strong>。</p><h3>路径规划</h3><p>RCS 根据当前所有 AGV 的位置和目的地，为每台车计算最优路径。如果两车路径交汇，RCS 会用<strong>红绿灯机制</strong>或<strong>锁路段机制</strong>避免碰撞：先到达交汇点的车获得通行权，后到的车在路口外等待。</p><h3>常见调度故障</h3><div class="highlight"><p>① 任务下发后 AGV 不动 → 检查 RCS 与 AGV 通信状态、AGV 是否在线<br>② 路径规划失败 → 检查地图是否有路段禁行/断开，确认终点站点坐标正确<br>③ 两车死锁 → 相反方向两车在窄通道相遇各自不让。需 RCS 添加交通规则或人工干预<br>④ 频繁重新规划 → 网络延迟大导致位置更新滞后，RCS 反复重新算路</p></div>'};
LESSONS["w3d6"]={title:"AGV日常维护保养",content:'<h3>日检项目（每天开线前）</h3><p>① 检查驱动轮磨损：花纹深度 < 2mm 需要更换<br>② 清洁安全激光镜头：用无尘布+酒精擦拭，不能有灰尘遮挡<br>③ 检查二维码：地面二维码有无翘起、破损、脏污<br>④ 电池电量检查：确保每辆车电量 > 60% 开始作业<br>⑤ 报警记录：查看上位机昨日报警列表，重点关注反复报警的车辆</p><h3>周检与月检</h3><p><strong>每周</strong>：检查各紧固螺丝扭矩、清洁电控柜滤网、测试急停按钮功能、校准货叉限位传感器。<br><strong>每月</strong>：检查齿轮箱润滑油位、测量电池内阻、校准里程计、固件版本升级评估。</p><h3>保养记录管理</h3><div class="highlight"><p>每项保养操作要记录：日期、车辆编号、保养项目、执行人、发现的问题、更换的备件型号。推荐用平台的<strong>工作日志</strong>功能记录，多人协作可同步查看。</p></div>'};
LESSONS["w3d7"]={title:"综合实战：AGV故障排查全流程",content:'<h3>经典故障场景</h3><p><strong>现象</strong>：AGV-03 在 B区 3号站台取货后，前往 C区 7号站台途中突然停车，HMI 显示"定位丢失"，随后 RCS 将其标记为离线。</p><h3>排查流程</h3><p><strong>Step 1 — 远程诊断</strong>：登录 RCS，查看 AGV-03 的最后上报位置和事件日志。定位到 B区走廊 B3-B4 段。<br><strong>Step 2 — 现场检查</strong>：到 B3-B4 段查看地面二维码。发现 B4 号二维码被叉车轮胎碾压导致表面磨损严重，下视相机无法识别。<br><strong>Step 3 — 临时恢复</strong>：用酒精清洁 B4 二维码表面，AGV 重新扫码成功，恢复正常运行。<br><strong>Step 4 — 根本措施</strong>：① 更换 B4 二维码贴纸；② 在走廊入口设置提示牌"AGV 运行区域，禁止叉车进入"；③ 在 RCS 中将该路段的容许偏差从 ±10mm 临时放宽到 ±20mm 增强容错。</p>'};
LESSONS["w4d1"]={title:"工业自动化系统架构",content:'<h3>自动化金字塔</h3><p>现代工厂自动化采用<strong>五层架构</strong>（ISA-95 标准）：<br><strong>现场层（L0）</strong>：传感器、执行器、电机等物理设备。<br><strong>控制层（L1）</strong>：PLC、CNC、机器人控制器。执行实时控制逻辑，扫描周期通常 1~20ms。<br><strong>监控层（L2）</strong>：SCADA/HMI 系统。人机交互、数据采集、报警管理。<br><strong>制造执行层（L3）</strong>：MES 系统。生产排程、工单管理、质量追溯、物料追踪。<br><strong>企业层（L4）</strong>：ERP 系统。财务、采购、库存、人力资源。</p><h3>各层通信方式</h3><div class="highlight"><p>L0↔L1：硬接线(I/O)、IO-Link、AS-i<br>L1↔L1：PROFINET、EtherCAT、Modbus TCP<br>L1↔L2：OPC UA、PROFINET<br>L2↔L3：Web Service、数据库直连、OPC UA<br>L3↔L4：Web Service、文件交换(CSV/XML)</p></div>'};
LESSONS["w4d2"]={title:"PROFINET通信详解",content:'<h3>PROFINET：西门子的工业以太网</h3><p>PROFINET 是西门子主导的工业以太网标准（IEC 61158/61784），用于 PLC 之间、PLC 与 I/O 模块、PLC 与 HMI 之间的实时通信。它运行在标准以太网硬件上，但通过<strong>实时通道（RT/IRT）</strong>保证了确定性的通信周期。</p><h3>设备名称与 IP</h3><p>每个 PROFINET 设备有一个唯一的<strong>设备名称</strong>（如 "conveyor-plc"），由 TIA Portal 分配。设备名称≠IP 地址——上电后设备根据名称通过 DCP 协议获取 IP。这是最常见的配置错误点：名称不一致导致设备无法连接。</p><h3>拓扑发现</h3><div class="highlight"><p>PROFINET 支持 LLDP 协议自动发现网络拓扑。在 TIA Portal 的"拓扑视图"中可以看到每个设备连接在交换机的哪个端口。如果实际接线和组态的拓扑不一致，PLC 会报警。这对于设备替换后的快速验证非常有用。</p></div>'};
LESSONS["w4d3"]={title:"OPC UA：跨平台数据互通",content:'<h3>为什么要 OPC UA？</h3><p>工厂里设备来自不同厂商（西门子 PLC、三菱机器人、基恩士视觉），各自说不同的"语言"。OPC UA 扮演了"翻译官"的角色：所有设备把数据发布到 OPC UA 服务器，上层应用（MES、SCADA）用统一的方式读取，无需关心底层设备品牌和协议。</p><h3>核心概念</h3><p><strong>地址空间</strong>：所有数据按树形结构组织，类似文件系统的目录树。每个节点有唯一的 NodeId。<br><strong>订阅机制</strong>：客户端一次订阅，服务器在数据变化时主动推送（而不是轮询），大幅降低网络负载。<br><strong>安全性</strong>：OPC UA 内置加密、证书认证、用户鉴权，比 Modbus 裸奔安全得多。</p>'};
LESSONS["w4d4"]={title:"MES系统对接",content:'<h3>MES 需要什么数据？</h3><p>MES（制造执行系统）需要从产线获取的关键数据包括：<br>① <strong>设备状态</strong>：运行/停机/待料/故障，用于 OEE 计算<br>② <strong>生产计数</strong>：良品数、不良品数、当日累计产量<br>③ <strong>工艺参数</strong>：温度、压力、速度的实际值，用于质量追溯<br>④ <strong>报警信息</strong>：故障代码、发生时间、恢复时间</p><h3>对接方案</h3><div class="highlight"><p>推荐方案：PLC → OPC UA 服务器 → MES。<br>PLC 端只需组态好数据块和 OPC UA 服务器接口，MES 端通过 OPC UA 客户端订阅需要的变量即可。无需在 PLC 中写任何通信代码。<br>备选方案：PLC → 上位机 → 数据库 → MES。上位机（如 WinCC）把数据写入 SQL Server，MES 定时读取。</p></div>'};
LESSONS["w4d5"]={title:"工业安全系统",content:'<h3>安全 PLC 与普通 PLC 的区别</h3><p>安全 PLC（如西门子 S7-1200F）在硬件上采用<strong>冗余双通道</strong>设计，两个 CPU 同时运算并互相校验，任一出现故障立即安全停机。软件上支持安全指令（如急停、安全门、光栅），符合 SIL 3 / PL e 安全等级。</p><h3>典型安全回路</h3><p>急停按钮 → 安全继电器 → 安全 PLC 输入 → 安全 PLC 逻辑 → 安全输出 → 接触器切断动力电源。<br>这整个链路中的每个环节都是<strong>安全认证组件</strong>（黄色标识），不得用普通继电器替代。</p><h3>日常检查要点</h3><div class="highlight"><p>① 急停按钮每月测试一次，按下后确认所有动力设备停止<br>② 安全门联锁开关不能短接或屏蔽<br>③ 安全光栅定期清洁和功能测试<br>④ 安全 PLC 的诊断日志定期导出存档</p></div>'};
LESSONS["w4d6"]={title:"自动化项目管理",content:'<h3>项目阶段</h3><p>一个完整的设备运维项目通常包含 6 个阶段：<br><strong>需求分析</strong>：明确要自动化什么流程？产能目标？预算？<br><strong>方案设计</strong>：选择 PLC 型号、通信协议、网络架构、传感器选型<br><strong>详细设计</strong>：电气原理图、I/O 分配表、程序流程图<br><strong>编程调试</strong>：PLC 编程、HMI 组态、通信配置、离线仿真<br><strong>现场调试</strong>：设备安装、接线检查、单机调试、联动调试<br><strong>验收运维</strong>：试运行、培训操作人员、移交文档、转入日常运维</p><h3>常见项目风险</h3><div class="highlight"><p>① 需求频繁变更→范围蔓延→工期失控<br>② 备件到货延迟→影响调试进度<br>③ 通信协议不兼容→设备间无法互通<br>④ 安全评估不及时→验收通不过</p></div>'};
LESSONS["w4d7"]={title:"综合实战：新产线系统集成",content:'<h3>项目背景</h3><p>一条新的自动分拣线需要集成：2 台 S7-1200 PLC（分拣主控+输送线控制）、1 台海康 AGV（对接分拣口取货）、1 套 HMI（产线监控面板）、上层 MES 系统（记录分拣数据）。</p><h3>集成方案</h3><p>① <strong>PLC 之间</strong>：通过 PROFINET IO 控制器/IO 设备模式通信。输送线 PLC 作为 IO 控制器，分拣 PLC 作为 IO 设备<br>② <strong>PLC ↔ AGV</strong>：通过 Modbus TCP 通信。PLC 读取 AGV 状态寄存器（在线/任务/电量），写入目标站点号<br>③ <strong>PLC ↔ HMI</strong>：通过 PROFINET 直接连接，HMI 变量绑定 PLC 数据块地址<br>④ <strong>PLC ↔ MES</strong>：通过 OPC UA。上位机运行 OPC UA 服务器从 PLC 采集数据，MES 订阅 OPC UA 节点</p><h3>调试顺序</h3><div class="highlight"><p>务必按这个顺序调试：<br>① 先调 PLC ↔ HMI（基础通信）→ ② PLC 之间 PROFINET → ③ PLC ↔ AGV Modbus TCP → ④ 全流程空跑测试 → ⑤ 带料试生产 → ⑥ 最后接入 MES。</p></div>'};
LESSONS["w5d1"]={title:"Codesys MCP协议入门",content:'<h3>什么是 MCP 协议？</h3><p>MCP（Model Context Protocol）是 Anthropic 发布的开放协议，定义了 AI 大模型与外部工具的标准化交互方式。简单说：<strong>AI 通过 MCP 可以像人一样操作 PLC 编程软件</strong>——打开 IDE、创建项目、写代码、编译、读取错误并自动修复。MCP 采用客户端-服务器架构：AI 作为客户端，Codesys IDE 作为服务器，通过 JSON-RPC 通信。MCP 的出现让"说人话就能写 PLC 程序"成为现实。</p><h3>Codesys MCP Server 环境配置</h3><div class="highlight"><p>GitHub 上有现成的开源项目，安装极其简单：<br><code>pip install codesys-mcp-server</code><br>启动服务：<code>codesys-mcp --port 8080</code><br>整个过程<strong>不超过 20 分钟</strong>，完全免费。服务启动后 Codesys IDE 的所有功能（新建项目、编辑 POU、声明变量、编译、下载）都以 Tool 形式暴露给 AI 调用。</p></div><h3>AI 与 PLC 编程工具联动原理</h3><p>传统工作流：人→打开 Codesys→新建项目→添加 POU→声明变量→写 ST 代码→编译→看错误→手动修改→再编译……反复循环。MCP 工作流：<strong>人说需求→AI 调用 create_project→调用 add_pou→调用 declare_variable→调用 write_st_code→调用 compile→读取编译错误→自动修改代码→再次编译→直到 0 Error 0 Warning</strong>。实测一个带使能/手自动切换/超时报警的阀门控制功能块，从零到编译通过仅需<strong>15 秒</strong>，而手动操作至少需要 15-30 分钟。</p>'};
LESSONS["w5d2"]={title:"AI自动建POU与变量",content:'<h3>POU（程序组织单元）三大类型</h3><p>POU 是 IEC 61131-3 标准中 PLC 程序的基本组织单位：<br><strong>Program（程序）</strong>：最高层级，由任务直接调用，有全局变量访问权，用于主控制逻辑。<br><strong>Function Block（功能块）</strong>：有内部状态记忆，实例化后使用，每个实例有独立数据副本。典型如定时器 TON、计数器 CTU。<br><strong>Function（函数）</strong>：无状态记忆，相同输入必得相同输出，用于数学运算、类型转换等纯计算。</p><h3>AI 如何自动选择 POU 类型</h3><div class="highlight"><p>AI 根据自然语言描述自动判断：<br>① 描述中含"控制"、"流程"、"主逻辑"→选择 <strong>Program</strong><br>② 描述中含"阀门"、"电机"、"气缸"等需要多次实例化的设备对象→选择 <strong>Function Block</strong><br>③ 描述中含"计算"、"转换"、"判断"等纯运算需求→选择 <strong>Function</strong><br>AI 还会根据复杂度建议：简单逻辑用梯形图(LD)，复杂算法用结构化文本(ST)。</p></div><h3>变量声明与数据类型自动匹配</h3><p>AI 声明变量时自动处理变量区域分配：输入信号→VAR_INPUT；输出信号→VAR_OUTPUT；中间变量→VAR；需断电保持→VAR RETAIN。数据类型自动匹配：开关量→BOOL；模拟量 0~27648→INT；工程值→REAL；计时→TIME；字符串→STRING。命名遵循匈牙利规范：如 bStart（BOOL型）、iTemp（INT型）、rSpeed（REAL型）。</p><h3>实操：阀门控制功能块</h3><p>对 AI 说："创建阀门控制功能块，有使能输入、开阀/关阀命令、开到位/关到位反馈，超时 10 秒报警"。AI 自动：① 选 POU 类型为 Function Block，命名 FB_ValveControl；② 声明 VAR_INPUT：bEnable/bOpenCmd/bCloseCmd/bOpened/bClosed(BOOL)；③ 声明 VAR_OUTPUT：bOpenOut/bCloseOut/bAlarm(BOOL)；④ 声明 VAR：tonTimer(TON)；⑤ 写入完整 ST 控制逻辑（使能门控→命令互锁→超时检测）→触发编译通过。</p>'};
LESSONS["w5d3"]={title:"AI写ST代码与编译纠错",content:'<h3>ST（结构化文本）语法要点</h3><p>ST 是 IEC 61131-3 标准中的高级文本语言，语法接近 Pascal：<br><strong>赋值</strong>：<code>变量 := 表达式;</code>（注意是 := 不是 =）<br><strong>条件</strong>：<code>IF 条件 THEN ... ELSIF ... THEN ... ELSE ... END_IF;</code><br><strong>循环</strong>：<code>FOR i:=0 TO 100 BY 1 DO ... END_FOR;</code><br><strong>定时器</strong>：<code>tonTimer(IN:=触发, PT:=T#10S); IF tonTimer.Q THEN ...</code><br>每条语句必须以分号结尾，END_IF/END_FOR 后也要加分号。</p><h3>AI 写 ST 代码的闭环工作流</h3><div class="highlight"><p>① <strong>需求输入</strong>：人对 AI 描述控制逻辑（自然语言）<br>② <strong>伪代码生成</strong>：AI 先输出伪代码供确认<br>③ <strong>ST 实现</strong>：AI 将伪代码转为标准 ST 语法<br>④ <strong>编译</strong>：AI 调用编译工具触发 Build<br>⑤ <strong>纠错循环</strong>：编译报错→AI 读取错误列表→定位行号→分析原因→自动修正→重新编译<br>⑥ <strong>通过</strong>：0 Error 0 Warning，代码就绪<br>整个闭环无需人工干预。</p></div><h3>常见编译错误与 AI 修复</h3><p><strong>语法错误</strong>（如 IF 缺少 END_IF）：AI 检查结构完整性后自动补全。<br><strong>类型不匹配</strong>（如 INT 赋值给 BOOL）：AI 自动插入类型转换函数（INT_TO_BOOL 等）。<br><strong>变量未声明</strong>：AI 在 VAR 区域自动补充声明并匹配正确类型。<br><strong>库缺失</strong>：AI 提示需要的库文件并自动添加到工程。</p><h3>效率对比</h3><p>实测一个完整功能块：<strong>AI 从零到编译通过约 15 秒，传统手写约 15-30 分钟</strong>。AI 产出的代码符合 IEC 61131-3 规范，变量命名规范，注释完整。每天可节省约 2 小时的重复性编程劳动。</p>'};
LESSONS["w5d4"]={title:"西门子Openness API基础",content:'<h3>西门子 Openness 是什么？</h3><p>Openness 是西门子 TIA Portal 的开放编程接口（API），允许外部程序（C#/.NET 应用）自动化操作 TIA Portal 工程。与 Codesys MCP 不同：<strong>MCP 是 AI 直接操作 IDE 的协议层，Openness 是西门子官方提供的编程接口，用于批量自动化操作</strong>。注意：Openness 需要 TIA Portal 的 Openness 许可证，非免费。</p><h3>Openness 能做什么？</h3><div class="highlight"><p>① <strong>批量创建 PLC 站点</strong>：一键生成数十个 S7-1200/1500 站点及硬件组态<br>② <strong>自动生成 HMI 画面</strong>：程序化创建画面、添加控件、绑定变量<br>③ <strong>批量修改标签</strong>：一次性修改数百个 PLC 变量名或注释<br>④ <strong>导出/导入程序块</strong>：跨项目复用 OB/FB/DB 代码<br>⑤ <strong>自动编译下载</strong>：批量编译并下载到多台 PLC<br>⑥ <strong>生成文档</strong>：自动导出 I/O 列表、变量表、交叉引用</p></div><h3>环境要求</h3><p>① <strong>TIA Portal V15 及以上</strong>（V16/V17/V18 均可），需安装 Openness 组件<br>② <strong>Visual Studio 2017+</strong>（编写 C# 调用程序）<br>③ <strong>.NET Framework 4.7.2+</strong><br>④ 项目中引用 Siemens.Engineering.dll 和 Siemens.Engineering.HMI.dll</p><h3>与 Codesys MCP 对比</h3><p>Codesys MCP：免费、开源、AI 友好、适合单项目快速开发、实时交互。Openness：商业授权、适合企业级批量操作、稳定可靠、支持项目模板化。实际项目中可互补——MCP 快速开发逻辑原型，Openness 批量部署和标准化输出。</p>'};
LESSONS["w5d5"]={title:"TIA Portal程序化操作",content:'<h3>实战：C# 代码操作 TIA Portal</h3><p>以下演示用 Openness API 完成创建 S7-1200 站点到下载的完整流程：</p><h3>Step 1 — 创建项目并添加设备</h3><div class="highlight"><p><code>using Siemens.Engineering;</code><br><code>var tia = new TiaPortal();</code><br><code>var project = tia.Projects.Create("D:\\MyProject");</code><br><code>var device = project.Devices.CreateWithItem("PLC_1", "6ES7 214-1AG40-0XB0", "S7-1200\\CPU 1214C DC/DC/DC");</code><br>一行代码即可创建项目并添加指定型号的 PLC。</p></div><h3>Step 2 — 添加程序块和变量</h3><p><code>var software = device.Software;</code><br><code>software.CreateBlock("Main", BlockType.OB, 1);</code> // 创建 OB1<br><code>software.CreateBlock("MotorControl", BlockType.FB, 1);</code> // 创建 FB1<br><code>software.CreateBlock("GlobalData", BlockType.DB, 1);</code> // 创建 DB1<br><code>var tags = software.TagTable;</code><br><code>tags.Tags.Create("Start", TagDataType.Bool, "I0.0");</code> // 批量创建变量</p><h3>常用 API 方法速查</h3><div class="highlight"><p><strong>CreateProject</strong>：创建项目 | <strong>AddDevice</strong>：添加设备<br><strong>ImportBlock</strong>：导入程序块 | <strong>Compile</strong>：编译项目<br><strong>Download</strong>：下载到 PLC | <strong>ExportTags</strong>：导出变量表<br><strong>GenerateDocumentation</strong>：自动生成文档</p></div><h3>效率提升量化</h3><p>手动创建 1 台 PLC 站点+组态+10 个变量+OB/FB/DB 约需 10-15 分钟。用 Openness 批量创建 20 台同型号站点、500+ 变量、200+ 程序块，<strong>运行一次脚本约 2 分钟完成</strong>，节省时间超过 95%。</p>'};
LESSONS["w5d6"]={title:"AI辅助故障排查思路",content:'<h3>传统 vs AI 辅助故障排查</h3><p><strong>传统流程</strong>：发现问题→查手册→凭经验猜测→逐个测试→可能走弯路→问题反复。<br><strong>AI 辅助流程</strong>：描述故障→AI 分析诊断数据→给出最可能根因排序→生成逐步排查清单→每步反馈→AI 动态调整下一步。</p><h3>AI 如何分析诊断缓冲区</h3><div class="highlight"><p>以 S7-1200 为例：把诊断缓冲区文本粘贴给 AI→① AI 解析时间戳还原事件序列→② 识别关键事件代码（如"OB1 调用错误"、"I/O 访问错误"、"定时器编号无效"）→③ 匹配西门子官方文档中的原因和解决方案→④ 输出可能原因排序 + 逐步检查清单。</p></div><h3>实际案例：CPU 突然 STOP</h3><p>某产线 S7-1200 从 RUN 跳 STOP，SF 红灯亮。传统排查：工程师到场→连 TIA Portal→查诊断缓冲区→逐条分析→耗时 30-60 分钟。AI 辅助：现场人员复制诊断缓冲区→发给 AI→<strong>10 秒内返回："诊断事件显示 OB1 编程错误，定时器 TON 的 IN 引脚未连接变量。请在 OB1 中搜索 TON 指令，检查 IN 引脚是否悬空"</strong>。工程师定位→补连变量→重新下载→CPU 恢复 RUN，全过程 5 分钟。</p><h3>AI 排查技巧</h3><p>给 AI 提供：设备型号+固件版本+LED 指示灯状态+诊断缓冲区全文+最近程序修改记录+环境变化信息。信息越详细，AI 定位越精准。</p>'};
LESSONS["w5d7"]={title:"综合实战：AI驱动PLC工程",content:'<h3>实战目标：从需求到编译通过全闭环</h3><p>综合运用本周所学，演示用 AI 完成一个完整 PLC 功能块的开发。</p><h3>需求描述</h3><div class="highlight"><p>设计阀门控制功能块 FB_ValveControl：<br>① 使能输入 bEnable（FALSE 时所有输出归零）<br>② 手自动切换 bAutoMode（TRUE=自动/FALSE=手动）<br>③ 自动模式：bAutoOpen→开阀，到位 bOpened=TRUE 停止；bAutoClose→关阀，到位 bClosed=TRUE 停止<br>④ 手动模式：bManualOpen/bManualClose 直接控制<br>⑤ 超时保护：开/关阀超 10 秒未到位→bTimeoutAlarm=TRUE<br>⑥ 互锁保护：开阀和关阀输出不能同时为 TRUE</p></div><h3>AI 全流程操作</h3><p>① <strong>建 POU</strong>：AI 自动选 Function Block 类型，命名 FB_ValveControl<br>② <strong>声明变量</strong>：VAR_INPUT 8 个 BOOL + VAR_OUTPUT 3 个 BOOL + VAR 2 个 TON<br>③ <strong>写 ST 代码</strong>：AI 生成约 40 行 ST 代码（使能门控→手自动切换→互锁逻辑→超时检测）<br>④ <strong>编译</strong>：AI 调用编译→0 Error 0 Warning<br>⑤ <strong>导出</strong>：生成 .exp 文件，可在任何 Codesys 工程中导入</p><h3>AI 在工业自动化中的前景与局限</h3><p><strong>前景</strong>：AI 已能节省约 80% 的 PLC 重复编程劳动；未来可基于电气原理图自动生成 I/O 映射、辅助 HMI 画面布局、分析历史数据实现预测性维护。<br><strong>局限</strong>：AI 对行业特有工艺逻辑和安全规范理解不深；安全 PLC（SIL3/PL e）编程仍需人工把关；复杂多轴运动控制时序逻辑 AI 尚难完美处理。<br><strong>最佳实践</strong>：AI 生成 + 人工审核 + 仿真验证的三步法。</p>'};
LESSONS["w6d1"]={title:"PLC选型全攻略",content:'<h3>为什么选型是工程师的核心能力？</h3><p>PLC 选型不是简单比较价格，而是对<strong>功能需求、扩展性、维护成本、生态兼容性</strong>的综合权衡。选大了浪费预算，选小了后期改造代价巨大。下面我们从品牌对比、I/O 估算、通信接口、特殊功能四个维度来系统学习。</p><h3>六大品牌对比</h3><div class="highlight"><p><strong>西门子 S7-1200/1500</strong>：PROFINET 原生支持，TIA Portal 全集成，价格较高但生态最完善。<br><strong>三菱 FX/Q 系列</strong>：小型机性价比高，运动控制强项（SSCNET），日系设备首选。<br><strong>欧姆龙 CJ/NX 系列</strong>：EtherCAT 总线原生，NX 系列支持 SQL 直连数据库。<br><strong>汇川 AM/AC 系列</strong>：国产替代首选，CODESYS 平台，性价比极高。<br><strong>台达 AS 系列</strong>：价格亲民，CANopen 运动控制成熟，适合中小项目。<br><strong>倍福(Beckhoff)</strong>：基于 PC 的软 PLC，TwinCAT 平台，EtherCAT 发明者，高端运动控制。</p></div><h3>I/O 点数估算方法</h3><p>统计所有传感器（DI）、执行器（DO）、模拟量（AI/AO）数量后，必须<strong>预留 20% 余量</strong>。例：实际需要 DI 40/DO 24/AI 8/AO 4，则选型按 DI 48/DO 30/AI 10/AO 6 计算。重点关注：扫描速度（逻辑指令 ns 级）、通信接口（PROFINET/EtherCAT/Modbus 是否原生支持）、模拟量通道分辨率（12/13/16 位）、特殊功能需求（高速计数通道数、PID 回路数、运动控制轴数）。</p><h3>实操：产线需求选型</h3><p>某产线需求：DI 52 点（按钮、限位、光电）/ DO 28 点（接触器、电磁阀）/ AI 6 路（温度、压力）/ 2 路高速计数（编码器）/ PROFINET 与上位机通信。请列出西门子、汇川两个方案的选型对比表：CPU 型号、扩展模块数量及型号、总点数、通信接口、预估价格——这一步要实际写出来才算掌握。</p>'};
LESSONS["w6d2"]={title:"AGV选型与应用匹配",content:'<h3>主流品牌格局</h3><p><strong>海康(Hikrobot)</strong>：国内市场份额第一，二维码+惯导融合导航，配套 RCS 调度成熟。<br><strong>极智嘉(Geek+)</strong>：仓储 AGV 龙头，拣选系统全球领先，海外项目多。<br><strong>快仓(Quicktron)</strong>：电商仓储场景深耕，潜伏式产品线全。<br><strong>旷视(Megvii)</strong>：AI 视觉+SLAM 导航差异化，河图调度系统。<br><strong>海柔(HAI)</strong>：料箱机器人品类开创者，HAIPICK 系列在服装/医药行业渗透率高。</p><h3>四大类型对比</h3><div class="highlight"><p><strong>潜伏式</strong>：钻到货架下顶升搬运，载重 500kg~2t，适用产线对接。<br><strong>叉车式</strong>：叉取托盘，载重 1~3t，适用仓库入库出库。<br><strong>料箱式</strong>：直接存取料箱，载重 30~50kg/箱，适用拆零拣选。<br><strong>牵引式</strong>：拖挂多节料车，单次搬运量大，适用长距离配送。</p></div><h3>导航方式选型</h3><p><strong>SLAM 激光</strong>：精度 ±5mm，无需地面标识，灵活度最高，成本也最高。<br><strong>二维码</strong>：精度 ±5mm，需贴码维护，路径可软件调整。<br><strong>磁条</strong>：精度 ±10mm，成本最低，但磁条易磨损、路径固定。<br>关键指标：定位精度、电池续航（6~8h 标配）、安全等级（PL d/SIL 2 以上）。</p><h3>避坑指南</h3><p>常见选型失误：①地面不平或接缝大→SLAM 定位漂移→应选二维码导航；②对接输送线高度不匹配→AGV 顶升行程不够→需提前确认机械接口；③上位系统只支持 RESTful API 但 AGV 用 MQTT→协议不兼容→务必提前做集成测试；④忽略了防火卷帘门和电梯的通信对接导致跨区域通行失败。</p>'};
LESSONS["w6d3"]={title:"变频器选型要点",content:'<h3>品牌对比</h3><p><strong>西门子 G120/SINAMICS</strong>：与 TIA Portal 无缝集成，PROFINET 通信，适合西门子生态。<br><strong>ABB ACS 系列</strong>：DTC（直接转矩控制）技术独步，开环精度高，重载应用首选。<br><strong>安川(Yaskawa)</strong>：性价比最高，矢量控制成熟，通用机械市场占有率大。<br><strong>丹佛斯(Danfoss)</strong>：风机水泵专用型强，节能算法出色，HVAC 领域领先。<br><strong>台达/汇川</strong>：国产替代，价格优势明显，中小功率段性价比最高。</p><h3>核心参数选择</h3><div class="highlight"><p><strong>功率匹配</strong>：恒转矩负载（传送带、提升机）按电机额定电流 1:1 选；变转矩负载（风机、水泵）可降一档。<br><strong>电压等级</strong>：0.37~90kW 选 380V；110kW 以上考虑 660V。<br><strong>过载能力</strong>：重载应用需 150%/60s，轻载 120%/60s。<br><strong>控制方式</strong>：V/F（简单风机水泵）→矢量（精密速度）→ DTC（最高动态响应）。</p></div><h3>选型五步法</h3><p>①负载类型判断（恒转矩/变转矩/大启动转矩）→②功率计算（P=√3×U×I×cosφ）→③控制方式选择→④制动方案确认（电阻制动/回馈制动）→⑤EMC 滤波与通信接口选配。应用场景举例：风机水泵（平方转矩，选 V/F 控制）vs 传送带（恒转矩，选矢量控制）vs 提升机（大启动转矩 200%，选 DTC+制动电阻）。</p>'};
LESSONS["w6d4"]={title:"传感器选型指南",content:'<h3>光电传感器</h3><p>品牌：<strong>Sick（德国）</strong>、<strong>Keyence（日本）</strong>、<strong>Omron（日本）</strong>、<strong>Banner（美国）</strong>。选型三要素：①检测方式——<strong>对射式</strong>（距离最长可达 50m，用于安全门检测）、<strong>镜反射式</strong>（0.1~15m，带偏振滤光片可检测透明体）、<strong>漫反射式</strong>（0~2m，检测物体表面反射）。②响应频率——高速产线需 1kHz 以上。③输出类型——NPN/PNP/推挽。</p><h3>接近开关</h3><div class="highlight"><p><strong>电感式</strong>：检测金属，标准检测距离 2~15mm（齐平安装减半）。<br><strong>电容式</strong>：检测所有材质（含液体、粉末），检测距离 5~25mm。<br><strong>磁簧式</strong>：配合磁铁使用，用于气缸位置检测，耐油污环境。<br>注意：齐平安装（埋入）可防止机械碰撞但检测距离减半；铝/黄铜的衰减系数远大于铁（需查阅修正系数）。</p></div><h3>激光测距与编码器</h3><p><strong>激光测距</strong>：Sick DT 系列（量程 0.2~10m，精度 ±1mm），Keyence LR 系列（量程 0.1~100m），注意灰尘/油污会严重影响精度，需加装吹气清洁装置。<br><strong>编码器</strong>：增量式（成本低，断电后需回零）vs 绝对式（断电保持，价格高）。分辨率按机械精度需求选择，接口有 HTL（10-30V 推挽）、TTL（5V 差分）、SSI（同步串行）、BiSS（高速双向）。</p><h3>安全光栅</h3><p>分辨率 14mm（手指防护）和 30mm（手臂/人体防护）两种。保护高度由光束间距×光束数计算。推荐 Sick C4000 系列（Type 4，PL e）和 Keyence GL 系列。安装距危险源的最小距离按公式 S=K×T+C 计算。</p>'};
LESSONS["w6d5"]={title:"HMI及上位机选型",content:'<h3>触摸屏品牌对比</h3><p><strong>西门子精智/舒适系列</strong>：与 TIA Portal 无缝集成，PROFINET 通信，防护 IP65，价格最高。<br><strong>威纶通(Weintek)</strong>：性价比之王，EasyBuilder 软件免费，宏指令灵活，市场占有率极高。<br><strong>普洛菲斯(Pro-face)</strong>：画面质量一流，GP-Pro EX 软件强大，适合复杂画面。<br><strong>三菱 GOT</strong>：日系 PLC 首选配套，支持 FA 透明传输功能。<br><strong>昆仑通态(MCGS)</strong>：国产老牌，嵌入版+网络版产品线全，电力/水处理行业应用多。</p><h3>选型六维度</h3><div class="highlight"><p><strong>屏幕尺寸</strong>：小型单机 7"（800×480），中大型产线 10"~12"（1024×768），监控中心 15"（1280×800）。<br><strong>防护等级</strong>：正面至少 IP65（防尘防喷水），背面 IP20（柜内安装）。<br><strong>通信接口</strong>：至少 1 路以太网 + 1 路串口（RS232/485）。<br><strong>配方功能</strong>：有多品种切换需求必须支持（内置数据库或 SD 卡存储）。<br><strong>远程访问</strong>：VNC/Web Server 功能，方便移动端巡检。</p></div><h3>上位机组态软件</h3><p>WinCC（西门子，授权费最贵但功能最全）/ 组态王（国产，性价比高，驱动库丰富）/ 力控（国产，实时数据库强）/ Intouch（AVEVA，老牌 SCADA）/ iFix（GE，流程工业多）。选型看：支持的驱动数量、授权模式（按点数/按套）、Web 发布能力。</p><h3>实操</h3><p>某项目 3 台 S7-1200 + 20 个监控点（温度/压力/产量），选型 HMI：推荐威纶通 MT8102iE（10.1"，以太网+串口，2000 元级），或西门子 KTP1200 Basic（12"，集成 PROFINET，5000 元级）。列出选型理由和三方对比表。</p>'};
LESSONS["w6d6"]={title:"伺服驱动系统选型",content:'<h3>品牌格局</h3><p><strong>西门子 S120/S210</strong>：高端多轴应用，PROFINET IRT 同步周期 250μs。<br><strong>松下 A6 系列</strong>：性价比标杆，23 位绝对式编码器，2.5kHz 速度响应。<br><strong>安川 Σ-7 系列</strong>：全球出货量最大，免调整功能成熟，24 位编码器。<br><strong>三菱 MR-J4/MR-J5</strong>：SSCNET 总线，多轴同步性能突出。<br><strong>汇川 SV660</strong>：国产替代首选，EtherCAT 总线，23 位编码器，价格仅为进口 60%。</p><h3>核心选型公式</h3><div class="highlight"><p><strong>Step 1：负载惯量计算</strong>——J<sub>L</sub> = m × (P/2π)²（丝杠传动）或 m × r²（旋转体）。<br><strong>Step 2：惯量比校核</strong>——J<sub>L</sub>/J<sub>M</sub> ≤ 10:1（通用），≤ 5:1（高动态）。<br><strong>Step 3：扭矩校核</strong>——有效扭矩 T<sub>rms</sub> ≤ 额定扭矩 × 0.8（余量），最大扭矩 ≤ 峰值扭矩。<br><strong>Step 4：转速确认</strong>——最高转速 ≤ 额定转速。<br><strong>Step 5：再生能量计算</strong>——频繁加减速需确认再生电阻选型。</p></div><h3>总线选型对比</h3><p>EtherCAT（倍福主导，开放协议，同步精度高）vs PROFINET IRT（西门子，同步周期 250μs~1ms）vs MECHATROLINK（安川，需专用 ASIC 芯片）。选型关键：同步精度需求（多轴插补选 IRT/EtherCAT）、控制器品牌（西门子生态选 IRT、倍福生态选 EtherCAT）、布线距离（EtherCAT 最长 100m/节点）。</p><h3>特殊场景</h3><p>多轴同步（电子凸轮/电子齿轮）需确认控制器支持的功能块；力矩控制（收卷/张力控制）需选配力矩传感器或用力矩估算模式；垂直轴需带抱闸电机+重力平衡校核。</p>'};
LESSONS["w6d7"]={title:"综合实战：产线设备清单编制",content:'<h3>项目背景</h3><p>一条中小型物料搬运产线，包含：5 台变频器驱动输送机（0.75~2.2kW）、2 台潜伏式 AGV（载重 1t，二维码导航）、3 台六轴机械手（负载 10kg）、1 套视觉检测系统（200 万像素工业相机）、配套光电/接近/激光传感器约 60 个、1 套 HMI+上位机监控。</p><h3>全链路选型思路</h3><div class="highlight"><p><strong>控制器</strong>：S7-1200 CPU 1215C（DI 14/DO 10，2 路 PTO）x 1 + 汇川 AM600（EtherCAT 主站，控机械手）x1<br><strong>驱动层</strong>：台达 VFD-E 系列变频器 x5 / 汇川 SV660 伺服 x3<br><strong>传感层</strong>：Sick WL12 光电 x20 / Omron E2E 接近 x15 / Sick DT35 激光 x4 / Keyence GL-R 安全光栅 x2<br><strong>执行层</strong>：SEW 减速电机 x5 / 亚德客气缸 x8<br><strong>操作层</strong>：威纶通 MT8121iE 12.1" 触摸屏 x1 + WinCC RT 上位机 x1</p></div><h3>BOM清单格式（必须掌握）</h3><p>标准格式：<strong>序号 | 设备名称 | 品牌型号 | 数量 | 单价(元) | 供应商 | 备注</strong>。<br>例：1 | PLC CPU | 西门子 6ES7 215-1AG40-0XB0 | 1 | 3,500 | 西门子授权代理 | 含 TIA Portal V18 授权。</p><h3>成本估算与采购策略</h3><p>全部进口方案约 38 万，国产替代方案约 21 万（省 45%）。关键部件（PLC、安全光栅）建议进口，通用部件（变频器、传感器、HMI）可用国产。采购注意事项：①提前确认交期（西门子 CPU 通常 4-8 周）②关键件备 10% 备件③选择至少 3 家供应商比价④确认质保期和售后响应时间。</p>'};
LESSONS["w7d1"]={title:"项目1：传送带启停控制系统",content:'<h3>项目背景</h3><p>某产线需用 PLC 控制一段 3 米传送带，要求实现<strong>正反转切换、急停保护、指示灯状态反馈</strong>三大功能。本项目综合运用第2周 PLC 编程知识、第6周变频器选型参数、第1周电气安全知识，是典型的入门级工控实操项目。</p><h3>设备清单</h3><div class="highlight"><p>S7-1200 CPU 1214C ×1 | G120 变频器 0.75kW ×1 | 三相异步电机 ×1 | 按钮盒（启动/停止/急停）×1 | 三色指示灯 ×1 | 24V 电源 ×1</p></div><h3>技术要点</h3><p>变频器参数中 <code>P1120</code>（加速时间）和 <code>P1121</code>（减速时间）是关键——设置太短会导致过流报警 F001，太长则影响生产效率，建议加速 3s、减速 2s。数字量输入接线需确认 NPN/PNP 类型，西门子 S7-1200 默认<strong>漏型输入（PNP）</strong>，信号端接 24V+。急停回路必须设计<strong>硬件+软件双重保护</strong>：硬件急停直接切断变频器使能信号（安全回路），软件急停在 PLC 程序中立即复位所有输出。</p><h3>实施步骤</h3><p><strong>第1步：硬件接线</strong>——先编制 PLC DI/DO 分配表：I0.0 正转按钮、I0.1 反转按钮、I0.2 停止按钮、I0.3 急停按钮（常闭）；Q0.0 正转输出→变频器 DI1、Q0.1 反转输出→变频器 DI2、Q0.2 绿灯、Q0.3 黄灯、Q0.4 红灯。变频器端子接线：DI1=正转/DI2=反转，使能端接 24V。</p><p><strong>第2步：TIA Portal 组态</strong>——创建项目→添加 CPU 1214C DC/DC/DC→在"设备组态"中确认 DI 地址 I0.0~I1.5，DO 地址 Q0.0~Q1.1。</p><p><strong>第3步：程序编写</strong>——核心逻辑：正转 Q0.0 与反转 Q0.1 互锁（串联对方的常闭触点），急停 I0.3 常闭触点串联在所有输出回路最前端。指示灯逻辑：Q0.0 或 Q0.1 ON→绿灯亮；电机停止且无急停→黄灯亮；急停触发→红灯亮。</p><p><strong>第4步：变频器参数设置</strong>——设置 <code>P0010=1</code> 进入快速调试模式，<code>P0304</code> 额定电压（按电机铭牌）、<code>P0305</code> 额定电流、<code>P1120=3.0</code> 加速时间、<code>P1121=2.0</code> 减速时间，完成后 <code>P0010=0</code> 退出。</p><p><strong>第5步：下载调试</strong>——编译→下载到 PLC→切换到 RUN 模式→打开在线监控→使用"变量表"强制测试各输入点→确认输出逻辑正确。</p><h3>验收标准</h3><p>正转按钮按下→电机正转+绿灯亮；停止按钮→电机停止+黄灯亮；急停按下→立即停机+红灯亮+蜂鸣；正转时按反转无效（互锁有效）；反转时按正转无效。</p><h3>常见问题</h3><p>① 变频器报 F001（过流）→检查 P1120/P1121 是否设置太短，适当延长；② 电机不转→用万用表交流档测量变频器输出端 U/V/W 电压，确认变频器已收到运行指令；③ PLC 输出灯亮但变频器不响应→检查 DO 到变频器 DI 的接线和公共端。</p>'};
LESSONS["w7d2"]={title:"项目2：Modbus多站轮询通信",content:'<h3>项目背景</h3><p>一台 S7-1200 作为 Modbus RTU 主站，通过 RS485 总线同时读取 3 台从站设备（2 台 G120 变频器 + 1 台温控仪表）的运行数据，实现多设备集中监控。本项目综合运用第1周 Modbus 协议知识和第2周 PLC 通信编程技能。</p><h3>设备清单</h3><div class="highlight"><p>S7-1200 1214C + CM1241 RS485 模块 ×1 | G120 变频器 ×2 | 温控仪表 ×1 | 120Ω 终端电阻 ×2 | 屏蔽双绞线</p></div><h3>技术要点</h3><p>核心指令为 <code>MB_COMM_LOAD</code>（初始化通信端口）和 <code>MB_MASTER</code>（执行读写请求）。轮询机制的关键：每个 <code>MB_MASTER</code> 调用后需等待 DONE 或 ERROR 信号，再触发下一站通信——用完成位的上升沿置位下一步的标志位，实现<strong>单步链式轮询</strong>。必须设置超时处理：若某站连续 3 次通信失败则跳过该站（置故障标志），避免整个轮询卡死。RS485 参数统一设为 9600/8E1（8 数据位+偶校验+1 停止位），这是 Modbus RTU 最通用的参数组合。</p><h3>实施步骤</h3><p><strong>第1步：RS485 接线</strong>——所有设备的 A+ 并接、B- 并接，形成菊花链拓扑。总线两端（物理最远端）各接一个 120Ω 终端电阻。屏蔽层<strong>仅单端接地</strong>（在 PLC 侧接地），避免地环路干扰。</p><p><strong>第2步：TIA Portal 组态</strong>——在设备视图中添加 CM1241 RS485 模块→配置端口参数：波特率 9600、奇偶校验偶、数据位 8、停止位 1→记下硬件标识符（用于 MB_COMM_LOAD）。</p><p><strong>第3步：编写轮询程序</strong>——创建轮询 DB，定义 Step 变量（0=空闲,1=读变频器1,2=读变频器2,3=读温控表,4=延时等待）。Step 0 初始化后→Step 1 调用 MB_MASTER(MODE=0 读，DATA_ADDR=40001，站号=1)→DONE 触发 Step 2→……→Step 4 延时 100ms 后回到 Step 1 循环。</p><p><strong>第4步：数据解析</strong>——变频器频率为 WORD 类型，需除以 100 转为 REAL（如 5000→50.00Hz）。温控表温度为有符号 INT，注意负数处理（补码转换）。</p><p><strong>第5步：在线测试</strong>——监控轮询 DB 的 Step 值和各站数据刷新时间。拔掉某台从站的 RS485 线，模拟断线场景，验证超时跳过逻辑是否生效。</p><h3>验收标准</h3><p>3 台从站数据均在 2 秒内刷新；任意一台从站断线不影响其他从站通信（继续读取并报警）；通信失败后在 HMI 变量表中显示对应从站为"离线"状态。</p><h3>常见问题</h3><p>① 所有站都不通→检查终端电阻位置和 A/B 线是否接反（A 接 B 会导致差分信号相位反转）；② 个别站不通→检查该站站号和波特率设置；③ 数据偶尔跳变→加强屏蔽层接地，远离变频器/大电机等干扰源。</p>'};
LESSONS["w7d3"]={title:"项目3：AGV站点呼叫联动",content:'<h3>项目背景</h3><p>产线 4 个工位（A/B/C/D）各设一个带灯呼叫按钮，PLC 接收呼叫信号后通过 Modbus TCP 协议通知 AGV 调度系统，AGV 自动前来接料。本项目综合运用第1周 Modbus TCP 协议、第3周 AGV 调度知识、第4周系统集成方法。</p><h3>设备清单</h3><div class="highlight"><p>S7-1200 1212C ×1 | 带灯按钮（红/绿/蓝/黄） ×4 | 海康 AGV ×1（模拟调度） | 24V 电源 | 交换机 ×1</p></div><h3>技术要点</h3><p>本项目中 S7-1200 作为 <strong>Modbus TCP Server</strong>（从站），AGV 调度系统作为 Client（主站）。核心是定义 Holding Register 寄存器映射表：<code>40001</code> 站点 A 呼叫（1=呼叫/0=空闲）、<code>40002</code> 站点 B 呼叫、<code>40003</code> 站点 C 呼叫、<code>40004</code> 站点 D 呼叫、<code>40005</code> AGV 到达确认（由 AGV 写入）、<code>40006</code> 当前 AGV 位置编号。握手协议：按钮按下→对应寄存器置 1→AGV 读取后确认→AGV 到达后将 40005 写入对应站号→PLC 检测到→寄存器清零→按钮灯灭。</p><h3>实施步骤</h3><p><strong>第1步：按钮接线</strong>——4 路 DI 分配：I0.0~I0.3 对应 A/B/C/D 工位呼叫信号（常开触点）；4 路 DO 分配：Q0.0~Q0.3 对应 4 个按钮灯。</p><p><strong>第2步：配置 Modbus TCP Server</strong>——在 TIA Portal 中，CPU 以太网属性→启用 Modbus TCP 服务器→创建 Holding Register 数据块 DB1（Array[1..10] of WORD）。</p><p><strong>第3步：呼叫逻辑</strong>——按钮上升沿→对应 DB1 地址置 1→按钮灯闪烁（500ms 周期）表示"等待响应"。AGV 读取到呼叫→调度 AGV 前往→到达后写入 40005=1→PLC 检测到→清空 DB1 对应位→按钮灯灭→呼叫完成。</p><p><strong>第4步：多站排队处理</strong>——当多个站点同时呼叫时采用固定优先级（A>B>C>D），AGV 完成当前任务后按优先级处理下一站点。AGV 忙时其他站点按钮灯闪烁，待当前任务完成后再依次响应。</p><p><strong>第5步：模拟 AGV 调度</strong>——用 <strong>Modbus Poll</strong>（第三方工具）模拟 AGV 调度系统：连接 PLC 的 Modbus TCP 端口 502→读取 40001~40006→手动修改 40005 模拟 AGV 到达信号→验证 PLC 逻辑。</p><h3>验收标准</h3><p>单站呼叫→AGV 响应→灯灭周期完整；多站同时呼叫→按优先级依次响应不丢失；AGV 忙时其他站呼叫进入排队等待；网络中断后重新连接自动恢复通信。</p><h3>常见问题</h3><p>① Modbus TCP 不通→用 <code>telnet PLC_IP 502</code> 测试端口可达性→检查 IP 地址和子网掩码→确认交换机端口灯亮；② 寄存器值不更新→检查 Server 的 Holding Register 起始地址和数据块映射→确认 Client 的读写地址与 DB1 偏移对应。</p>'};
LESSONS["w7d4"]={title:"项目4：HMI监控画面设计",content:'<h3>项目背景</h3><p>为一条产线设计完整的 HMI 监控系统，包含<strong>设备状态总览、单机详情、报警记录、趋势曲线</strong>四个画面。本项目综合运用第5周选型知识中的 HMI 部分和第2周 PLC 变量关联技能，培养独立设计人机界面的能力。</p><h3>设备清单</h3><div class="highlight"><p>西门子 KTP700 Basic HMI ×1（或 TIA Portal 模拟运行） | S7-1200 ×1 | 交换机 ×1</p></div><h3>技术要点</h3><p>画面切换实现：在 HMI 画面属性中设置按钮→"事件→单击→激活屏幕"选择目标画面。变量绑定方式：HMI 变量表中创建变量→连接 PLC 中的 DB 地址（如 DB1.DBW0）→画面控件属性中直接关联 HMI 变量。趋势图配置要点：采样周期建议 1 秒（太快耗资源），存储深度 1000 点（保存最近 1000 个采样值），勾选"记录"选项才能查看历史数据。报警配置：在 HMI 报警→离散量报警中定义触发变量和报警文本→报警类别分为"警告"（黄色，需关注）、"故障"（红色，需停机）、"急停"（红色闪烁，最高优先级）。</p><h3>实施步骤</h3><p><strong>第1步：TIA Portal 添加 HMI</strong>——右键项目→添加新设备→HMI→选择 KTP700 Basic→选择连接 PLC_1（PROFINET）→完成向导。</p><p><strong>第2步：建立 HMI 变量表</strong>——在 HMI 变量表中逐一创建变量：电机电流（REAL，DB1.DBD0）、电机转速（INT，DB1.DBW4）、运行状态（BOOL，DB1.DBX6.0）、故障代码（WORD，DB1.DBW8）等。</p><p><strong>第3步：画面1——总览</strong>——添加设备布局示意图（用矩形/圆形表示设备）→每个设备旁放置三色状态指示灯（运行=绿/待机=黄/故障=红）→顶部栏显示关键参数（当日产量、运行时间、OEE）。绑定方式：指示灯动画→"外观→背景色"根据状态变量值（0=灰/1=绿/2=黄/3=红）动态切换。</p><p><strong>第4步：画面2——单机详情</strong>——电机电流用"量表"控件实时显示、转速用"I/O 域"控件显示数值、启停用两个按钮（事件→置位/复位对应变量）、参数设置用 I/O 域（输入模式）绑定目标值变量。</p><p><strong>第5步：画面3——报警记录</strong>——拖入"报警视图"控件（显示当前和历史报警）、拖入"报警窗口"（运行时弹出式报警提示）。在"HMI 报警→离散量报警"中逐条定义报警文本，如"变频器过流故障"对应变量 DB1.DBX10.0=1。</p><p><strong>第6步：画面4——趋势曲线</strong>——拖入"趋势视图"控件→趋势属性中添加"数据源"为电机电流、电机温度、运行频率等变量→设置 X 轴时间范围 5 分钟→Y 轴自动缩放。</p><p><strong>第7步：模拟运行</strong>——点击 TIA Portal 工具栏"开始仿真"→在仿真面板中手动修改 PLC 变量值→观察 HMI 画面是否实时响应→测试画面切换流畅度→测试报警触发和确认功能。</p><h3>验收标准</h3><p>4 个画面切换流畅无闪烁；变量更新延迟 <1 秒；报警实时触发并正确显示在报警视图中；趋势曲线正确绘制最近 5 分钟历史数据。</p>'};
LESSONS["w7d5"]={title:"项目5：传感器分拣系统",content:'<h3>项目背景</h3><p>传送带上三种颜色工件（红/蓝/黄）经过颜色传感器识别后，由 3 个气缸分别推入对应的料道，实现自动分拣。本项目综合运用第4周传感器选型知识、第2周 PLC 逻辑控制、第6周气动执行器知识。</p><h3>设备清单</h3><div class="highlight"><p>S7-1200 1214C ×1 | 颜色传感器 ×1 | 光电传感器（检测工件到位） ×1 | 电磁阀+气缸 ×3 | 传送带+调速电机 ×1 | 24V 电源</p></div><h3>技术要点</h3><p>传感器触发时序是核心：光电传感器先检测到工件→延时 200ms（等待工件到达颜色传感器正下方）→颜色传感器输出颜色编码（如 01=红/10=蓝/11=黄）→再延时对应距离（推算气缸位置）→触发对应气缸推送。气缸互锁保护：同一时刻只能有一个气缸伸出，防止机械碰撞。传送带控制：分拣时传送带<strong>不需停止</strong>，气缸在传送带运行中侧推——这要求气缸动作速度足够快（50ms 以内完成推出+回位）。计数统计：每种颜色各一个计数器 CTU，记录当日分拣数量。</p><h3>实施步骤</h3><p><strong>第1步：硬件布局</strong>——传送带末端安装光电传感器（距颜色传感器 100mm）→颜色传感器距第1个气缸 150mm→3 个气缸间距 100mm→每个气缸对面是料道入口。</p><p><strong>第2步：IO 分配</strong>——DI：I0.0 启动、I0.1 停止、I0.2 光电传感器（工件到位）、I0.3~I0.4 颜色传感器输出（2 位编码）；DO：Q0.0 传送带运行、Q0.1~Q0.3 气缸 1/2/3。</p><p><strong>第3步：PLC 程序</strong>——主逻辑：传送带运行（Q0.0 ON）→I0.2 上升沿（工件到位）→读 I0.3/I0.4 颜色值存储到 MW10→根据颜色值启动对应定时器（延时=距离/传送带速度）→定时器到期→对应 Q0.1~Q0.3 ON（气缸伸出）→气缸伸出 500ms 后自动复位→对应计数器+1。</p><p><strong>第4步：颜色传感器示教</strong>——传感器对准红色工件→按示教键存储→对准蓝色存储→对准黄色存储→测试：遮挡传感器观察输出指示灯变化确认编码正确。</p><p><strong>第5步：联调</strong>——低速运行传送带→依次放入红/蓝/黄工件→观察光电触发→延时→对应气缸动作→工件落入正确料道→计数器递增→确认无误后提速至正常节拍。</p><h3>验收标准</h3><p>红/蓝/黄工件分拣准确率 100% 落入对应料道（连续 50 件测试无误）；处理速度 ≥30 件/分钟；PLC 中三种颜色计数独立准确。</p>'};
LESSONS["w7d6"]={title:"项目6：AI驱动PLC编程实战",content:'<h3>项目背景</h3><p>用自然语言描述需求，通过 AI（基于 Codesys MCP 协议）自动生成一个带<strong>使能控制、手自动切换、超时报警</strong>的阀门控制功能块（FB_ValveControl），全程无需手写一行代码，体验 AI 驱动编程的完整闭环。本项目综合运用第5周 AI 工具知识和第2周 PLC 编程基础。</p><h3>设备清单</h3><div class="highlight"><p>Codesys IDE（V3.5 SP19+） | Codesys MCP Server（GitHub 开源） | AI 客户端（Claude/GPT）</p></div><h3>技术要点</h3><p>MCP（Model Context Protocol）协议是 AI 与 Codesys IDE 之间的桥梁——AI 通过 JSON-RPC 调用 create_project、add_pou、declare_variable、write_st_code、compile 等工具直接操作 IDE。关键技巧在于<strong>自然语言需求描述的精确度</strong>：需要明确列出所有输入/输出变量及其数据类型、控制逻辑的边界条件（如超时时间、互锁规则），越详细 AI 生成的代码质量越高。AI 纠错循环是 MCP 的核心优势：编译报错→AI 读取错误列表→定位行号→分析原因→自动修改→重新编译→直到 0 Error 0 Warning。</p><h3>实施步骤</h3><p><strong>第1步：环境搭建</strong>——安装 Codesys IDE V3.5 SP19→打开命令行执行 <code>pip install codesys-mcp-server</code>→启动服务 <code>codesys-mcp --port 8080</code>→在 AI 客户端（如 Claude Desktop）中配置 Codesys MCP Server 连接。</p><p><strong>第2步：编写需求描述</strong>——向 AI 发送如下描述：<code>创建一个 FB_ValveControl 功能块。输入：bEnable(BOOL)使能、bAutoMode(BOOL)手自动切换、bAutoOpen(BOOL)自动开阀、bAutoClose(BOOL)自动关阀、bManualOpen(BOOL)手动开阀、bManualClose(BOOL)手动关阀、bOpened(BOOL)开到位、bClosed(BOOL)关到位。输出：bOpenCmd(BOOL)开阀指令、bCloseCmd(BOOL)关阀指令、bTimeout(BOOL)超时报警、iState(INT)状态码(0=待机/1=开阀中/2=关阀中/3=故障)。功能要求：使能 OFF 时所有输出归零；自动模式下 bAutoOpen 上升沿触发开阀直到 bOpened=TRUE；bAutoClose 上升沿触发关阀直到 bClosed=TRUE；手动模式下直接响应 ManualOpen/ManualClose；开阀或关阀超过 30 秒未到位→bTimeout=TRUE 且 iState=3。</code></p><p><strong>第3步：AI 自动执行</strong>——AI 收到需求后自动调用工具序列：建 POU→声明变量（VAR_INPUT/VAR_OUTPUT/VAR）→写入 ST 代码→触发 compile。</p><p><strong>第4步：编译纠错循环</strong>——如果出现编译错误（如变量类型不匹配、END_IF 缺失），AI 自动读取错误信息→定位行号→修改代码→重新编译→直到 0 Error 0 Warning。</p><p><strong>第5步：功能验证</strong>——在 Codesys 仿真中手动置位输入变量（bEnable=TRUE, bAutoMode=TRUE, bAutoOpen=TRUE）→观察输出 bOpenCmd 是否为 TRUE→再置位 bOpened=TRUE→观察 bOpenCmd 是否变为 FALSE→超时测试：bAutoOpen=TRUE 但不置位 bOpened，观察 30 秒后 bTimeout 是否变为 TRUE。</p><p><strong>第6步：代码优化</strong>——要求 AI 为代码添加中文注释、将核心逻辑拆分为子函数、生成导出文件 .exp 供其他工程复用。</p><h3>验收标准</h3><p>功能块编译 0 Error / 0 Warning；手自动切换逻辑正确（自动模式下手动输入无效）；开阀超时 30 秒自动报警且 iState=3；AI 全流程生成耗时 <2 分钟。</p><h3>常见问题</h3><p>① MCP 连接失败→检查 Codesys MCP Server 是否启动、端口 8080 是否被占用、AI 客户端配置的 API Key 是否有效；② 编译报错→让 AI 读取错误并循环修复，通常 2~3 轮即可通过；③ 仿真中输出不正确→用 Codesys 的"在线→监控"模式逐行跟踪 ST 代码执行路径。</p>'};
LESSONS["w7d7"]={title:"项目7：综合产线方案设计",content:'<h3>项目背景</h3><p>设计一条小型自动化装配产线的完整方案——从<strong>需求分析→设备选型→方案设计→BOM 清单→成本估算→实施计划→风险评估</strong>全流程覆盖。本项目综合运用前 6 周的全部知识，模拟真实工程师从零规划一条产线的完整过程。</p><h3>项目需求</h3><div class="highlight"><p>产线包含上料工位→装配工位→检测工位→下料工位共 4 个工位，节拍要求 <strong>30 秒/件</strong>，需具备数据采集和 MES 对接能力。</p></div><h3>任务1：需求分析</h3><p>节拍计算：30 秒/件即每小时 120 件，每天 8 小时产能 960 件（按 85% OEE = 816 件）。设备数量推导：上料 30s + 装配 25s（瓶颈） + 检测 20s + 下料 15s，因装配为瓶颈工位需考虑并行方案。工艺流程：上料（振动盘/托盘供料）→机器人抓取→装配（压装+螺丝锁附）→检测（视觉尺寸+气密性）→下料（分 OK/NG 两条通道）。</p><h3>任务2：设备选型</h3><p><strong>PLC 选型</strong>：西门子 S7-1200 1215C（14DI/10DO/2AI，PROFINET） vs 汇川 AM401（EtherCAT 主站，16DI/12DO/4AI）——西门子生态完善但价高，汇川性价比高且支持 CODESYS。建议主控选西门子可靠稳定，子站用汇川降成本。<br><strong>传感器选型</strong>：光电用 Sick WL12-3P（对射式，30m，PNP）×8；接近开关 Omron E2E-X5MF1（电感式，5mm）×6；激光测距 Sick DT35-B15251（0.2~10m）×2；视觉检测用 Keyence CV-X400 系列。<br><strong>执行器选型</strong>：气缸选亚德客 ACQ 系列（缸径 32mm，行程 100mm，带磁环）×6 vs 电缸选 IAI RCA2（重复定位 ±0.02mm）——装配工位建议用电缸（精度要求高），上下料用气缸（成本低）。<br><strong>AGV 选型</strong>：潜伏式海康 MR-Q7-600CE（载重 600kg，二维码导航，精度 ±5mm） vs 牵引式（适合长距离批量配送，但本场景工位间距离短，潜伏式更合适）。<br><strong>HMI 选型</strong>：威纶通 MT8121iE（12.1"，1024×768，以太网+串口）×1，价格约 2500 元。</p><h3>任务3：通信架构设计</h3><div class="highlight"><p><strong>主干网络</strong>：PROFINET（控制器间实时通信，周期 2ms）<br><strong>子站通信</strong>：Modbus RTU（变频器、温控表，9600/8E1）<br><strong>上位对接</strong>：OPC UA（PLC→MES，加密传输，支持订阅）<br><strong>视觉系统</strong>：EtherNet/IP（Keyence CV-X 与 PLC 通信）</p></div><h3>任务4：BOM 清单编制</h3><p>按工位列出标准格式表格：序号 | 设备名称 | 品牌型号 | 数量 | 单价(元) | 供应商 | 备注。示例条目：1 | PLC CPU | 西门子 6ES7 215-1AG40-0XB0 | 1 | 3,500 | 西门子授权代理 | 含 DI 14/DO 10；2 | 触摸屏 | 威纶通 MT8121iE | 1 | 2,500 | 威纶通代理 | 12.1"；3 | 变频器 | 台达 VFD007EL43A | 3 | 1,200 | 台达代理 | 0.75kW 380V……以此类推约 25~30 项。</p><h3>任务5：成本估算</h3><p><strong>全进口方案</strong>（西门子+Sick+Keyence+IAI+海康）：约 45~50 万元。<br><strong>国产混合方案</strong>（汇川+国产传感器+亚德客+海康）：约 20~25 万元。对比分析：进口方案可靠性更高但成本翻倍，建议核心工位（装配/检测）用进口，辅助工位（上下料/输送）用国产——混合方案约 28~32 万元，性价比最优。</p><h3>任务6：实施计划</h3><p>分为 6 个阶段，预估总工期 12 周：① 机械安装（2 周）→② 电气接线（1.5 周）→③ PLC 编程（2 周）→④ HMI 组态（1 周）→⑤ 联调（2 周）→⑥ 试运行+验收（1.5 周）。其中预留 2 周缓冲应对突发问题。</p><h3>任务7：风险评估</h3><p>① 器件交期风险：西门子 CPU 交期通常 4~8 周，需提前下单；② 调试周期风险：首次联调出现通信兼容性问题概率高（约 30%），需预留充足调试时间；③ 人员技能风险：需至少 1 名熟悉 TIA Portal 的工程师和 1 名熟悉视觉系统调试的工程师，技能不匹配时需外聘或培训。应对策略：关键器件提前 2 个月采购、调试阶段安排设备原厂工程师到场支持、核心岗位提前进行技能培训。</p>'};
LESSONS["w8d1"]={title:"基本电气符号大全",content:'<h3>电路图是工程师的"语言"</h3><p>电路图是工业自动化工程师的通用语言，而<strong>电气图形符号</strong>就是这门语言的基本词汇。本课系统讲解国标 <strong>GB/T 4728</strong> 规定的常用电气图形符号，掌握这些符号是识读任何电气图纸的前提。</p><h3>六大类符号对照表</h3><table class="highlight"><tr><th>类别</th><th>符号名称</th><th>图形特征</th><th>文字符号</th><th>备注</th></tr><tr><td rowspan="6">开关类</td><td>单极开关</td><td>—○/ —○—（单刀单掷）</td><td>SA / S</td><td>一般手动操作</td></tr><tr><td>双极开关</td><td>—○○—（双刀单掷）</td><td>QS</td><td>同时切断两相</td></tr><tr><td>按钮常开(NO)</td><td>○—| （圆圈+竖线）</td><td>SB</td><td>按下闭合</td></tr><tr><td>按钮常闭(NC)</td><td>○—/ （圆圈+斜线）</td><td>SB</td><td>按下断开</td></tr><tr><td>急停按钮</td><td>○—/ + 蘑菇头符号</td><td>ES / EMG</td><td>红色蘑菇头，自锁</td></tr><tr><td>行程开关</td><td>○—| 或 ○—/ + 箭头</td><td>SQ / LS</td><td>机械触发</td></tr><tr><td rowspan="5">继电器类</td><td>继电器线圈(一般)</td><td>□ 或 ◇（方框/菱形）</td><td>KA</td><td>通用中间继电器</td></tr><tr><td>接触器线圈</td><td>□（粗框，标注 KM）</td><td>KM</td><td>带灭弧装置</td></tr><tr><td>时间继电器线圈</td><td>◇（菱形+星号 *)</td><td>KT</td><td>得电延时/失电延时</td></tr><tr><td>热继电器脱扣器</td><td>□（热元件符号）</td><td>FR / KH</td><td>双金属片原理</td></tr><tr><td>中间继电器</td><td>□（标注 K 或 KA）</td><td>KA</td><td>多触点扩展</td></tr><tr><td rowspan="5">触点类</td><td>常开触点</td><td>—| |—（左开）</td><td>KM/KS</td><td>线圈得电闭合</td></tr><tr><td>常闭触点</td><td>—|/|—（右闭）</td><td>KM/KS</td><td>线圈得电断开</td></tr><tr><td>延时闭合常开</td><td>—| |— + 箭头（→）</td><td>KT</td><td>得电后延时闭合</td></tr><tr><td>延时断开常闭</td><td>—|/|— + 箭头（→）</td><td>KT</td><td>失电后延时断开</td></tr><tr><td>接触器主触点</td><td>—◇—（带灭弧弧线）</td><td>KM</td><td>三对主触点</td></tr><tr><td rowspan="5">保护器件</td><td>熔断器</td><td>—∿—（波浪线）</td><td>FU</td><td>过流熔断</td></tr><tr><td>断路器 MCCB/MCB</td><td>—○—（带操作手柄）</td><td>QF</td><td>可手动操作</td></tr><tr><td>热继电器</td><td>—▭—（矩形+双金属）</td><td>FR</td><td>过载保护</td></tr><tr><td>漏电保护器 RCD</td><td>QF 符号 + 测试按钮 T</td><td>ELR / RCD</td><td>漏电流触发</td></tr><tr><td>避雷器</td><td>—∧—（火花间隙）</td><td>FV / SA</td><td>过电压保护</td></tr><tr><td rowspan="6">电源与连接</td><td>直流电源</td><td>—|(+)|(—)|(—)（长短线）</td><td>G / DC</td><td>长线=正，短线=负</td></tr><tr><td>交流电源</td><td>~ （波浪线）</td><td>AC / G</td><td>标注电压值</td></tr><tr><td>保护接地</td><td>⏚（接地符号三横）</td><td>PE</td><td>接大地</td></tr><tr><td>工作接地</td><td>⏚（接地符号，虚线框）</td><td>N / NE</td><td>中性点接地</td></tr><tr><td>端子排</td><td>| | |（竖线阵列）</td><td>XT / TB</td><td>编号 X1:1, X1:2...</td></tr><tr><td>导线 T 接</td><td>—┬—（T 型分支）</td><td>-</td><td>不切断主干</td></tr><tr><td rowspan="6">电机与变压器</td><td>三相异步电机</td><td>○ 内 M（圆圈内 M）</td><td>M / G</td><td>标注功率/电压</td></tr><tr><td>单相电机</td><td>○ 内 M（单圈）</td><td>M</td><td>分主绕组/启动绕组</td></tr><tr><td>双速电机</td><td>○ 内 M + /2 或 /4</td><td>M</td><td>△/YY 切换</td></tr><tr><td>双绕组变压器</td><td>⏀（两线圈耦合）</td><td>T / TR</td><td>标注变比</td></tr><tr><td>自耦变压器</td><td>⏀（单线圈带抽头）</td><td>T / AT</td><td>调压用途</td></tr><tr><td>电抗器</td><td>—000—（三个线圈）</td><td>L / D</td><td>限流/滤波</td></tr></table><h3>符号记忆技巧</h3><div class="highlight"><p><strong>触点"左开右闭"原则</strong>：符号左边是常开触点（—| |—），右边是常闭触点（—|/|—）。记住"左开右闭"四字口诀。<br><strong>按钮符号</strong>：圆圈+竖线 = 常开（NO），圆圈+斜线 = 常闭（NC）。斜线像一道"关闭"的屏障。<br><strong>线圈与触点编号</strong>：继电器/接触器线圈用字母 K 开头（KA/KM/KT），对应触点编号规则：11-12 为常闭，13-14 为常开（14 对应编号 14 是常开触点的公共端）。</p></div><h3>练习</h3><p><strong>练习1</strong>：给出以下 10 个符号名称，请默画图形符号：单极开关、按钮常开、按钮常闭、急停按钮、接触器线圈、常开触点、常闭触点、熔断器、三相电机、接地符号。<br><strong>练习2</strong>：给出 10 个图形符号（见附图），请写出对应的名称和文字符号。</p>'};
LESSONS["w8d2"]={title:"控制回路器件符号",content:'<h3>控制回路器件：二次回路的"积木"</h3><p>二次控制回路（控制电压通常为 AC220V 或 DC24V）中使用大量专用器件，这些器件在电气原理图、接线图中高频出现。掌握它们的符号和端子定义，是看懂控制回路图的关键。</p><h3>时间继电器：得电延时 vs 断电延时</h3><div class="highlight"><p><strong>得电延时型（ON-delay）</strong>：线圈得电后，触点延时闭合（或断开）。符号特征：菱形◇+星号*，延时箭头指向触点动作方向。<br><strong>断电延时型（OFF-delay）</strong>：线圈失电后，触点延时复位。符号特征：菱形◇+星号*+半圆（表示记忆功能）。<br>常见型号：<code>H3Y-2</code>（8 脚，延时范围 0.1s~10min）、<code>JS14P</code>（面板设定，延时范围 0.1s~100h）。触点容量通常为 <strong>5A 250V AC</strong>。</p></div><h3>中间继电器：多触点扩展的核心</h3><p>中间继电器（KA）用于<strong>触点扩展</strong>和<strong>电压转换</strong>。常见规格：<br><strong>4 常开 4 常闭</strong>：14 脚（2 排×7 针），线圈引脚 13-14（A1-A2 对应 13-14）。<br><strong>2 开 2 闭</strong>：8 脚（2 排×4 针），线圈引脚 A1-A2（对应 13-14 或 A1-A2 标注）。<br>型号 <code>HH52P</code>（14 脚，DC24V 线圈）、<code>MY4N-J</code>（14 脚，AC220V 线圈，带 LED 指示灯）。<br><strong>底座端子图识别</strong>：14 脚底座（PYF14A-E）→ 触点编号 1-2/3-4/5-6/7-8 为常开，9-10/11-12/13-14/15-16 为常闭；8 脚底座（PYF08A-E）→ 触点编号 1-2/3-4 为常开，5-6/7-8 为常闭。</p><h3>热继电器：过载保护的"哨兵"</h3><p>热继电器（FR）串联在主回路中，<strong>常闭触点（95-96）</strong>串联在控制回路中——过载时双金属片弯曲，95-96 断开，接触器线圈失电。常开触点（97-98）接报警指示灯或 PLC 输入。<br>整定电流旋钮调节范围通常为 <code>0.63~1.0×Ie</code>（Ie 为电机额定电流）。型号示例：<code>LRD16</code>（施耐德，0.63~1.0A 可调）、<code>3UA59</code>（西门子，热元件可插拔）。</p><h3>行程开关与接近开关</h3><div class="highlight"><p><strong>机械式行程开关</strong>：滚轮式/柱塞式/摇臂式，符号同按钮（○—| 或 ○—/），加箭头表示触发方向。<br><strong>电感式接近开关</strong>：检测金属物体，三线制（棕+蓝-黑信号）。NPN 型（低电平有效）vs PNP 型（高电平有效）。符号：方框内标注 SQ + 感应面箭头。<br><strong>电容式接近开关</strong>：检测所有材质（含液体、粉末），符号同电感式，标注电容符号。<br><strong>三线制接线色码（传感器世界标准）</strong>：<code>棕=+24V</code>、<code>蓝=0V</code>、<code>黑=信号 DO</code>。牢记这个配色，接错会导致传感器烧毁！</p></div><h3>指示灯与蜂鸣器</h3><p><strong>AD16-22 系列</strong>指示灯：直径 16mm/22mm，电压等级 AC220V/DC24V。颜色含义标准：<strong>红=故障/急停</strong>、<strong>绿=运行</strong>、<strong>黄=待机/警告</strong>、<strong>白=电源</strong>。<br>蜂鸣器（HA）：通常 AC220V 供电，串联在报警回路中，与红色指示灯并联。</p><h3>端子标注规则</h3><p>接触器线圈：<code>A1/A2</code>（A1 接 +24V/A2 接 0V 或反之，取决于线圈电压类型）。<br>触点编号规则：<strong>主触点</strong>用 1-2/3-4/5-6（三对，对应 L1-T1/L2-T2/L3-T3）；<strong>辅助触点</strong>用两位数编码（11-12 常闭、13-14 常开、21-22 常闭、23-24 常开……）。<br>继电器底座：14 脚底座的线圈引脚为 13-14（或 A1-A2），触点按行列矩阵排列，需对照底座图纸识别。</p><h3>练习</h3><p>给出以下 10 个器件的实物图或端子图，请写出它们在电路图中的符号：时间继电器（得电延时）、时间继电器（断电延时）、中间继电器（14 脚）、热继电器、行程开关、电感式接近开关（NPN）、电感式接近开关（PNP）、指示灯（红色 AC220V）、蜂鸣器、端子排（XT）。</p>'};
LESSONS["w8d3"]={title:"主回路与二次回路",content:'<h3>一张完整电气图纸的两大组成部分</h3><p>工业电气图纸分为<strong>主回路（强电）</strong>和<strong>二次回路（弱电/控制）</strong>两部分。二者在图纸上用不同线径、不同颜色（或不同线型）区分，理解这种区分是识读电气图的基础。</p><h3>主回路特征</h3><div class="highlight"><p><strong>路径</strong>：电源进线 → 断路器 QF → 接触器主触点 KM → 热继电器 FR → 电机 M。<br><strong>线径</strong>：≥1.5mm²（根据电机功率计算，如 3kW 电机用 2.5mm²）。<br><strong>电压等级</strong>：AC380V（三相）或 AC220V（单相）。<br><strong>典型元件文字符号</strong>：断路器 QF、接触器主触点 KM、热继电器 FR、电机 M。<br><strong>图纸布局</strong>：左侧为电源进线 → 右侧为负载出线，从上到下标注 L1/L2/L3 三相。</p></div><h3>二次回路特征</h3><p><strong>路径</strong>：控制变压器/开关电源 → 熔断器 FU → 按钮 SB → 继电器/接触器线圈 → 回到电源另一极。<br><strong>线径</strong>：0.75mm²（控制回路电流通常 ≤5A）。<br><strong>电压等级</strong>：DC24V（安全电压，最常用）、AC220V（老式设备）、AC110V（机床设备）。<br><strong>典型元件文字符号</strong>：按钮 SB、继电器线圈 KA/KM、指示灯 HL、蜂鸣器 HA、热继电器辅助触点 FR。<br><strong>图纸布局</strong>：竖排"导线式"（从上到下依次排列元件），图纸右侧标注<strong>线号</strong>（从 01 开始递增）。</p><h3>线号编号规范</h3><p><strong>主回路线号</strong>：用 <code>U/V/W + 数字</code> 表示，如 <code>U1</code>（断路器进线端 L1）、<code>U2</code>（断路器出线端，接接触器进线）、<code>V1/V2</code>、<code>W1/W2</code>。电机侧标注 <code>U/V/W</code>（对应绕组端）。<br><strong>控制回路线号</strong>：用<strong>纯数字</strong>，奇数（01/03/05...）为正极（L+ 或 220V 相线），偶数（02/04/06...）为 0V（M 或 N）。<br><strong>线号标注规则</strong>：每条导线的两端都标注相同线号，方便查线和接线。</p><h3>图纸区域划分</h3><div class="highlight"><p>标准电气图纸采用<strong>分区索引</strong>：<br><strong>图框分区</strong>：竖列编号 1~8（或 A~H），横排编号 A~D。定位某元件时描述为"位于图 3 的 B 列 2 行"。<br><strong>图纸目录</strong>：第 1 张，列出所有图纸的图号、图名、图幅（A3/A4）、版本号。<br><strong>主回路图</strong>：第 2 张，展示强电部分。<br><strong>控制回路图</strong>：第 3 张，展示弱电控制部分。<br><strong>端子接线图</strong>：第 4 张，展示柜内端子排 XT 的接线分配。<br><strong>BOM 清单</strong>：第 5 张，列出所有元器件的型号、数量、厂家。</p></div><h3>主回路与控制回路的区分练习</h3><p>给出一张简化的<strong>电机正反转控制图纸</strong>（文字描述）：<br>左侧：L1/L2/L3 进线 → QF1 断路器 → KM1/KM2 接触器主触点（两路）→ FR1 热继电器 → M1 电机。<br>右侧：控制变压器 AC220V 输出 → FU1 熔断器 → SB1（停止，常闭）→ SB2（正转启动，常开）并联 KM1 常开触点 → KM2 常闭触点 → KM1 线圈 → 0V。<br><strong>任务</strong>：区分出主回路部分（左侧）和控制回路部分（右侧），并标注各元件的文字符号。</p>'};
LESSONS["w8d4"]={title:"电机控制电路识读",content:'<h3>电动机控制：工业自动化的核心</h3><p>电动机控制是工业自动化中最基础也最重要的电路类型。自锁/互锁/正反转/星三角是<strong>四大基础控制电路</strong>，几乎所有复杂的电机控制逻辑都建立在这四个基础之上。</p><h3>四大电路详解</h3><div class="highlight"><p><strong>1. 自锁电路（起保停）</strong><br>SB2 常开（启动）并联 KM 常开触点 → 形成自保持；SB1 常闭（停止）串联 → 解除自锁。这是所有控制电路的基础。<br>动作流程：按 SB2 → KM 线圈得电 → KM 主触点闭合（电机运行）+ KM 常开触点闭合（自锁）→ 松开 SB2 后电流仍通过 KM 常开触点维持 → 按 SB1 → KM 线圈失电 → 自锁解除，电机停止。</p></div><p><strong>2. 互锁电路（正反转基础）</strong><br>KM1 线圈串 KM2 常闭触点，KM2 线圈串 KM1 常闭触点 → <strong>电气互锁</strong>（防止两个接触器同时吸合造成相间短路）。再加<strong>按钮互锁</strong>（SB2 串 SB3 常闭触点，SB3 串 SB2 常闭触点）→ 双重保险。<br>主回路换相：KM1 接 L1-L2-L3（正转），KM2 接 L3-L2-L1（任意两相对调 = 反转）。</p><p><strong>3. 顺序启停</strong><br>M2 必须在 M1 运行后才能启动（M2 线圈串 KM1 常开触点）；M1 必须在 M2 停止后才能停止（M1 停止回路并 KM2 常开触点）。适用于<strong>传送带多级联动</strong>（前级不停、后级不能停；后级不停止、前级不能停）。</p><div class="highlight"><p><strong>4. 星三角降压启动</strong><br><strong>主回路设计</strong>：KM1（主接触器，始终吸合）+ KM3（星形接触器，启动时吸合）+ KM2（三角形接触器，运行时吸合）。启动时：KM1+KM3 吸合 → 电机绕组星形连接（每相绕组电压 = 220V）→ 延时 5~10 秒 → KM3 断开 + KM2 吸合 → 电机绕组三角形连接（每相绕组电压 = 380V）。<br><strong>启动电流</strong>：星形启动时电流降至三角形直接启动的 <strong>1/3</strong>。<br><strong>控制回路</strong>：启动按钮 → KM1+KM3 吸合 + 时间继电器 KT 得电 → KT 延时到 → KT 常闭断开 KM3 + KT 常开闭合 KM2。<br><strong>时间继电器设置</strong>：一般设置 5~10 秒（根据电机功率和负载惯量调整）。</p></div><h3>电路分析四步法</h3><p>拿到一张电机控制电气图，按以下四步分析：<br><strong>① 找电源</strong>：控制回路的电源从哪来？（控制变压器 / 开关电源 / 相线 L）<br><strong>② 看线圈</strong>：有哪些接触器/继电器线圈？它们的得电路径是什么？<br><strong>③ 沿线路追踪触点</strong>：每个线圈的回路中有哪些触点？这些触点受谁控制？<br><strong>④ 判断动作逻辑</strong>：按下某按钮后，哪些线圈得电？哪些触点动作？电机如何响应？</p><h3>练习：星三角完整电路图分析</h3><p>给出一张星三角启动的<strong>完整电路图</strong>（文字描述）：<br>主回路：L1/L2/L3 → QF1 → KM1（主）→ KM3（星）或 KM2（角）→ FR1 → M1。<br>控制回路：SB1（停止，常闭）→ SB2（启动，常开）并联 KM1 常开 → KT 线圈 + KM1 线圈 → 电源。<br>KT 延时到 → KT 常闭断开 KM3 → KT 常开闭合 KM2。<br><strong>任务</strong>：分析启动时序，写出器件动作顺序表（按下 SB2 后的每一步，精确到触点动作）。</p>'};
LESSONS["w8d5"]={title:"传感器与执行器接线图",content:'<h3>传感器与执行器：PLC 与现场设备的桥梁</h3><p>传感器负责<strong>采集现场信号</strong>（位置、温度、压力、距离……），执行器负责<strong>执行控制命令</strong>（电磁阀、继电器、变频器、伺服……）。本课讲解各类传感器的接线方式、NPN/PNP 区别、执行器控制方式。</p><h3>传感器接线：两线制/三线制/四线制</h3><div class="highlight"><p><strong>两线制</strong>：限位开关、干簧管、机械式行程开关。只有两根线，串联在 DI 回路中（一根进、一根出）。接线最简单，但需要注意触点类型（NO/NC）。<br><strong>三线制 NPN/PNP（重点！）</strong>：<br>• NPN = 低电平有效（信号线对 0V 导通）→ 对应 PLC 的<strong>源型输入（Sourcing）</strong>。接线：棕 +24V、蓝 0V、黑信号 → 触发时黑线输出 0V。<br>• PNP = 高电平有效（信号线对 +24V 导通）→ 对应 PLC 的<strong>漏型输入（Sinking）</strong>。接线：棕 +24V、蓝 0V、黑信号 → 触发时黑线输出 +24V。<br><strong>重要</strong>：西门子 S7-1200 默认 PNP 传感器（漏型输入，M 端接 0V）；三菱 FX 系列默认 NPN 传感器（源型输入，COM 端接 +24V）。<strong>接线错误会导致传感器烧毁！</strong><br><strong>四线制</strong>：模拟量传感器（4-20mA 电流型 / 0-10V 电压型），常用于压力/温度/距离传感器。两根线供电（+24V/0V），两根线输出信号（IO/0V 或 +OUT/0V）。</p></div><h3>传感器颜色编码对照表（世界标准）</h3><table class="highlight"><tr><th>线色</th><th>含义</th><th>万用表测量</th><th>注意事项</th></tr><tr><td>棕（Brown）</td><td>+24V 电源正极</td><td>对蓝线 24V</td><td>接反会烧毁传感器！</td></tr><tr><td>蓝（Blue）</td><td>0V 电源负极</td><td>对棕线 0V</td><td>必须可靠接地</td></tr><tr><td>黑（Black）</td><td>信号输出 DO</td><td>触发时 0V 或 24V</td><td>接 PLC DI 点</td></tr><tr><td>白（White）</td><td>信号 2 / 调零</td><td>因传感器而异</td><td>部分型号无白线</td></tr></table><p><strong>接线口诀</strong>：棕接正、蓝接负、黑接 DI、白看说明书。</p><h3>执行器接线</h3><p><strong>电磁阀</strong>：单线圈（弹簧复位，断电后阀芯回到初始位置）vs 双线圈（自保持，断电后阀芯保持位置）。24VDC 驱动，线圈必须<strong>并联续流二极管</strong>（1N4007）防止关断时产生高压反峰（可能击穿 PLC DO 点）。西门子 S7-1200 DO 点容量 1A，可直接驱动小型电磁阀（功率 ≤24W）。<br><strong>继电器驱动</strong>：PLC DO → 中间继电器线圈（线圈必须并续流二极管！）→ 继电器触点 → AC 负载（接触器线圈/加热管/电机）。继电器触点容量通常 5A~10A，足以驱动大部分 AC 负载。<br><strong>变频器</strong>：PLC AO（0-10V）→ 变频器 AI1（频率给定）；PLC DO → 变频器 DI1（正转）/ DI2（反转）/ DI3（故障复位）。注意：变频器 DI 点通常需要外接 24V 电源（源型/漏型接法）。<br><strong>伺服驱动器</strong>：<strong>脉冲+方向（PULSE+DIR）</strong> vs <strong>CW/CCW 双脉冲</strong>。差分信号（RS422 电平）抗干扰能力强，适合长距离传输。典型接线：PLC 高速输出 Q0.0（PULSE+）/ Q0.1（DIR+）→ 伺服驱动器 PULS+/SIGN+（差模输入）。</p><h3>练习：传感器+执行器选型与接线图</h3><p>场景：某产线需要检测工件到位（光电传感器）、区分金属/非金属（电感式接近开关）、测量工件高度（激光测距传感器），并执行分拣动作（电磁阀驱动气缸）。<br><strong>任务</strong>：① 选择合适的传感器型号（包括输出类型 NPN/PNP、接线方式）；② 画出完整的接线图（包括 PLC DI/DO 分配、传感器接线、电磁阀接线、续流二极管接法）；③ 标注所有线号和端子号。</p>'};
LESSONS["w8d6"]={title:"PLC接线图与I/O分配",content:'<h3>PLC 接线图与 I/O 分配表：程序与实物的桥梁</h3><p>PLC 接线图和 I/O 分配表是连接"程序"与"实物"的桥梁。程序中的 <code>I0.0</code>、<code>Q0.0</code> 等地址，必须和实物接线一一对应，否则程序逻辑正确也无法正常运行。</p><h3>S7-1200 硬件概览</h3><div class="highlight"><p><strong>CPU 1214C AC/DC/RLY</strong>：供电 AC220V、数字量输入 14 点（DC24V 源型/漏型可切换）、数字量输出 10 点（继电器输出，2A 每点）、模拟量输入 2 路（0-10V / 0-20mA）。<br><strong>信号板 SB</strong>：可扩展 1 路模拟量输出（AO）或 1 路 RS485 通信。<br><strong>扩展模块 SM</strong>：可扩展数字量（DI/DO）、模拟量（AI/AO）、通信（RS485/RS232）等模块，最多支持 8 个扩展模块。</p></div><h3>I/O 地址分配规则</h3><p><strong>本地输入</strong>：<code>I0.0 ~ I1.5</code>（14 点），字节.位 编址方式。<br><strong>本地输出</strong>：<code>Q0.0 ~ Q1.1</code>（10 点）。<br><strong>扩展模块</strong>：输入从 <code>I8.0</code> 开始，输出从 <code>Q8.0</code> 开始（按模块槽位自动分配地址）。<br><strong>命名规范</strong>：地址 + 功能描述 → <code>I0.0:急停按钮</code>、<code>Q0.0:主接触器</code>、<code>I1.0:变频器故障</code>。</p><h3>I/O 分配表模板</h3><table class="highlight"><tr><th>地址</th><th>符号名</th><th>功能描述</th><th>信号类型</th><th>备注</th></tr><tr><td>I0.0</td><td>EMG_Stop</td><td>急停按钮</td><td>DI (NC)</td><td>常闭触点，接 24V+</td></tr><tr><td>I0.1</td><td>Start_PB</td><td>启动按钮</td><td>DI (NO)</td><td>绿色带灯按钮</td></tr><tr><td>I0.2</td><td>Stop_PB</td><td>停止按钮</td><td>DI (NC)</td><td>红色带灯按钮</td></tr><tr><td>I0.3</td><td>Photo_Sensor</td><td>光电传感器</td><td>DI (PNP)</td><td>三线制，棕+24V 蓝 0V 黑信号</td></tr><tr><td>I0.4</td><td>Motor_Run_FB</td><td>电机运行反馈</td><td>DI (NO)</td><td>接触器常开辅助触点</td></tr><tr><td>Q0.0</td><td>Main_KM</td><td>主接触器</td><td>DO (Relay)</td><td>继电器输出，AC220V 线圈</td></tr><tr><td>Q0.1</td><td>Run_Lamp</td><td>运行指示灯</td><td>DO (DC24V)</td><td>绿色 LED，24V 供电</td></tr><tr><td>Q0.2</td><td>Fault_Lamp</td><td>故障指示灯</td><td>DO (DC24V)</td><td>红色 LED，24V 供电</td></tr><tr><td>Q0.3</td><td>Solenoid_Valve</td><td>电磁阀</td><td>DO (DC24V)</td><td>24V 电磁阀，并续流二极管</td></tr></table><h3>端子接线图识读</h3><p>S7-1200 CPU 模块：<br><strong>上方端子</strong>：L+/M（24V 电源）、DI 输入点（I0.0~I1.5）、模拟量输入（AI0/AI1）。<br><strong>下方端子</strong>：DO 输出点（Q0.0~Q1.1）、公共端（1L/2L）。<br><strong>继电器输出分组</strong>：Q0.0~Q0.3 共用 1L（公共端），Q0.4~Q0.7 共用 2L，Q1.0~Q1.1 共用 3L → <strong>不同组可用不同电压</strong>（如 1L 接 AC220V、2L 接 DC24V）。</p><h3>接线规范与注意事项</h3><div class="highlight"><p><strong>DC24V 电源极性</strong>：不可接反！接反会导致 PLC 输入点无法识别信号，甚至烧毁 DI 点。<br><strong>DI 公共端（M）</strong>：接 0V（漏型输入）或接 +24V（源型输入），取决于传感器类型（PNP→M 接 0V；NPN→M 接 +24V）。<br><strong>DO 继电器输出公共端（1L/2L/3L）</strong>：接负载电源（AC220V 或 DC24V，取决于负载类型）。<br><strong>屏蔽线接地</strong>：模拟量信号、通信线（RS485/PROFINET）必须使用屏蔽双绞线，屏蔽层<strong>单端接地</strong>（在 PLC 侧接 PE，现场侧悬空），防止地环路干扰。</p></div><h3>练习：传送带控制场景 I/O 分配与接线图</h3><p>场景：一条传送带，需要 3 个按钮（启动/停止/急停）、2 个传感器（光电到位检测/电机运行反馈）、3 个输出（主接触器/运行指示灯/故障指示灯）。PLC 选用 S7-1200 CPU 1214C。<br><strong>任务</strong>：① 列出完整 I/O 分配表（按上面模板）；② 画出 S7-1200 端子接线图（标注每个端子的连接）；③ 说明 DI 公共端 M 的接法（源型还是漏型）并说明理由。</p>'};
LESSONS["w8d7"]={title:"综合电路图识读练习",content:'<h3>综合实战：从实际项目中识读一套完整电气图纸</h3><p>综合运用前 6 天知识，从实际项目中抽取一套完整电气图纸进行识读和分析。本课提供文字描述的图纸内容，并给出 7 个逐步深入的识读任务。</p><h3>图纸描述：小型自动化产线控制系统电气图</h3><div class="highlight"><p>一套完整的电气图纸共 5 张：<br><strong>封面 + 图纸目录</strong>（第 1 张）：项目名称"小型自动化产线"、图号 D-001~D-005、设计者、版本 V1.2。<br><strong>图 1：主回路图</strong>（第 2 张）：总进线 3×16mm² 电缆 → 总断路器 QF0（160A）→ 分路断路器 QF1（电机 1，63A）/ QF2（电机 2，40A）/ QF3（电机 3，25A）→ 接触器 KM1/KM2/KM3 → 热继电器 FR1/FR2/FR3 → 3 台电机 M1（传送带 5.5kW）/ M2（风机 3kW）/ M3（液压泵 2.2kW）。<br><strong>图 2：控制回路图</strong>（第 3 张）：启停/急停/故障复位/3 电机分别控制/联锁逻辑。控制变压器 AC220V 输出 → 熔断器 FU1 → 按钮站（急停 SA、启动 SB2、停止 SB1）→ 3 个接触器线圈 KM1/KM2/KM3（分别由中间继电器 KA1/KA2/KA3 驱动）→ 指示灯 HL1（运行绿）/ HL2（故障红）。<br><strong>图 3：PLC 接线图</strong>（第 4 张）：S7-1200 CPU 1214C，DI 12 点（I0.0~I1.3）、DO 8 点（Q0.0~Q0.7），含传感器和执行器清单。传感器：光电 ×3（PNP）、接近开关 ×2（NPN，接源型输入）、温度传感器 ×1（4-20mA，接 AI0）。执行器：电磁阀 ×3（24V DC）、指示灯 ×2（24V DC）。<br><strong>图 4：端子排接线图</strong>（第 5 张）：XT1~XT40（40 个端子），柜内/柜外信号分界清晰（XT20 为分界点，XT1~XT20 柜内、XT21~XT40 柜外）。<br><strong>图 5：BOM 设备清单表</strong>（第 6 张）：列出所有元器件的型号、数量、厂家、备注。</p></div><h3>识读任务（7 步，每步有答案引导）</h3><p><strong>任务 1</strong>：识别主回路中每台电机的供电路径（QF → KM → FR → M），并标注各器件的型号和整定参数。<br><strong>任务 2</strong>：找出急停回路在控制回路中的位置（控制电源 → SA 急停 → 分断所有接触器线圈），并说明为什么急停要用常闭触点。<br><strong>任务 3</strong>：分析 M1-M2-M3 的顺序联锁关系（M2 启动条件 = M1 运行；M3 启动条件 = M2 运行；M1 停止条件 = M3 已停止），并在图纸上标出联锁触点。<br><strong>任务 4</strong>：核对 PLC I/O 表中的传感器类型是否匹配接线（PNP 传感器 → 漏型输入，M 接 0V；NPN 传感器 → 源型输入，M 接 +24V）。发现 1 处接线错误：接近开关（NPN）的 M 端接了 0V（应为 +24V），需要改正。<br><strong>任务 5</strong>：验证端子排接线是否正确跨接了柜内/柜外信号（XT20 分界点：XT1~XT20 的线号是 U1/V1/W1...，XT21~XT40 的线号是 101/102/103...），并说明两种线号体系的区别。<br><strong>任务 6</strong>：列出 BOM 表中缺失的元件（如忘记标熔断器 FU1 规格、缺中间继电器 KA1~KA3 的续流二极管型号、缺控制变压器容量），并提出补充建议。<br><strong>任务 7</strong>：对图纸中的 1 处错误进行分析（接触器线圈并了续流二极管但方向画反了 → 导致线圈断电时产生高压反峰，可能击穿 PLC DO 点），说明正确的画法和接线方法。</p><h3>练习答案和评分标准</h3><div class="highlight"><p>7 个任务每题有分值：任务 1（10 分）、任务 2（10 分）、任务 3（15 分）、任务 4（15 分）、任务 5（15 分）、任务 6（15 分）、任务 7（20 分）。总分 100 分，<strong>60 分及格</strong>。<br>详细答案和评分要点见附录（此处省略，实际教学中应提供）。</p></div><h3>总结</h3><p>电路图识读是工控工程师的基本功，一张图纸就是现场的"地图"。掌握今天的内容后，你应该能独立看懂 <strong>80% 以上的工业电气图纸</strong>。后续可以继续深入学习 EPLAN 等电气 CAD 软件，自己绘制专业的电气原理图和接线图。</p>'};

var CURTAB='today'
function switchTab(tab){
  CURTAB=tab;document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('cur',el.dataset.tab===tab)})
  if(tab==='today')renderToday();else if(tab==='practice')renderPractice();else if(tab==='plan')renderPlan();else if(tab==='manual')renderManual();else if(tab==='ai')renderAI();else if(tab==='log')renderLog();else if(tab==='backup')renderBackup()
}
function renderToday(){var wk=LDATA['w'+S.curWeek],h='<h2>'+wk.t+'</h2><div class="fc mt12">';wk.d.forEach(function(d,i){var k='w'+S.curWeek+'d'+(i+1),done=S.doneDays.indexOf(k)>=0;h+='<div class="card" style="cursor:pointer" onclick="showLesson(\''+k+'\')"><div class="fx"><div class="f1">'+d+'</div>'+(done?'<span class="tag tag-ok">已完成</span>':'<button class="btn btn-sm" onclick="event.stopPropagation();markDone(\''+k+'\')">标记完成</button>')+'</div></div>'});h+='<div class="fx g12 mt12">';for(var i=1;i<=8;i++)h+='<button class="btn btn-s'+(S.curWeek===i?'':'" style="opacity:0.6')+'" onclick="setWeek('+i+')">第'+i+'周</button>';h+='</div></div>';G('mainContent').innerHTML=h}
function markDone(k){if(S.doneDays.indexOf(k)<0){S.doneDays.push(k);saveS();renderToday();updateSummary()}}
function showLesson(key){var les=LESSONS[key];if(!les){toast('课程内容未加载');return}var wkNum=parseInt(key.charAt(1)),dayNum=parseInt(key.substring(3)),done=S.doneDays.indexOf(key)>=0;var h='<div style="margin-bottom:14px">';h+='<button class="btn btn-s" onclick="renderToday()" style="margin-bottom:10px">&larr; 返回学习列表</button>';h+='<h2>第'+wkNum+'周 · 第'+dayNum+'天</h2>';h+='<h3 style="color:var(--accent);font-size:1.1rem;margin:6px 0 16px">'+les.title+'</h3>';h+='</div>';h+='<div class="lesson-content">'+les.content+'</div>';h+='<div style="margin-top:20px;text-align:center">';if(!done){h+='<button class="btn" onclick="markDone(\''+key+'\');showLesson(\''+key+'\')">标记完成</button>'}else{h+='<span class="tag tag-ok" style="font-size:.9rem;padding:6px 14px">已完成学习</span>'}h+='</div>';G('mainContent').innerHTML=h}
function setWeek(w){S.curWeek=w;saveS();renderToday();updateSummary()}
// ====== 练习题 ======
var pracType='choice',pracAnswers={}
function renderPractice(){G('mainContent').innerHTML='<h2>练习题</h2><div class="fx g12 mb12"><button class="btn btn-s" onclick="switchPrac(\'choice\')">选择题</button><button class="btn btn-s" onclick="switchPrac(\'bool\')">判断题</button><button class="btn btn-s" onclick="switchPrac(\'scene\')">场景题</button></div><div id="pracContent"></div>';switchPrac('choice')}
function switchPrac(t){pracType=t;pracAnswers={};var qs=PDATA[t],h='';qs.forEach(function(q,i){h+='<div class="pq" id="pq'+i+'"><div class="qt">Q'+(i+1)+': '+q.q+'</div>';if(t==='choice'){h+='<div class="po">';q.opt.forEach(function(o){h+='<div class="popt" onclick="pickAns('+i+',\''+o.replace(/'/g,"\\'")+'\')">'+o+'</div>'});h+='</div>'}else if(t==='bool')h+='<div class="po"><div class="popt" onclick="pickAns('+i+',\'true\')">正确</div><div class="popt" onclick="pickAns('+i+',\'false\')">错误</div></div>';else h+='<textarea id="scene'+i+'" style="height:80px;margin-top:6px" placeholder="输入分析..."></textarea><div class="ts mt8">提示：'+q.hint+'</div>';h+='<div class="prac-feedback" id="fb'+i+'" style="display:none"></div></div>'});h+='<button class="btn mt12" onclick="checkPrac()">提交并查看得分</button><div id="scoreR" class="tc mt12" style="font-size:1.1rem;font-weight:bold;color:var(--accent)"></div>';document.getElementById('pracContent').innerHTML=h}
function pickAns(i,ans){var pq=G('pq'+i),opts=pq.querySelectorAll('.popt');pracAnswers[i]=ans;if(pracType==='bool'){opts[0].classList.toggle('sel',ans==='true');opts[1].classList.toggle('sel',ans==='false')}else{opts.forEach(function(o){o.classList.toggle('sel',o.textContent===ans)})}}
function checkPrac(){var qs=PDATA[pracType],s=0,t=0;qs.forEach(function(q,i){var pq=G('pq'+i),fb=G('fb'+i);if(pracType==='scene'){if(fb){fb.style.display='none';fb.className='prac-feedback'}return}t++;var opts=pq.querySelectorAll('.popt'),ua=pracAnswers[i],ca=q.a;opts.forEach(function(o){o.classList.remove('correct','wrong')});if(ua===ca){s++;opts.forEach(function(o){if(o.textContent===ca)o.classList.add('correct')});if(fb){fb.className='prac-feedback ok';fb.innerHTML='&#10003; 正确';fb.style.display='block'}}else{opts.forEach(function(o){if(o.textContent===ua)o.classList.add('wrong');if(o.textContent===ca)o.classList.add('correct')});var expText='&#10007; 正确答案：<b>'+ca+'</b>';if(q.explanation)expText+='<br>'+q.explanation;if(fb){fb.className='prac-feedback er';fb.innerHTML=expText;fb.style.display='block'}}});if(pracType==='scene'){var a=0;qs.forEach(function(q,i){if(G('scene'+i)&&G('scene'+i).value.trim())a++});G('scoreR').textContent='已作答：'+a+'/'+qs.length;return}var p=t?Math.round(s/t*100):0;G('scoreR').textContent='得分：'+s+'/'+t+' ('+p+'%)'}

var BROKERS=[{n:'EMQX',u:'wss://broker.emqx.io:8084/mqtt'},{n:'HiveMQ',u:'wss://broker.hivemq.com:8884/mqtt'},{n:'Mosquitto',u:'wss://test.mosquitto.org:8081/mqtt'}]
var mqttC=null,mqttOn=false,mqttIdx=0,mqttTry=0,onlinePeers=[],peerMap={}
var CHUNK=150000

// ====== 操作手册 v11 ======
var recvBuf={}
var metaStore={}

function upsertMeta(entry){if(!entry||!entry.fileId)return;metaStore[entry.fileId]=entry}

// 添加文件到本地存储（元数据 + IDB + 内存缓存）
function addLocalFile(fileId,name,size,type,from,time,dataUrl){
  // 1. 内存缓存
  dataCache[fileId]=dataUrl
  // 2. IndexedDB
  saveFileToIDB(fileId,dataUrl).catch(function(e){console.error('IDB save failed:',e)})
  // 3. 元数据到 S.manualFiles（不含 data）
  var found=false
  for(var i=0;i<(S.manualFiles||[]).length;i++){
    if(S.manualFiles[i].fileId===fileId){found=true;break}
  }
  if(!found)S.manualFiles.push({fileId:fileId,name:name,size:size,type:type,from:from,time:time})
  saveS()
}

// 响应文件请求
function respFileReq(fileId){
  var d=dataCache[fileId];if(!d)return
  var b64=d.split(',')[1],total=Math.ceil(b64.length/CHUNK)
  if(!mqttOn)return
  // 找到元数据
  var meta=null
  for(var i=0;i<(S.manualFiles||[]).length;i++){if(S.manualFiles[i].fileId===fileId){meta=S.manualFiles[i];break}}
  if(!meta)return
  mqttC.publish('dm/manual',JSON.stringify({type:'meta',fileId:fileId,name:meta.name,size:meta.size,ftype:meta.type,from:meta.from,time:meta.time,totalChunks:total}),{qos:1})
  sendChunks(fileId,b64,total)
}

// 发送分块（每100ms发3块）
function sendChunks(fileId,b64,total){
  var idx=0
  function sendBatch(){
    var sent=0
    while(sent<3&&idx<total){
      var start=idx*CHUNK,end=Math.min(start+CHUNK,b64.length),chunk=b64.substring(start,end)
      mqttC.publish('dm/manual_chunk',JSON.stringify({fileId:fileId,chunkIndex:idx,data:chunk,total:total}),{qos:1})
      idx++;sent++
    }
    if(idx<total)setTimeout(sendBatch,100)
    else mqttC.publish('dm/manual',JSON.stringify({type:'done',fileId:fileId}),{qos:1})
  }
  sendBatch()
}

function handleManualMeta(msg){
  if(!msg.fileId||!msg.name)return
  upsertMeta({fileId:msg.fileId,name:msg.name,size:msg.size,type:msg.ftype,from:msg.from,time:msg.time,totalChunks:msg.totalChunks})
  if(CURTAB==='manual')renderManual()
}

function requestFile(fileId){
  if(!mqttOn){toast('未连接到同步服务');return}
  if(recvBuf[fileId]){toast('已在接收中');return}
  var meta=metaStore[fileId];if(!meta||!meta.totalChunks){toast('文件信息不可用');return}
  recvBuf[fileId]={totalChunks:meta.totalChunks,chunks:new Map(),meta:meta,received:0,retryCount:0,retryTimer:null}
  mqttC.publish('dm/manual',JSON.stringify({type:'req_file',fileId:fileId,from:MY_NAME}),{qos:1})
  renderManual()
  toast('已请求下载: '+meta.name)
}

function requestSelected(){
  var cbs=document.querySelectorAll('.file-cb:checked'),cnt=0
  cbs.forEach(function(cb){requestFile(cb.value);cnt++})
  if(!cnt)toast('请先勾选要下载的文件')
}

function handleManualChunk(msg){
  var buf=recvBuf[msg.fileId];if(!buf)return
  if(!buf.chunks.has(msg.chunkIndex)){
    buf.chunks.set(msg.chunkIndex,msg.data);buf.received++
    if(CURTAB==='manual')renderManual()
    if(buf.received>=buf.totalChunks){
      clearTimeout(buf.retryTimer)
      assembleChunks(msg.fileId,buf)
    }
  }
}

function handleManualDone(msg){
  var buf=recvBuf[msg.fileId];if(!buf)return
  if(buf.received>=buf.totalChunks)return
  function doRetry(){
    var b=recvBuf[msg.fileId];if(!b)return
    if(b.received>=b.totalChunks){assembleChunks(msg.fileId,b);return}
    b.retryCount++
    if(b.retryCount>10){toast('接收超时: '+b.meta.name);delete recvBuf[msg.fileId];renderManual();return}
    var missing=[]
    for(var i=0;i<b.totalChunks;i++){if(!b.chunks.has(i))missing.push(i)}
    if(mqttOn)mqttC.publish('dm/manual',JSON.stringify({type:'req_chunks',fileId:msg.fileId,missing:missing,total:b.totalChunks,missing_cnt:missing.length}),{qos:1})
    b.retryTimer=setTimeout(doRetry,3000)
  }
  setTimeout(doRetry,1000)
}

function handleManualReqChunks(msg){
  var b64=null
  for(var i=0;i<(S.manualFiles||[]).length;i++){
    if(S.manualFiles[i].fileId===msg.fileId){
      b64=(dataCache[msg.fileId]||'').split(',')[1];break
    }
  }
  if(!b64)return
  var mi=0
  function sendNextMiss(){
    if(mi>=msg.missing.length)return
    var idx=msg.missing[mi],start=idx*CHUNK,end=Math.min(start+CHUNK,b64.length)
    if(mqttOn)mqttC.publish('dm/manual_chunk',JSON.stringify({fileId:msg.fileId,chunkIndex:idx,data:b64.substring(start,end),total:msg.total||0}),{qos:1})
    mi++;setTimeout(sendNextMiss,50)
  }
  sendNextMiss()
}

function assembleChunks(fileId,buf){
  var sorted=[];buf.chunks.forEach(function(data,idx){sorted.push({idx:idx,data:data})});sorted.sort(function(a,b){return a.idx-b.idx})
  var full=sorted.map(function(c){return c.data}).join('')
  var mime=buf.meta.type||'application/octet-stream',dataUrl='data:'+mime+';base64,'+full
  addLocalFile(fileId,buf.meta.name,buf.meta.size,buf.meta.type,buf.meta.from,buf.meta.time,dataUrl)
  delete recvBuf[fileId]
  delete metaStore[fileId]
  // 自动弹出系统下载对话框，保存到本地磁盘
  try{
    var downloadBlob=new Blob([d2ab(dataUrl)],{type:mime})
    var dlA=document.createElement('a')
    dlA.href=URL.createObjectURL(downloadBlob)
    dlA.download=buf.meta.name
    dlA.click()
    setTimeout(function(){URL.revokeObjectURL(dlA.href)},30000)
  }catch(e){console.error('auto-download failed:',e)}
  toast('已保存到本地: '+buf.meta.name)
  if(CURTAB==='manual')renderManual()
}

    metaKeys.forEach(function(k){
