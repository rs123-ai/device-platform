<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设备运维学习平台</title>
<style>
:root{--bg:#0f1923;--bg2:#1a2736;--bg3:#213244;--bg4:#2a3d54;--text:#d0dce8;--text2:#8ba4be;--accent:#4fc3f7;--ok:#2ecc71;--warn:#f39c12;--err:#e74c3c;--border:#3a4d66;--radius:8px;--radius-sm:4px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{display:flex;height:100vh;overflow:hidden}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.main-body{flex:1;padding:16px;overflow-y:auto}
.collab-bar{padding:8px 16px;border-top:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;gap:10px;font-size:0.8rem;flex-shrink:0}
.side-header{padding:14px;border-bottom:1px solid var(--border);background:var(--bg3)}
.side-nav{flex:1;padding:8px 0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{text-align:left;background:transparent;color:var(--text);border:none;padding:10px 14px;cursor:pointer;font-size:0.88rem;border-radius:0;transition:all 0.15s}
.nav-item:hover{background:var(--bg3);color:var(--accent)}
.nav-item.cur{background:var(--accent);color:var(--bg)}
.btn{background:var(--accent);color:var(--bg);border:none;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;font-size:0.88rem;transition:all 0.15s}
.btn:hover{opacity:0.85}
.btn-sm{padding:4px 10px;font-size:0.78rem}
.btn-s{background:var(--bg4);color:var(--text)}
.btn-r{background:var(--err);color:#fff}
.card{background:var(--bg2);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.card h3{margin-bottom:6px;color:var(--accent);font-size:0.98rem}
.fx{display:flex;gap:8px;align-items:center}
.fxw{flex-wrap:wrap}
.fc{display:flex;flex-direction:column;gap:8px}
.f1{flex:1}
.g12{gap:12px}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.ts{font-size:0.8rem;color:var(--text2)}
.tc{text-align:center}
.hide{display:none!important}
input,select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:8px 10px;border-radius:var(--radius-sm);font-size:0.88rem;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.72rem;font-weight:500}
.tag-ok{background:rgba(46,204,113,0.2);color:var(--ok)}
.tag-warn{background:rgba(243,156,18,0.2);color:var(--warn)}
.tag-err{background:rgba(231,76,60,0.2);color:var(--err)}
.upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:30px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
.upload-area:hover{border-color:var(--accent);background:var(--bg2)}
.upload-area input[type=file]{display:none}
.file-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:4px;border:1px solid var(--border)}
.file-row .fn{flex:1;cursor:pointer;color:var(--accent);text-decoration:underline;font-size:0.88rem}
.file-row .fn:hover{color:#26a69a}
.file-row .fi{color:var(--text2);font-size:0.75rem;white-space:nowrap}
.log-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.log-row .lm{display:flex;gap:10px;font-size:0.75rem;color:var(--text2);margin-bottom:4px;flex-wrap:wrap;align-items:center}
.log-row .lp{font-weight:500;margin-bottom:4px;font-size:0.92rem}
.pq{margin-bottom:16px}
.pq .qt{margin-bottom:6px;font-weight:500}
.po{display:flex;flex-direction:column;gap:5px}
.popt{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;transition:all 0.15s;font-size:0.88rem}
.popt:hover{background:var(--bg3)}
.popt.sel{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.sum-cards{display:flex;gap:10px;flex-wrap:wrap}
.sum-cards .card{min-width:90px;flex:1;text-align:center}
pre{background:var(--bg);padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);white-space:pre-wrap;font-size:0.84rem;cursor:pointer}
pre:hover{border-color:var(--accent)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.bar{display:flex;align-items:center;gap:8px;font-size:0.82rem}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="side-header"><h2 style="font-size:1.05rem">设备运维学习平台</h2><div class="ts">v6 P2P直传</div></div>
<div class="side-nav">
<button class="nav-item cur" data-tab="today" onclick="switchTab('today')">今日学习</button>
<button class="nav-item" data-tab="practice" onclick="switchTab('practice')">练习题</button>
<button class="nav-item" data-tab="plan" onclick="switchTab('plan')">计划总览</button>
<button class="nav-item" data-tab="manual" onclick="switchTab('manual')">故障手册</button>
<button class="nav-item" data-tab="ai" onclick="switchTab('ai')">AI模板</button>
<button class="nav-item" data-tab="log" onclick="switchTab('log')">工作日志</button>
<button class="nav-item" data-tab="backup" onclick="switchTab('backup')">备份/导入</button>
</div>
</div>
<div class="main">
<div class="main-header">
<div class="sum-cards">
<div class="card"><div class="ts">上次学习</div><div id="lastStudy">-</div></div>
<div class="card"><div class="ts">总进度</div><div id="totalProgress">0%</div></div>
<div class="card"><div class="ts">今日任务</div><div id="todayTasks">0/3</div></div>
</div>
</div>
<div class="main-body" id="mainContent"></div>
<div class="collab-bar" id="collabBar">
<span class="dot" id="dot" style="background:var(--err)"></span>
<span>协同：<b id="onlineCount">0</b>人在线</span>
<span id="netStatus" class="ts">未连接</span>
<span class="ts" style="font-size:0.65rem;cursor:pointer;text-decoration:underline" onclick="switchBroker()">切换</span>
<span id="p2pStatus" class="ts" style="margin-left:auto"></span>
</div>
</div>
</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<script>
// ====== 基础工具 ======
function G(id){return document.getElementById(id)}
function toast(msg){var d=document.createElement('div');d.style.cssText='position:fixed;top:16px;right:16px;background:var(--accent);color:var(--bg);padding:10px 20px;border-radius:var(--radius-sm);z-index:9999;font-weight:500;animation:toastIn 2.5s forwards;max-width:400px';d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},2600)}
var ts=document.createElement('style');ts.textContent='@keyframes toastIn{0%,70%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}';document.head.appendChild(ts)

// ====== 状态管理 ======
var DB=localStorage.getItem('dm_v6b'),S=DB?JSON.parse(DB):{curWeek:1,doneDays:[],pScores:{},manualFiles:[],logs:[]}
function saveS(){try{localStorage.setItem('dm_v6b',JSON.stringify(S))}catch(e){toast('存储空间不足')}}
var MY_UID=localStorage.getItem('dm_uid6')||(function(){var u='u'+Date.now()+Math.random().toString(36).slice(2,8);localStorage.setItem('dm_uid6',u);return u})()
var MY_NAME=localStorage.getItem('dm_uname6')||(function(){var n=prompt('请输入显示名称（用于协同标识）:','运维员');n=(n||'未命名').trim()||'未命名';localStorage.setItem('dm_uname6',n);return n})()

// ====== 学习数据 ======
var LDATA={w1:{t:'第1周：通信排障',d:['RS232协议基础与接线','RS485总线拓扑与终端电阻','Modbus RTU报文解析','Modbus TCP网络抓包','串口通信常见故障排查','网络通信故障定位','综合实战：产线通信中断']},w2:{t:'第2周：PLC调试',d:['S7-1200硬件组态','TIA Portal编程基础','三菱FX指令系统','PLC与HMI通信配置','模拟量/数字量处理','故障诊断与程序备份','综合实战：设备启停控制']},w3:{t:'第3周：海康AGV运维',d:['AGV系统组成与导航原理','磁条/二维码导航配置','调度系统RCS基础','常见故障代码解析','电池管理与充电维护','安全传感器校准','综合实战：AGV路径优化']},w4:{t:'第4周：系统集成',d:['MES系统对接基础','OPC UA通信协议','数据库读写与日志','上位机监控画面设计','报警管理与通知机制','系统备份与恢复','综合实战：产线数据看板']}}
var PDATA={choice:[{q:'RS485总线需要终端电阻吗？',opt:['需要','不需要'],a:'需要',exp:'RS485总线需要在两端加120Ω终端电阻以消除信号反射。'},{q:'Modbus RTU的校验方式是什么？',opt:['CRC16','奇校验','偶校验','无校验'],a:'CRC16',exp:'Modbus RTU使用CRC16循环冗余校验。'},{q:'S7-1200的编程软件是？',opt:['TIA Portal','STEP 7','GX Works','Codesys'],a:'TIA Portal',exp:'S7-1200使用TIA Portal编程。'},{q:'AGV导航精度最高的是？',opt:['激光SLAM','磁条导航','二维码导航','惯性导航'],a:'激光SLAM',exp:'激光SLAM导航精度可达±5mm。'},{q:'PLC输入模块最常见故障？',opt:['电源故障','接线松动','程序错误','通信中断'],a:'接线松动',exp:'现场振动/腐蚀导致接线松动最常见。'}],bool:[{q:'Modbus TCP使用端口502通信。',a:'true',exp:'正确，Modbus TCP标准端口是502。'},{q:'三菱FX可用TIA Portal编程。',a:'false',exp:'错误，三菱FX使用GX Works。'},{q:'AGV电池应完全放电后再充电。',a:'false',exp:'错误，锂电池应避免完全放电。'},{q:'RS232通信距离最长1200米。',a:'false',exp:'错误，RS232标准距离仅约15米。'},{q:'PLC扫描周期含输入采样、程序执行、输出刷新三个阶段。',a:'true',exp:'正确，这是PLC标准工作循环。'}],scene:[{q:'产线突然停止，PLC输入灯正常、输出灯不亮，可能原因及排查步骤？',hint:'检查：PLC运行状态、程序逻辑、输出模块电源、输出接线'},{q:'AGV在B区频繁报定位丢失，如何排查？',hint:'检查：地面二维码/磁条、导航传感器、站点坐标、环境干扰'},{q:'Modbus通信时断时续，如何定位？',hint:'检查：接线与终端电阻、波特率、网络干扰、主从站地址冲突'}]}
var AIDATA=[{t:'故障排查提问',c:'设备类型：[PLC/AGV/传感器]\n故障现象：[具体描述]\n已排查步骤：[列出]\n当前状态：[运行/停止/报警]\n期望：'},{t:'学习计划提问',c:'当前水平：[新手/有经验/熟练]\n学习目标：[掌握XX]\n可用时间：[每天X小时]\n偏好方式：[理论+实操/纯实操/案例]'},{t:'代码调试提问',c:'编程环境：[TIA Portal/GX Works]\n问题描述：[程序不执行/报警/逻辑错误]\n相关代码：[粘贴]\n已尝试：'},{t:'设备选型提问',c:'应用场景：[产线搬运/仓储分拣]\n负载：[重量/尺寸]\n精度：[定位精度]\n环境：[室内/室外]\n预算：'},{t:'系统集成提问',c:'现有系统：[PLC型号/AGV品牌]\n需集成：[MES/WMS]\n通信协议：[Modbus TCP/OPC UA]\n问题：[连接失败/不同步]'}]
var FAULTS=[{t:'PLC输入无信号',c:'PLC',s:'检查输入接线、电源、输入模块指示灯，用万用表测量输入端子电压'},{t:'AGV定位丢失',c:'AGV',s:'检查地面二维码/磁条是否脏污或损坏，清洁导航传感器，排除环境光干扰'},{t:'通信时断时续',c:'通信',s:'检查终端电阻(120Ω)是否安装正确，确认波特率一致，排查线路屏蔽层接地'},{t:'电机过热报警',c:'电机',s:'检查负载是否过重，确认散热风扇运转正常，检查驱动器过载参数设置'},{t:'传感器误触发',c:'传感器',s:'调整灵敏度设置，检查安装位置是否松动，排除相邻传感器串扰'},{t:'PLC程序丢失',c:'PLC',s:'检查电池/超级电容是否失效，确认程序存储卡状态，执行程序重新下载'},{t:'AGV无法充电',c:'AGV',s:'检查充电电极接触，测量电池电压，确认充电桩通信正常，检查BMS保护状态'},{t:'HMI触摸失灵',c:'HMI',s:'校准触摸屏，检查是否有油污/水渍，确认连接排线未松动'}]

// ====== 导航 ======
var CURTAB='today'
function switchTab(tab){
  CURTAB=tab
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('cur',el.dataset.tab===tab)})
  if(tab==='today')renderToday();else if(tab==='practice')renderPractice();else if(tab==='plan')renderPlan();else if(tab==='manual')renderManual();else if(tab==='ai')renderAI();else if(tab==='log')renderLog();else if(tab==='backup')renderBackup()
}

function renderToday(){
  var wk=LDATA['w'+S.curWeek],h='<h2>'+wk.t+'</h2><div class="fc mt12">'
  wk.d.forEach(function(d,i){
    var k='w'+S.curWeek+'d'+(i+1),done=S.doneDays.indexOf(k)>=0
    h+='<div class="card"><div class="fx"><div class="f1">'+d+'</div>'
    h+=done?'<span class="tag tag-ok">已完成</span>':'<button class="btn btn-sm" onclick="markDone(\''+k+'\')">标记完成</button>'
    h+='</div></div>'
  })
  h+='<div class="fx g12 mt12">'
  for(var i=1;i<=4;i++)h+='<button class="btn btn-s'+(S.curWeek===i?'':'" style="opacity:0.6')+'" onclick="setWeek('+i+')">第'+i+'周</button>'
  h+='</div></div>';G('mainContent').innerHTML=h
}
function markDone(k){if(S.doneDays.indexOf(k)<0){S.doneDays.push(k);saveS();renderToday();updateSummary()}}
function setWeek(w){S.curWeek=w;saveS();renderToday();updateSummary()}

// ====== 练习题 ======
var pracType='choice',pracAnswers={}
function renderPractice(){
  G('mainContent').innerHTML='<h2>练习题</h2><div class="fx g12 mb12"><button class="btn btn-s" onclick="switchPrac(\'choice\')">选择题</button><button class="btn btn-s" onclick="switchPrac(\'bool\')">判断题</button><button class="btn btn-s" onclick="switchPrac(\'scene\')">场景题</button></div><div id="pracContent"></div>';switchPrac('choice')
}
function switchPrac(t){
  pracType=t;pracAnswers={};var qs=PDATA[t],h=''
  qs.forEach(function(q,i){
    h+='<div class="pq" id="pq'+i+'"><div class="qt">Q'+(i+1)+': '+q.q+'</div>'
    if(t==='choice'){h+='<div class="po">';q.opt.forEach(function(o){h+='<div class="popt" onclick="pickAns('+i+',\''+o.replace(/'/g,"\\'")+'\')">'+o+'</div>'});h+='</div>'}
    else if(t==='bool')h+='<div class="po"><div class="popt" onclick="pickAns('+i+',\'true\')">正确</div><div class="popt" onclick="pickAns('+i+',\'false\')">错误</div></div>'
    else h+='<textarea id="scene'+i+'" style="height:80px;margin-top:6px" placeholder="输入你的分析..."></textarea><div class="ts mt8">提示：'+q.hint+'</div>'
    h+='<div class="ts mt4" id="exp'+i+'" style="display:none">'+q.exp+'</div></div>'
  })
  h+='<button class="btn mt12" onclick="checkPrac()">提交并查看得分</button><div id="scoreR" class="tc mt12" style="font-size:1.1rem;font-weight:bold;color:var(--accent)"></div>'
  document.getElementById('pracContent').innerHTML=h
}
function pickAns(i,ans){
  var pq=G('pq'+i),opts=pq.querySelectorAll('.popt');G('exp'+i).style.display='block';pracAnswers[i]=ans
  if(pracType==='bool'){opts[0].classList.toggle('sel',ans==='true');opts[1].classList.toggle('sel',ans==='false')}
  else{opts.forEach(function(o){o.classList.toggle('sel',o.textContent===ans)})}
}
function checkPrac(){
  var qs=PDATA[pracType],s=0,t=0
  qs.forEach(function(q,i){if(pracType==='scene')return;t++;if(pracAnswers[i]===q.a)s++})
  if(pracType==='scene'){var a=0;qs.forEach(function(q,i){if(G('scene'+i)&&G('scene'+i).value.trim())a++});G('scoreR').textContent='场景题已作答：'+a+'/'+qs.length;return}
  var p=t?Math.round(s/t*100):0;G('scoreR').textContent='得分：'+s+'/'+t+' ('+p+'%)'
}

// ====== 计划总览 ======
function renderPlan(){
  var h='<h2>计划总览</h2>'
  for(var i=1;i<=4;i++){var wk=LDATA['w'+i],d=0;wk.d.forEach(function(_,j){if(S.doneDays.indexOf('w'+i+'d'+(j+1))>=0)d++});h+='<div class="card"><div class="fx"><div class="f1"><h3>'+wk.t+'</h3><div class="ts">完成 '+d+'/7</div></div><div style="font-size:1.2rem;font-weight:bold;color:var(--accent)">'+Math.round(d/7*100)+'%</div></div></div>'}
  var t=0;for(var i=1;i<=4;i++)LDATA['w'+i].d.forEach(function(_,j){if(S.doneDays.indexOf('w'+i+'d'+(j+1))>=0)t++});h+='<div class="card tc"><div class="ts">总完成度</div><div style="font-size:1.4rem;font-weight:bold;color:var(--accent)">'+Math.round(t/28*100)+'%</div></div>';G('mainContent').innerHTML=h
}

// ====== AI模板 ======
function renderAI(){
  var h='<h2>AI提问模板</h2><div class="ts mb12">点击模板复制到剪贴板</div>'
  AIDATA.forEach(function(t){h+='<div class="card"><h3>'+t.t+'</h3><pre onclick="copyText(\''+t.c.replace(/'/g,"\\'").replace(/\n/g,'\\n')+'\')">'+t.c+'</pre></div>'})
  G('mainContent').innerHTML=h
}
function copyText(t){navigator.clipboard.writeText(t).then(function(){toast('已复制！')}).catch(function(){toast('复制失败')})}

// ====== 工作日志 ======
var logFilter='all'
function renderLog(){

function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'}
function updateSummary(){

function d2ab(dataURI){var b64=dataURI.split(',')[1],raw=atob(b64),arr=new Uint8Array(raw.length);for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr.buffer}
function ab2b64(buffer){var bytes=new Uint8Array(buffer),binary='';for(var i=0;i<bytes.length;i++)binary+=String.fromCharCode(bytes[i]);return btoa(binary)}

// ====== MQTT 信令 ======
var BROKERS=[{n:'EMQX',u:'wss://broker.emqx.io:8084/mqtt'},{n:'HiveMQ',u:'wss://broker.hivemq.com:8884/mqtt'},{n:'Mosquitto',u:'wss://test.mosquitto.org:8081/mqtt'}]
var mqttC=null,mqttOn=false,mqttIdx=0,mqttTry=0,onlinePeers=[],peerMap={}
var MT={log:'dm/log',manual:'dm/manual',hello:'dm/hello',peer:'dm/peer',sync:'dm/sync',rtc:'dm/rtc'}

// ====== WebRTC P2P 文件传输 ======
var peerConns={}, peerPendings={} // peerId -> {pc, dc, ready}

var RTC_CONFIG={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}

function connectToPeer(peerId,peerName){
  if(peerConns[peerId]&&peerConns[peerId].ready)return
  if(peerConns[peerId]&&peerConns[peerId].connecting)return
  console.log('RTC: connecting to',peerName||peerId)

  var pc=new RTCPeerConnection(RTC_CONFIG)
  var dc=pc.createDataChannel('file',{ordered:true})
  var finished=false
  var receivedSize=0,totalSize=0,chunks=[],fileMeta=null

  peerConns[peerId]={pc:pc,dc:dc,ready:false,connecting:true}

  dc.binaryType='arraybuffer'
  dc.onopen=function(){
    console.log('RTC: data channel open with',peerId)
    peerConns[peerId].ready=true;peerConns[peerId].connecting=false
    toast('已连接到 '+peerName)
    updateP2PStatus()
    // 推送本地文件
    pushLocalFiles(peerId)
  }
  dc.onmessage=function(e){
    if(typeof e.data==='string'){
      // 元数据：{type:'meta',fileId,name,size,ftype,from,time,totalChunks,chunkIndex}
      try{
        var meta=JSON.parse(e.data)
        if(meta.type==='meta'){
          fileMeta=meta;receivedSize=0;totalSize=meta.size;chunks=[]
        }
        if(meta.type==='chunk'){
          receivedSize+=meta.chunkSize
          chunks.push({index:meta.chunkIndex,data:null})
        }
      }catch(ex){}
    }else if(e.data instanceof ArrayBuffer){
      // 二进制数据块
      var idx=chunks.findIndex(function(c){return c.data===null})
      if(idx>=0){chunks[idx].data=new Uint8Array(e.data);receivedSize+=e.data.byteLength}
      // 检查是否完成
      if(fileMeta&&receivedSize>=totalSize){
        chunks.sort(function(a,b){return a.index-b.index})
        var total=new Uint8Array(totalSize),offset=0
        chunks.forEach(function(c){total.set(c.data,offset);offset+=c.data.length})
        var b64=ab2b64(total.buffer)
        var mime=fileMeta.ftype||'application/octet-stream'
        saveManualFile({fileId:fileMeta.fileId,name:fileMeta.name,size:fileMeta.size,type:fileMeta.ftype,data:'data:'+mime+';base64,'+b64,from:fileMeta.from,time:fileMeta.time})
        toast('收到文件: '+fileMeta.name+' ('+fmtSize(fileMeta.size)+')')
        fileMeta=null;chunks=[]
      }
    }
  }
  dc.onclose=function(){console.log('RTC: dc closed',peerId)}
  pc.onicecandidate=function(e){if(e.candidate&&mqttOn)mqttC.publish(MT.rtc,JSON.stringify({type:'ice',to:peerId,from:MY_UID,candidate:e.candidate}),{qos:1})}
  pc.onconnectionstatechange=function(){
    if(pc.connectionState==='disconnected'||pc.connectionState==='failed'||pc.connectionState==='closed'){
      delete peerConns[peerId];updateP2PStatus();console.log('RTC: disconnected',peerId)
    }
  }

  // 创建并发送 offer
  pc.createOffer().then(function(offer){pc.setLocalDescription(offer);waitForICE(pc,peerId,offer)}).catch(function(e){console.log('RTC: offer error',e);delete peerConns[peerId]})
}

function waitForICE(pc,peerId,offer){
  var count=0,iv=setInterval(function(){
    count++
    if(pc.localDescription&&pc.localDescription.sdp&&pc.localDescription.sdp.indexOf('a=candidate')>0||count>15){
      clearInterval(iv)
      if(mqttOn)mqttC.publish(MT.rtc,JSON.stringify({type:'offer',to:peerId,from:MY_UID,name:MY_NAME,sdp:pc.localDescription}),{qos:1})
    }
  },200)
}

function handleRTCOffer(msg){
  var peerId=msg.from;if(peerId===MY_UID)return
  var pc=new RTCPeerConnection(RTC_CONFIG)
  peerConns[peerId]={pc:pc,dc:null,ready:false,connecting:true}

  var receivedSize=0,totalSize=0,chunks=[],fileMeta=null

  pc.ondatachannel=function(e){
    var dc=e.channel;dc.binaryType='arraybuffer'
    peerConns[peerId].dc=dc
    dc.onopen=function(){peerConns[peerId].ready=true;peerConns[peerId].connecting=false;toast('已连接到 '+msg.name);updateP2PStatus();pushLocalFiles(peerId)}
    dc.onmessage=function(e){
      if(typeof e.data==='string'){
        try{var meta=JSON.parse(e.data);if(meta.type==='meta'){fileMeta=meta;receivedSize=0;totalSize=meta.size;chunks=[]}if(meta.type==='chunk'){chunks.push({index:meta.chunkIndex,data:null})}}catch(ex){}
      }else if(e.data instanceof ArrayBuffer){
        var idx=chunks.findIndex(function(c){return c.data===null})
        if(idx>=0){chunks[idx].data=new Uint8Array(e.data);receivedSize+=e.data.byteLength}
        if(fileMeta&&receivedSize>=totalSize){
          chunks.sort(function(a,b){return a.index-b.index})
          var total=new Uint8Array(totalSize),offset=0
          chunks.forEach(function(c){total.set(c.data,offset);offset+=c.data.length})
          var b64=ab2b64(total.buffer)
          var mime=fileMeta.ftype||'application/octet-stream'
          saveManualFile({fileId:fileMeta.fileId,name:fileMeta.name,size:fileMeta.size,type:fileMeta.ftype,data:'data:'+mime+';base64,'+b64,from:fileMeta.from,time:fileMeta.time})
          toast('收到文件: '+fileMeta.name+' ('+fmtSize(fileMeta.size)+')')
          fileMeta=null;chunks=[]
        }
      }
    }
  }
  pc.onicecandidate=function(e){if(e.candidate&&mqttOn)mqttC.publish(MT.rtc,JSON.stringify({type:'ice',to:peerId,from:MY_UID,candidate:e.candidate}),{qos:1})}
  pc.onconnectionstatechange=function(){if(pc.connectionState==='disconnected'||pc.connectionState==='failed'||pc.connectionState==='closed'){delete peerConns[peerId];updateP2PStatus()}}

  pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)).then(function(){
    return pc.createAnswer()
  }).then(function(answer){
    pc.setLocalDescription(answer)
    if(mqttOn)mqttC.publish(MT.rtc,JSON.stringify({type:'answer',to:peerId,from:MY_UID,sdp:answer}),{qos:1})
  }).catch(function(e){console.log('RTC: answer error',e);delete peerConns[peerId]})
}

function handleRTCAnswer(msg){
  var peerId=msg.from,conn=peerConns[peerId];if(!conn)return
  conn.pc.setRemoteDescription(new RTCSessionDescription(msg.sdp)).catch(function(e){console.log('RTC: setRemote error',e)})
}

function handleRTCIce(msg){
  var peerId=msg.from,conn=peerConns[peerId];if(!conn||!conn.pc)return
  conn.pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(function(e){})
}

// 推送本地文件给新连接的对等端
function pushLocalFiles(peerId){
  var conn=peerConns[peerId];if(!conn||!conn.ready||!conn.dc)return
  var files=S.manualFiles||[]
  files.forEach(function(f){
    if(!f.data)return
    try{
      var b64=f.data.split(',')[1],raw=atob(b64),bytes=new Uint8Array(raw.length)
      for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i)
      var CHUNK=65536,totalChunks=Math.ceil(bytes.length/CHUNK)
      conn.dc.send(JSON.stringify({type:'meta',fileId:f.fileId,name:f.name,size:f.size,ftype:f.type,from:f.from,time:f.time,totalChunks:totalChunks}))
      for(var j=0;j<totalChunks;j++){
        var start=j*CHUNK,end=Math.min(start+CHUNK,bytes.length)
        conn.dc.send(JSON.stringify({type:'chunk',fileId:f.fileId,chunkIndex:j,chunkSize:end-start}))
        conn.dc.send(bytes.slice(start,end).buffer)
      }
      console.log('Pushed file to',peerId,':',f.name)
    }catch(e){console.log('Push error:',e)}
  })
}

function updateP2PStatus(){
  var connected=0,total=Object.keys(peerConns).length
  for(var k in peerConns){if(peerConns[k].ready)connected++}
  var el=G('p2pStatus');if(!el)return
  if(connected>0)el.textContent='P2P: '+connected+'个连接'
  else if(total>0)el.textContent='P2P: 连接中...'
  else el.textContent='P2P: 等待对等端'
}

function saveManualFile(entry){
  if(!entry||!entry.fileId)return
  var found=false
  for(var i=0;i<(S.manualFiles||[]).length;i++){
    if(S.manualFiles[i].fileId===entry.fileId){
      if(!S.manualFiles[i].data&&entry.data)S.manualFiles[i].data=entry.data;found=true;break
    }
  }
  if(!found)S.manualFiles.push(entry)
  saveS();if(CURTAB==='manual')renderManual()
}

function uploadFiles(files){
  for(var i=0;i<files.length;i++){(function(file){
    var reader=new FileReader()
    reader.onload=function(e){
      var dataUrl=e.target.result,fileId='f'+Date.now()+'_'+Math.random().toString(36).slice(2,8)
      var entry={fileId:fileId,name:file.name,size:file.size,type:file.type,data:dataUrl,from:MY_NAME,time:Date.now()}
      S.manualFiles.push(entry);saveS();renderManual()
      // MQTT元数据
      if(mqttOn)mqttC.publish(MT.manual,JSON.stringify({type:'meta',fileId:fileId,name:file.name,size:file.size,ftype:file.type,from:MY_NAME,time:entry.time}),{qos:1})
      // P2P传输给所有已连接对等端
      var count=0
      for(var pid in peerConns){
        if(peerConns[pid].ready&&peerConns[pid].dc){sendFileToPeer(pid,entry);count++}
      }
      toast(file.name+' 上传成功'+(count>0?' (已P2P发送给'+count+'个用户)':''))
    }
    reader.readAsDataURL(file)
  })(files[i])}
}

function sendFileToPeer(peerId,entry){
  var conn=peerConns[peerId];if(!conn||!conn.ready||!conn.dc)return
  try{
    var b64=entry.data.split(',')[1],raw=atob(b64),bytes=new Uint8Array(raw.length)
    for(var i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i)
    var CHUNK=65536,totalChunks=Math.ceil(bytes.length/CHUNK)
    conn.dc.send(JSON.stringify({type:'meta',fileId:entry.fileId,name:entry.name,size:entry.size,ftype:entry.type,from:entry.from,time:entry.time,totalChunks:totalChunks}))
    for(var j=0;j<totalChunks;j++){
      var start=j*CHUNK,end=Math.min(start+CHUNK,bytes.length)
      conn.dc.send(JSON.stringify({type:'chunk',fileId:entry.fileId,chunkIndex:j,chunkSize:end-start}))
      conn.dc.send(bytes.slice(start,end).buffer)
    }
    console.log('Sent file to',peerId,':',entry.name)
  }catch(e){console.log('Send error:',e)}
}

function delManual(idx){if(!confirm('确定删除？'))return;var f=S.manualFiles[idx];S.manualFiles.splice(idx,1);saveS();renderManual();if(mqttOn)mqttC.publish(MT.manual,JSON.stringify({type:'del',fileId:f.fileId}),{qos:1})}

// ====== MQTT 连接管理 ======
function mqttConnect(){
  if(typeof mqtt==='undefined'){setTimeout(mqttConnect,500);return}
  if(mqttTry>=12){setTimeout(function(){mqttTry=0;mqttConnect()},15000);return}
  var br=BROKERS[mqttIdx%3]
  try{if(mqttC){try{mqttC.end(true)}catch(e){}}mqttC=mqtt.connect(br.u,{clientId:'dmp6_'+MY_UID,clean:true,connectTimeout:6000,reconnectPeriod:1500,keepalive:15})}catch(e){mqttTry++;setTimeout(mqttConnect,1000);return}
  mqttC.on('connect',function(){
    mqttOn=true;mqttTry=0;onlinePeers=[MY_NAME]
    var topics=Object.values(MT);mqttC.subscribe(topics,{qos:1})
    mqttC.publish(MT.hello,JSON.stringify({name:MY_NAME,uid:MY_UID,time:Date.now(),reqSync:true}),{qos:1})
    setInterval(function(){if(mqttOn)mqttC.publish(MT.peer,JSON.stringify({name:MY_NAME,uid:MY_UID,time:Date.now()}),{qos:1})},20000)
    // 检查丢失文件的在线用户
    checkMissingFiles()
  })
  mqttC.on('message',function(topic,payload){
    try{
      var msg=JSON.parse(payload.toString());if(!msg||msg.uid===MY_UID)return
      if(topic===MT.hello||topic===MT.peer){
        if(msg.name&&onlinePeers.indexOf(msg.name)<0)onlinePeers.push(msg.name)
        if(msg.uid)peerMap[msg.uid]={name:msg.name,time:Date.now()}
        if(msg.reqSync&&topic===MT.hello){
          var fm=S.manualFiles.map(function(f){return{type:'meta',fileId:f.fileId,name:f.name,size:f.size,ftype:f.type,from:f.from,time:f.time}})
          mqttC.publish(MT.sync,JSON.stringify({logs:S.logs,files:fm,from:MY_NAME,uid:MY_UID}),{qos:1})
          // 建立P2P连接
          setTimeout(function(){connectToPeer(msg.uid,msg.name)},500)
        }
        updateCollab();
      }else if(topic===MT.log){
        if(msg.type==='add'&&msg.log){var idx=-1;for(var i=0;i<S.logs.length;i++){if(S.logs[i].id===msg.log.id){idx=i;break}}if(idx>=0){if((msg.log.time||0)>(S.logs[idx].time||0))S.logs[idx]=msg.log}else S.logs.push(msg.log);saveS();if(CURTAB==='log')showLogs()}
        else if(msg.type==='del'&&msg.id){S.logs=S.logs.filter(function(l){return l.id!==msg.id});saveS();if(CURTAB==='log')showLogs()}
      }else if(topic===MT.manual){
        if(msg.type==='meta'){saveManualFile(msg);checkMissingFile(msg.fileId,msg.uid)}
        else if(msg.type==='del'&&msg.fileId){S.manualFiles=S.manualFiles.filter(function(f){return f.fileId!==msg.fileId});saveS();if(CURTAB==='manual')renderManual()}
      }else if(topic===MT.sync){
        if(msg.logs){var m={};S.logs.forEach(function(l){m[l.id]=l});msg.logs.forEach(function(l){var ex=m[l.id];if(!ex||(l.time||0)>(ex.time||0))m[l.id]=l});S.logs=Object.values(m);saveS();if(CURTAB==='log')showLogs()}
        if(msg.files)msg.files.forEach(function(f){saveManualFile(f)})
      }else if(topic===MT.rtc){
        if(msg.type==='offer')handleRTCOffer(msg)
        else if(msg.type==='answer')handleRTCAnswer(msg)
        else if(msg.type==='ice')handleRTCIce(msg)
      }
    }catch(e){}
  })
  mqttC.on('close',function(){mqttOn=false;updateCollab()})
  mqttC.on('error',function(){mqttTry++;setTimeout(mqttConnect,1000)})
}

// 检查缺失文件：若有文件无data，尝试从有文件的peer请求
function checkMissingFiles(){
  var missing=S.manualFiles.filter(function(f){return !f.data})
  if(!missing.length)return
  for(var uid in peerMap){
    if(uid===MY_UID)continue
    connectToPeer(uid,peerMap[uid].name)
  }
}

function checkMissingFile(fileId,uid){
  for(var i=0;i<(S.manualFiles||[]).length;i++){
    if(S.manualFiles[i].fileId===fileId&&!S.manualFiles[i].data){
      connectToPeer(uid,peerMap[uid]?peerMap[uid].name:'')
      break
    }
  }
}

function disconnectP2P(){
  for(var pid in peerConns){
    try{if(peerConns[pid].pc)peerConns[pid].pc.close()}catch(e){}
    try{if(peerConns[pid].dc)peerConns[pid].dc.close()}catch(e){}
  }
  peerConns={};updateP2PStatus()
}

function switchBroker(){mqttIdx++;mqttTry=0;disconnectP2P();mqttConnect()}

function updateCollab(){
  var dot=G('dot'),count=G('onlineCount'),status=G('netStatus')
  if(!dot||!count||!status)return
  dot.style.background=mqttOn?'var(--ok)':'var(--err)'
  count.textContent=onlinePeers.length
  status.textContent=mqttOn?BROKERS[mqttIdx%3].n:'未连接'
  updateP2PStatus()
}

switchTab('today');updateSummary();mqttConnect()

setTimeout(function(){if(!mqttOn)mqttConnect()},8000)
